<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warhammer 40,000</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <header class="game-header">
        <div class="header-eyebrow">In the grim darkness of the far future</div>
        <h1 class="game-title">Warhammer 40,000</h1>
        <div class="header-subtitle">Turn-Based Tactical · Phase 1</div>
      </header>
      <div id="lobby-content"></div>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div id="game-content"></div>
  </div>

  <!-- Firebase SDK (compat v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- App — load order matters: config → init → data → state → UI → entry -->
  <script src="firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/units.js"></script>
  <script src="js/roster.js"></script>
  <script src="js/shooting.js"></script>
  <script src="js/state.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
