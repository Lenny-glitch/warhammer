<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warhammer Fantasy Battle</title>
  <link rel="stylesheet" href="whf.css">
</head>
<body>

  <div id="app">

    <!-- Header — chrome only, no phase logic in WHF-1 -->
    <header id="topbar">
      <div>
        <div id="topbar-title">Warhammer Fantasy Battle</div>
        <div id="topbar-sub">WHF-1 — Regiment Engine Preview</div>
      </div>
      <div id="phase-tracker">Phase: —</div>
    </header>

    <!-- Board -->
    <div id="board-wrap">
      <svg id="board" width="1200" height="900" viewBox="0 0 1200 900">
        <rect id="board-bg" x="0" y="0" width="1200" height="900" />
        <g id="grid-layer"></g>
        <g id="units-layer"></g>
      </svg>
    </div>

    <!-- Hint bar -->
    <div id="hint-bar">
      Click unit to inspect &nbsp;·&nbsp; Right-click model to remove &nbsp;·&nbsp; Esc to deselect
    </div>

  </div>

  <!-- Stat panel — rendered outside board-wrap so it overlays freely -->
  <div id="stat-panel">
    <div id="panel-content"></div>
  </div>

  <script src="whf.js"></script>
</body>
</html>
