          crumb.textContent = 'Maintenance' + (param && App.schemas[param] ? ` · ${App.schemas[param].name}` : '');
          // #unit/new/{system}                  → param=system, sub='new'
          // #unit/edit/{system}/{factionId}/{id} → param=system, parts[3]=factionId, parts[4]=unitId
          UnitForm.render(param, sub, parts[3], parts[4]);
          break;

        case 'unit-view':
          document.getElementById('screen-unit-view').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Unit Card';
          if (sub && App.schemas[sub]) crumb.textContent = App.schemas[sub].name;
          UnitCard.render(sub, param, parts[3]);
          break;

        case 'library':
          document.getElementById('screen-library').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Library';
          crumb.textContent = 'Maintenance' + (sub && App.schemas[sub] ? ` · ${App.schemas[sub].name}` : '');
          Library.render(sub);
          break;

        case 'faction-pick':
          // ROSTER_UX_2 item 1: the new player-facing "pick a faction to
          // build with" step — replaces Library as the default landing for
          // roster-building. Ungated on purpose (this is the main path).
          document.getElementById('screen-faction-pick').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Choose Faction';
          if (sub && App.schemas[sub]) crumb.textContent = App.schemas[sub].name;
          FactionPicker.render(sub);
          break;

        case 'maintenance':
          // Hub for the gated screens above — system picker into Library,
          // plus Clean Drafts. Gated the same way (MAINTENANCE_SCREENS
          // doesn't include 'maintenance' itself since this IS the entry
          // point being gated; the router-level check would be redundant
          // with the one below, so it's inline here instead).
          if (!Maintenance.gate('Maintenance tools')) { location.hash = '#home'; return; }
          document.getElementById('screen-maintenance').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Maintenance';
          crumb.textContent = '';
          Screens.maintenance.render();
          break;

        case 'roster':
          document.getElementById('screen-roster').classList.add('active');
          back.classList.add('visible');
          if (sub === 'new') {
            title.textContent = 'Roster Builder';
            if (param && App.schemas[param]) crumb.textContent = App.schemas[param].name;
            RosterBuilder.render(param, parts[3]);
          } else if (sub === 'edit') {
            title.textContent = 'Roster Builder';
            RosterBuilder.render(null, null, param);
          } else {
            title.textContent = 'Roster';
            RosterView.render(sub);
          }
          break;

        case 'unit-search':
          // #unit-search/{system}/{factionSlug}
          document.getElementById('screen-unit-search').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Unit Search';
          if (sub && App.schemas[sub]) crumb.textContent = App.schemas[sub].name;
          UnitSearch.render(sub, param);
          break;

        case 'clean-drafts':
          document.getElementById('screen-clean-drafts').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'Draft Cleaner';
          crumb.textContent = 'Maintenance';
          RosterCleaner.render();
          break;

        case 'my-rosters':
          document.getElementById('screen-my-rosters').classList.add('active');
          back.classList.add('visible');
          title.textContent = 'My Rosters';
          crumb.textContent = '';
          MyRosters.render();
          break;

        default:
          document.getElementById('screen-home').classList.add('active');
          back.classList.remove('visible');
          title.textContent = 'Roster Manager';
          Screens.home.render();
      }
    }
  };

  // ── SCREENS ──────────────────────────────────────────────────────────────────

  const Screens = {
    home: {
      render() {
        const grid    = document.getElementById('system-grid');
        const entries = Object.entries(App.schemas);

        if (!entries.length) {
          grid.innerHTML = '<div class="loading-text">No game systems found.</div>';
          return;
        }

        grid.innerHTML = entries.map(([id, s]) => `
          <div class="system-card" data-id="${id}" onclick="App.selectSystem('${id}')">
            <div class="card-name">${s.name || id}</div>
            <div class="card-stats">${(s.statBlock || []).join(' · ')}</div>
          </div>
        `).join('');

        if (App.selectedSystem) App.selectSystem(App.selectedSystem);
      }
    },

    // ROSTER_UX_2: single hub for the gated maintenance surfaces. Reached
    // only via #maintenance, which already gated entry (see Router) — this
    // just needs to render, not gate again.
    maintenance: {
      render() {
        const el = document.getElementById('screen-maintenance');
        const entries = Object.entries(App.schemas);
        el.innerHTML = `
          <div class="lib-wrap">
            <p class="lead">Maintenance tools — edits the shared unit library directly.</p>
            <div class="section-label">Unit Library (add / edit / delete)</div>
            <div class="system-grid">
              ${entries.map(([id, s]) => `
                <div class="system-card" onclick="location.hash='#library/${id}'">
                  <div class="card-name">${s.name || id}</div>
                  <div class="card-stats">${(s.statBlock || []).join(' · ')}</div>
                </div>
              `).join('')}
            </div>
            <div class="section-label" style="margin-top:1.5rem;">Draft Cleanup</div>
            <button class="btn btn-secondary" onclick="location.hash='#clean-drafts'">Clean Drafts</button>
          </div>
        `;
      }
    }
  };

  // ── BOOT ─────────────────────────────────────────────────────────────────────

  App.init().catch(err => {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;
                  color:#cc6060;font-family:sans-serif;font-size:.9rem;">
        Firebase error: ${err.message}
      </div>`;
  });

  </script>
</body>
</html>
