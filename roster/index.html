<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e1a;
      --surface:    #181828;
      --surface2:   #1e1e32;
      --border:     #2e2e50;
      --border-hi:  #5050a0;
      --text:       #dcdcf0;
      --text-dim:   #6a6a90;
      --accent:     #7c6af7;
      --accent-dim: #3a3270;
      --green:      #4caf74;
      --red:        #cc6060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    #app-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #nav-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      display: none;
      transition: color 0.15s, border-color 0.15s;
    }
    #nav-back:hover { color: var(--text); border-color: var(--border-hi); }
    #nav-back.visible { display: block; }

    #nav-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    #nav-crumb {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HOME ── */
    #screen-home {
      max-width: 600px;
      margin: 5rem auto;
      padding: 0 1.5rem;
      text-align: center;
    }

    #screen-home h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    #screen-home .lead {
      color: var(--text-dim);
      font-size: 0.875rem;
      margin-bottom: 2.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.875rem;
      text-align: left;
    }

    .system-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.875rem;
      margin-bottom: 2rem;
    }

    .system-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: center;
      user-select: none;
    }
    .system-card:hover {
      border-color: var(--border-hi);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .system-card.selected {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .system-card .card-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .system-card .card-stats {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .action-row.visible {
      opacity: 1;
      transform: none;
      pointer-events: all;
    }

    /* ── HOME UTIL LINK ── */
    .home-util {
      margin-top: 2rem;
      text-align: center;
    }
    .util-link {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.06em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .util-link:hover { opacity: 1; color: var(--text); }

    /* ── ROSTER CLEANER ── */
    .cleaner-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }
    .cleaner-summary {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    .cleaner-roster {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .cleaner-roster-header {
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .cleaner-roster-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 400;
    }
    .cleaner-unit-row {
      display: grid;
      grid-template-columns: 2fr 1.5fr auto;
      gap: 0.5rem 1rem;
      align-items: start;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .cleaner-unit-row:last-child { border-bottom: none; }
    .cleaner-unit-name { color: var(--text); }
    .cleaner-unit-id   { color: var(--text-dim); font-family: monospace; font-size: 0.72rem; }
    .cleaner-status    { text-align: right; white-space: nowrap; }
    .cleaner-note      {
      grid-column: 1 / -1;
      font-size: 0.7rem;
      color: var(--text-dim);
      padding-left: 0.5rem;
      margin-top: -0.2rem;
    }
    .tag-ok     { color: var(--green); }
    .tag-auto   { color: #7abaff; }
    .tag-manual { color: #f0c060; }
    .tag-error  { color: var(--red); }
    .fix-arrow  { color: var(--text-dim); margin: 0 0.3rem; }
    .cleaner-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-top: 1.5rem;
    }
    .cleaner-apply-btn {
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .cleaner-apply-btn:hover  { filter: brightness(1.15); }
    .cleaner-apply-btn:disabled { opacity: 0.4; cursor: default; filter: none; }
    .cleaner-status-msg {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .myr-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 1rem;
      flex-wrap: wrap;
    }
    .myr-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .myr-actions .btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
    .myr-section-gap { margin-top: 1.75rem; }

    /* ── BUTTONS ── */
    .btn {
      padding: 0.875rem 1rem;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: filter 0.15s, border-color 0.15s;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { filter: brightness(1.15); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { border-color: var(--border-hi); }

    /* ── PLACEHOLDER ── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 0.5rem;
      text-align: center;
    }
    .placeholder h2 { font-size: 1rem; }
    .placeholder p  { font-size: 0.85rem; color: var(--text-dim); }

    /* ── LOADING ── */
    .loading-text {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 1.5rem;
      text-align: center;
    }

    /* ── UNIT FORM ── */
    .uf-wrap {
      max-width: 740px;
      margin: 0 auto;
      padding: 2rem 1.5rem 7rem;
    }

    .uf-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .uf-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 520px) {
      .uf-grid-2 { grid-template-columns: 1fr; }
    }

    .uf-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .uf-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .req { color: var(--red); margin-left: 0.15em; }

    .uf-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      font-family: inherit;
    }
    .uf-input:focus { border-color: var(--accent); }
    .uf-input::placeholder { color: var(--text-dim); }

    .uf-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      resize: vertical;
      width: 100%;
      min-height: 80px;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .uf-textarea:focus { border-color: var(--accent); }
    .uf-textarea::placeholder { color: var(--text-dim); }

    .uf-error {
      font-size: 0.72rem;
      color: var(--red);
      min-height: 1rem;
    }

    .has-error .uf-input { border-color: var(--red); }

    /* ── STAT BLOCK ── */
    .stat-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .stat-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 0.4rem 0.35rem;
      outline: none;
      width: 62px;
      text-align: center;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .stat-input:focus { border-color: var(--accent); }
    .stat-input::placeholder { color: var(--text-dim); }

    /* ── WEAPON CARDS ── */
    .weapon-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 0.75rem;
    }

    .weapon-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      flex-wrap: wrap;
    }

    .weapon-name {
      flex: 1;
      min-width: 130px;
    }

    .type-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .type-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      letter-spacing: 0.04em;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
    }
    .type-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .type-btn:not(.active):hover { background: var(--surface); color: var(--text); }

    .default-check {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .default-check input { accent-color: var(--accent); cursor: pointer; }

    .weapon-arrows {
      display: flex;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .arrow-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      line-height: 1;
      padding: 0.25rem 0.45rem;
      transition: color 0.1s, border-color 0.1s;
    }
    .arrow-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-hi); }
    .arrow-btn:disabled { opacity: 0.25; cursor: default; }

    .remove-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      transition: color 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--red); border-color: var(--red); }

    .weapon-profiles {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      padding: 0.5rem 0.75rem 0.65rem;
      border-top: 1px solid var(--border);
    }

    .wp-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .wp-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .wp-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.3rem 0.35rem;
      width: 60px;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .wp-input:focus { border-color: var(--accent); }
    .wp-input::placeholder { color: var(--text-dim); }

    /* ── LOADOUT ── */
    .section-hint {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .loadout-slot {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 0.75rem;
      padding: 0.75rem;
    }

    .loadout-header {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.65rem;
    }

    .wcheck-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .wcheck-label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.25rem 0.6rem;
      user-select: none;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .wcheck-label.active {
      border-color: var(--accent-dim);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .wcheck-label input { display: none; }

    .wcheck-empty {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── ABILITIES ── */
    .ability-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 0.75rem;
      padding: 0.75rem;
    }

    .ability-header {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    /* ── TAGS ── */
    .tag-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
      min-height: 1.5rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent-dim);
      border-radius: 4px;
      color: var(--accent);
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem 0.2rem 0.6rem;
    }

    .tag-x {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      opacity: 0.6;
      padding: 0;
      transition: opacity 0.1s;
    }
    .tag-x:hover { opacity: 1; }

    .tag-input-row {
      display: flex;
      gap: 0.5rem;
    }
    .tag-input-row .uf-input { flex: 1; }
    .tag-input-row .btn { width: auto; padding: 0.5rem 1rem; }

    /* ── ADD BUTTONS ── */
    .uf-add-btn {
      margin-top: 0.25rem;
      width: auto;
      padding: 0.5rem 1rem;
    }

    /* ── FORM ACTIONS ── */
    .uf-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      padding: 0.875rem 1.5rem;
      z-index: 9;
    }
    .uf-actions .btn { width: auto; padding: 0.75rem 1.5rem; }

    /* ── UNIT CARD ── */
    .uc-wrap {
      max-width: 740px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .uc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .uc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }

    .uc-name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .uc-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    .uc-points {
      flex-shrink: 0;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.25rem 0.65rem;
      white-space: nowrap;
    }

    /* stat block */
    .uc-stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .uc-stat {
      flex: 1;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.6rem 0.25rem;
    }

    .uc-stat-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }

    .uc-stat-val {
      font-size: 1.05rem;
      font-weight: 700;
    }

    /* sections */
    .uc-section {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .uc-section-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }

    /* weapons */
    .uc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .uc-table th {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 0.5rem 0.45rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .uc-table th:first-child { text-align: left; padding-left: 0; }

    .uc-table td {
      padding: 0.5rem 0.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .uc-table td:first-child { text-align: left; padding-left: 0; }
    .uc-table tr:last-child td { border-bottom: none; }

    .uc-weapon-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .uc-type-badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      padding: 0.1rem 0.35rem;
    }

    .uc-default-star { color: var(--accent); font-size: 0.7rem; }

    .uc-loadout {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
    }

    .uc-loadout-title {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.2rem;
    }

    .uc-loadout-row {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    <!-- ROSTER_UX_2: single prominent action, no maintenance affordance
         on the player-facing landing. "Add Unit to Library" moved behind
         the Maintenance gate (below). -->
    <div class="action-row" id="action-row">
      <button class="btn btn-primary" onclick="App.goToFactionPick()">Build Roster</button>
    </div>
    <div class="home-util">
      <a href="#my-rosters" class="util-link">My Rosters</a>
      <a href="#maintenance" class="util-link">Maintenance</a>
    </div>
  </div>

  <!-- SCREEN: UNIT FORM -->
  <div id="screen-unit-form" class="screen"></div>

  <!-- SCREEN: UNIT VIEW (placeholder) -->
  <div id="screen-unit-view" class="screen">
    <div class="placeholder">
      <h2>Unit Card</h2>
      <p>Coming soon</p>
    </div>
  </div>

  <!-- SCREEN: LIBRARY (maintenance) -->
  <div id="screen-library" class="screen"></div>

  <!-- SCREEN: FACTION PICKER (ROSTER_UX_2 — player-facing, replaces Library as the build-roster landing) -->
  <div id="screen-faction-pick" class="screen"></div>

  <!-- SCREEN: ROSTER BUILDER -->
  <div id="screen-roster" class="screen"></div>

  <!-- SCREEN: UNIT SEARCH (40k lazy migration) -->
  <div id="screen-unit-search" class="screen"></div>

  <!-- SCREEN: ROSTER CLEANER (maintenance) -->
  <div id="screen-clean-drafts" class="screen"></div>

  <!-- SCREEN: MY ROSTERS -->
  <div id="screen-my-rosters" class="screen"></div>

  <!-- SCREEN: MAINTENANCE HUB (ROSTER_UX_2) -->
  <div id="screen-maintenance" class="screen"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>

  // ── SEED DATA ────────────────────────────────────────────────────────────────

  const SCHEMA_SEED = {
    'kill-team': {
      name: 'Kill Team',
      statBlock: ['APL', 'MOVE', 'DF', 'SAVE', 'WOUNDS'],
      weaponProfiles: ['ATK', 'HIT', 'DMG', 'WR'],
      hasWeaponType: true
    },
    'warhammer-40k': {
      name: 'Warhammer 40,000',
      statBlock: ['M', 'T', 'SV', 'W', 'LD', 'OC'],
      weaponProfiles: ['RANGE', 'A', 'BS/WS', 'S', 'AP', 'D'],
      hasWeaponType: true
    }
  };

  // ── HELPERS ──────────────────────────────────────────────────────────────────

  function toTitleCase(str) {
    return str.trim().replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  }

  function slugify(str) {
    return str.toLowerCase()
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
  }

  // Scrape artifact: some weapon names carry a trailing " +" (e.g.
  // "Triskele +", "Mirrorswords +") from the source page markup. Display-time
  // only — the underlying data keeps the raw scraped name untouched.
  function cleanWeaponName(name) {
    return (name || '').replace(/\s*\+\s*$/, '');
  }

  // ── MAINTENANCE GATE (ROSTER_UX_2) ──────────────────────────────────────────
  //
  // NOT SECURITY. This app has no auth by design (see the "no auth exists"
  // banner in My Rosters) — now that it's publicly hosted via Firebase
  // Hosting against the one shared database, this passphrase exists purely
  // as a misclick barrier so a non-technical second player following a
  // shared link doesn't stumble into editing/deleting the canonical unit
  // library. Checked client-side against a hardcoded constant, visible to
  // anyone who views source. Do not treat this as protecting gameData from
  // a hostile actor — it protects a trusted-link audience from themselves.
  const MAINTENANCE_PASSPHRASE = 'ordo-maintenance';

  const Maintenance = {
    KEY: 'roster_maintenance_unlocked',

    isUnlocked() {
      return sessionStorage.getItem(Maintenance.KEY) === 'true';
    },

    // Prompts for the passphrase if not already unlocked this session.
    // Returns true if the caller may proceed, false if the user cancelled
    // or entered the wrong passphrase (an alert explains which).
    gate(actionLabel) {
      if (Maintenance.isUnlocked()) return true;
      const attempt = prompt(`Maintenance passphrase required — ${actionLabel}`);
      if (attempt === null) return false;
      if (attempt !== MAINTENANCE_PASSPHRASE) {
        alert('Incorrect passphrase.');
        return false;
      }
      sessionStorage.setItem(Maintenance.KEY, 'true');
      return true;
    },
  };

  // ── APP ──────────────────────────────────────────────────────────────────────

  const App = {
    db: null,
    schemas: {},
    selectedSystem: null,

    async init() {
      firebase.initializeApp(firebaseConfig);
      App.db = firebase.database();
      await App.seedSchemas();
      App.schemas = await App.loadSchemas();
      Router.init();
    },

    async seedSchemas() {
      const snap = await App.db.ref('rosterSchemas').once('value');
      const existing = snap.val() || {};
      const writes = {};
      for (const [id, schema] of Object.entries(SCHEMA_SEED)) {
        if (!existing[id]) writes[id] = schema;
      }
      if (Object.keys(writes).length) {
        await App.db.ref('rosterSchemas').update(writes);
      }
    },

    async loadSchemas() {
      const snap = await App.db.ref('rosterSchemas').once('value');
      return snap.val() || {};
    },

    selectSystem(id) {
      App.selectedSystem = id;
      document.querySelectorAll('.system-card').forEach(c =>
        c.classList.toggle('selected', c.dataset.id === id)
      );
      document.getElementById('action-row').classList.add('visible');
    },

    // ROSTER_UX_2: replaces goToUnitCreator/goToRoster (both deleted, no
    // longer called from anywhere — Add Unit moved to Maintenance, which
    // builds its own hash directly; Browse&Build's old Library landing is
    // now FactionPicker).
    goToFactionPick() {
      if (App.selectedSystem) location.hash = `#faction-pick/${App.selectedSystem}`;
    }
  };

  // ── UNIT FORM ────────────────────────────────────────────────────────────────

  const UnitForm = {
    state: null,

    _fresh(system, mode, factionId, unitId) {
      return {
        system,
        mode,
        factionId: factionId || null,
        unitId:    unitId    || null,
        isDirty: false,
        wCounter: 0,
        weapons: [],
        loadoutSlots: [],
        abilities: [],
        equipment: [],
        keywords: [],
        originalSource: null,
      };
    },

    async render(system, mode, factionId, unitId) {
      UnitForm.state = UnitForm._fresh(system, mode || 'new', factionId, unitId);
      const schema = App.schemas[system];
      if (!schema) {
        document.getElementById('screen-unit-form').innerHTML =
          '<div class="placeholder"><h2>Unknown game system</h2></div>';
        return;
      }
      const factions = await UnitForm._loadFactions(system);
      const el = document.getElementById('screen-unit-form');
      el.innerHTML = UnitForm._buildPage(schema, factions);
      UnitForm._bind(el);

      if (mode === 'edit' && factionId && unitId) {
        await UnitForm._loadForEdit(factionId, unitId);
      } else {
        const prefillJSON = sessionStorage.getItem('unitFormPrefill');
        if (prefillJSON) {
          sessionStorage.removeItem('unitFormPrefill');
          UnitForm._populate(JSON.parse(prefillJSON));
        }
      }
    },

    async _loadForEdit(factionId, unitId) {
      try {
        const snap = await App.db
          .ref(`gameData/${UnitForm.state.system}/factions/${factionId}/units/${unitId}`)
          .once('value');
        const unit = snap.val();
        if (unit) UnitForm._populate(unit);
      } catch (err) {
        alert(`Could not load unit: ${err.message}`);
      }
    },

    _populate(unit) {
      const s   = UnitForm.state;
      const arr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);

      document.getElementById('f-name').value    = unit.name    || '';
      document.getElementById('f-faction').value = unit.faction || '';
      document.getElementById('f-role').value    = unit.role    || '';
      document.getElementById('f-points').value  = unit.points != null ? unit.points : '';
      document.getElementById('f-notes').value   = unit.notes   || '';

      const stats = unit.stats || {};
      document.querySelectorAll('.stat-input').forEach(el => {
        el.value = stats[el.dataset.stat] || '';
      });

      const weapons = arr(unit.weapons);
      s.wCounter = weapons.length;
      s.weapons  = weapons.map((w, i) => ({
        id:        w.id || `w${i + 1}`,
        name:      w.name || '',
        type:      w.type || 'ranged',
        isDefault: !!w.isDefault,
        profiles:  { ...(w.profiles || {}) },
      }));
      UnitForm._renderWeapons();

      s.loadoutSlots = arr(unit.loadoutOptions).map(slot => ({
        name:      slot.slot || '',
        weaponIds: arr(slot.weaponIds),
      }));
      UnitForm._renderLoadout();

      s.abilities = arr(unit.abilities).map(a => ({
        name:        a.name        || '',
        description: a.description || '',
      }));
      UnitForm._renderAbilities();

      s.equipment      = arr(unit.equipment);
      s.keywords       = arr(unit.keywords);
      s.originalSource = unit.source || null;  // preserved on edit so scraper units stay tagged
      UnitForm._renderTags('equipment');
      UnitForm._renderTags('keywords');

      s.isDirty = false;
    },

    async _loadFactions(system) {
      try {
        const snap = await App.db.ref(`gameData/${system}/factions`).once('value');
        const val = snap.val() || {};
        return Object.values(val)
          .map(f => f.info && f.info.name)
          .filter(Boolean);
      } catch { return []; }
    },

    // ── BUILD PAGE ─────────────────────────────────────────────────────────────

    _buildPage(schema, factions) {
      return `
        <div class="uf-wrap">
          ${UnitForm._sHeader(factions)}
          ${UnitForm._sStats(schema)}
          ${UnitForm._sWeapons()}
          ${UnitForm._sLoadout()}
          ${UnitForm._sAbilities()}
          ${UnitForm._sTagSection('equipment', 'Equipment')}
          ${UnitForm._sTagSection('keywords', 'Keywords')}
          ${UnitForm._sNotes()}
        </div>
        <div class="uf-actions">
          <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
          <button class="btn btn-primary"   id="btn-save">Save to Library</button>
        </div>
      `;
    },

    _sHeader(factions) {
      const opts = factions.map(f => `<option value="${f}">`).join('');
      return `
        <div class="uf-section">
          <div class="uf-grid-2">
            <div class="uf-field" id="field-name">
              <label class="uf-label">Unit Name<span class="req">*</span></label>
              <input class="uf-input" id="f-name" type="text" placeholder="e.g. Kasrkin Trooper">
              <div class="uf-error" id="err-name"></div>
            </div>
            <div class="uf-field" id="field-faction">
              <label class="uf-label">Faction<span class="req">*</span></label>
              <input class="uf-input" id="f-faction" type="text" list="faction-list"
                     placeholder="e.g. Kasrkin" autocomplete="off">
              <datalist id="faction-list">${opts}</datalist>
              <div class="uf-error" id="err-faction"></div>
            </div>
          </div>
          <div class="uf-grid-2">
            <div class="uf-field">
              <label class="uf-label">Role / Type</label>
              <input class="uf-input" id="f-role" type="text" placeholder="e.g. Trooper, Leader">
            </div>
            <div class="uf-field">
              <label class="uf-label">Points</label>
              <input class="uf-input" id="f-points" type="number" min="0" placeholder="—">
            </div>
          </div>
        </div>
      `;
    },

    _sStats(schema) {
      const fields = (schema.statBlock || []).map(stat => `
        <div class="stat-field">
          <div class="stat-label">${stat}</div>
          <input class="stat-input" type="text" data-stat="${stat}" placeholder="—">
        </div>
      `).join('');
      return `
        <div class="uf-section">
          <div class="section-label">Stat Block</div>
          <div class="stat-row">${fields}</div>
        </div>
      `;
    },

    _sWeapons() {
      return `
        <div class="uf-section">
          <div class="section-label">Weapons</div>
          <div id="weapons-list"></div>
          <button class="btn btn-secondary uf-add-btn" id="btn-add-weapon">+ Add Weapon</button>
        </div>
      `;
    },

    _sLoadout() {
      return `
        <div class="uf-section">
          <div class="section-label">Loadout Options
            <span class="section-hint">— leave empty for fixed loadout</span>
          </div>
          <div id="loadout-list"></div>
          <button class="btn btn-secondary uf-add-btn" id="btn-add-loadout">+ Add Loadout Slot</button>
        </div>
      `;
    },

    _sAbilities() {
      return `
        <div class="uf-section">
          <div class="section-label">Abilities</div>
          <div id="abilities-list"></div>
          <button class="btn btn-secondary uf-add-btn" id="btn-add-ability">+ Add Ability</button>
        </div>
      `;
    },

    _sTagSection(type, label) {
      return `
        <div class="uf-section">
          <div class="section-label">${label}</div>
          <div class="tag-wrap" id="tags-${type}"></div>
          <div class="tag-input-row">
            <input class="uf-input" id="taginput-${type}" type="text"
                   placeholder="Add ${label.toLowerCase()}…">
            <button class="btn btn-secondary" id="tagadd-${type}" style="width:auto;padding:0.5rem 1rem;">Add</button>
          </div>
        </div>
      `;
    },

    _sNotes() {
      return `
        <div class="uf-section" style="border-bottom:none;">
          <div class="section-label">Notes</div>
          <textarea class="uf-textarea" id="f-notes" placeholder="Any additional notes…" rows="4"></textarea>
        </div>
      `;
    },

    // ── RENDER SUBSECTIONS ─────────────────────────────────────────────────────

    _renderWeapons() {
      const schema = App.schemas[UnitForm.state.system];
      const list = document.getElementById('weapons-list');
      if (!list) return;
      const ws = UnitForm.state.weapons;
      if (!ws.length) { list.innerHTML = ''; return; }
      list.innerHTML = ws.map((w, i) => {
        const hasType = schema.hasWeaponType !== false;
        const profiles = (schema.weaponProfiles || []).map(p => `
          <div class="wp-field">
            <div class="wp-label">${p}</div>
            <input class="wp-input" type="text"
                   data-wid="${w.id}" data-profile="${p}"
                   value="${w.profiles[p] || ''}" placeholder="—">
          </div>
        `).join('');

        return `
          <div class="weapon-card" data-wid="${w.id}">
            <div class="weapon-header">
              <input class="uf-input weapon-name" type="text"
                     data-wid="${w.id}" value="${w.name}" placeholder="Weapon name">
              ${hasType ? `
                <div class="type-toggle">
                  <button class="type-btn ${w.type === 'ranged' ? 'active' : ''}"
                          data-wid="${w.id}" data-type="ranged">Ranged</button>
                  <button class="type-btn ${w.type === 'melee'  ? 'active' : ''}"
                          data-wid="${w.id}" data-type="melee">Melee</button>
                </div>
              ` : ''}
              <label class="default-check">
                <input type="checkbox" class="weapon-default"
                       data-wid="${w.id}" ${w.isDefault ? 'checked' : ''}>
                Default
              </label>
              <div class="weapon-arrows">
                <button class="arrow-btn" data-wid="${w.id}" data-dir="up"
                        ${i === 0 ? 'disabled' : ''}>↑</button>
                <button class="arrow-btn" data-wid="${w.id}" data-dir="down"
                        ${i === ws.length - 1 ? 'disabled' : ''}>↓</button>
              </div>
              <button class="remove-btn" data-wid="${w.id}" data-target="weapon">×</button>
            </div>
            <div class="weapon-profiles">${profiles}</div>
          </div>
        `;
      }).join('');

      UnitForm._renderLoadout();
    },

    _renderLoadout() {
      const list = document.getElementById('loadout-list');
      if (!list) return;
      const slots = UnitForm.state.loadoutSlots;
      const weapons = UnitForm.state.weapons;
      if (!slots.length) { list.innerHTML = ''; return; }
      list.innerHTML = slots.map((slot, si) => {
        const checks = weapons.length
          ? weapons.map(w => `
              <label class="wcheck-label ${slot.weaponIds.includes(w.id) ? 'active' : ''}">
                <input type="checkbox" class="wcheck"
                       data-slot="${si}" data-wid="${w.id}"
                       ${slot.weaponIds.includes(w.id) ? 'checked' : ''}>
                ${cleanWeaponName(w.name) || '(unnamed)'}
              </label>
            `).join('')
          : '<span class="wcheck-empty">Add weapons above first</span>';

        return `
          <div class="loadout-slot" data-slot="${si}">
            <div class="loadout-header">
              <input class="uf-input slot-name" type="text"
                     data-slot="${si}" placeholder="e.g. Primary weapon"
                     value="${slot.name}">
              <button class="remove-btn" data-slot="${si}" data-target="slot">×</button>
            </div>
            <div class="wcheck-wrap">${checks}</div>
          </div>
        `;
      }).join('');
    },

    _renderAbilities() {
      const list = document.getElementById('abilities-list');
      if (!list) return;
      const abs = UnitForm.state.abilities;
      if (!abs.length) { list.innerHTML = ''; return; }
      list.innerHTML = abs.map((a, i) => `
        <div class="ability-card" data-ability="${i}">
          <div class="ability-header">
            <input class="uf-input ability-name" type="text"
                   data-ability="${i}" placeholder="Ability name" value="${a.name}">
            <button class="remove-btn" data-ability="${i}" data-target="ability">×</button>
          </div>
          <textarea class="uf-textarea ability-desc" data-ability="${i}"
                    placeholder="Rules text…" rows="3">${a.description || ''}</textarea>
        </div>
      `).join('');
    },

    _renderTags(type) {
      const wrap = document.getElementById(`tags-${type}`);
      if (!wrap) return;
      wrap.innerHTML = UnitForm.state[type].map((t, i) => `
        <span class="tag">${t}
          <button class="tag-x" data-type="${type}" data-index="${i}">×</button>
        </span>
      `).join('');
    },

    // ── EVENT BINDING ──────────────────────────────────────────────────────────

    _bind(el) {
      el.addEventListener('input', () => { UnitForm.state.isDirty = true; });

      document.getElementById('btn-add-weapon').addEventListener('click', () => {
        const schema = App.schemas[UnitForm.state.system];
        const id = `w${++UnitForm.state.wCounter}`;
        const profiles = {};
        (schema.weaponProfiles || []).forEach(p => { profiles[p] = ''; });
        UnitForm.state.weapons.push({ id, name: '', type: 'ranged', isDefault: false, profiles });
        UnitForm._renderWeapons();
      });

      document.getElementById('btn-add-loadout').addEventListener('click', () => {
        UnitForm.state.loadoutSlots.push({ name: '', weaponIds: [] });
        UnitForm._renderLoadout();
      });

      document.getElementById('btn-add-ability').addEventListener('click', () => {
        UnitForm.state.abilities.push({ name: '', description: '' });
        UnitForm._renderAbilities();
      });

      ['equipment', 'keywords'].forEach(type => {
        const input = document.getElementById(`taginput-${type}`);
        const add = () => {
          const val = input.value.trim();
          if (!val) return;
          const lower = val.toLowerCase();
          if (UnitForm.state[type].some(t => t.toLowerCase() === lower)) {
            input.value = '';
            return;
          }
          UnitForm.state[type].push(val);
          UnitForm._renderTags(type);
          input.value = '';
          UnitForm.state.isDirty = true;
        };
        document.getElementById(`tagadd-${type}`).addEventListener('click', add);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); add(); } });
      });

      el.addEventListener('click', e => {
        // Remove buttons
        if (e.target.classList.contains('remove-btn')) {
          const { target, wid, slot, ability } = e.target.dataset;
          if (target === 'weapon') {
            UnitForm.state.weapons = UnitForm.state.weapons.filter(w => w.id !== wid);
            UnitForm.state.loadoutSlots.forEach(s => {
              s.weaponIds = s.weaponIds.filter(id => id !== wid);
            });
            UnitForm._renderWeapons();
          }
          if (target === 'slot') {
            UnitForm.state.loadoutSlots.splice(+slot, 1);
            UnitForm._renderLoadout();
          }
          if (target === 'ability') {
            UnitForm.state.abilities.splice(+ability, 1);
            UnitForm._renderAbilities();
          }
        }

        // Tag remove
        if (e.target.classList.contains('tag-x')) {
          const { type, index } = e.target.dataset;
          UnitForm.state[type].splice(+index, 1);
          UnitForm._renderTags(type);
        }

        // Type toggle
        if (e.target.classList.contains('type-btn')) {
          const { wid, type } = e.target.dataset;
          const w = UnitForm.state.weapons.find(w => w.id === wid);
          if (w) {
            w.type = type;
            const card = el.querySelector(`.weapon-card[data-wid="${wid}"]`);
            if (card) card.querySelectorAll('.type-btn').forEach(b =>
              b.classList.toggle('active', b.dataset.type === type)
            );
          }
        }

        // Reorder arrows
        if (e.target.classList.contains('arrow-btn')) {
          const { wid, dir } = e.target.dataset;
          const ws = UnitForm.state.weapons;
          const idx = ws.findIndex(w => w.id === wid);
          if (dir === 'up'   && idx > 0)              [ws[idx - 1], ws[idx]] = [ws[idx], ws[idx - 1]];
          if (dir === 'down' && idx < ws.length - 1)  [ws[idx], ws[idx + 1]] = [ws[idx + 1], ws[idx]];
          UnitForm._renderWeapons();
        }
      });

      el.addEventListener('change', e => {
        // Weapon name → update state + refresh loadout names
        if (e.target.classList.contains('weapon-name')) {
          const w = UnitForm.state.weapons.find(w => w.id === e.target.dataset.wid);
          if (w) { w.name = e.target.value; UnitForm._renderLoadout(); }
        }
        // Weapon profile
        if (e.target.dataset.profile) {
          const w = UnitForm.state.weapons.find(w => w.id === e.target.dataset.wid);
          if (w) w.profiles[e.target.dataset.profile] = e.target.value;
        }
        // Default checkbox — enforce one maximum
        if (e.target.classList.contains('weapon-default')) {
          const wid = e.target.dataset.wid;
          const checked = e.target.checked;
          UnitForm.state.weapons.forEach(w => { w.isDefault = w.id === wid && checked; });
          el.querySelectorAll('.weapon-default').forEach(cb => {
            cb.checked = cb.dataset.wid === wid && checked;
          });
        }
        // Loadout weapon checkbox
        if (e.target.classList.contains('wcheck')) {
          const si = +e.target.dataset.slot;
          const wid = e.target.dataset.wid;
          const slot = UnitForm.state.loadoutSlots[si];
          if (slot) {
            if (e.target.checked) {
              if (!slot.weaponIds.includes(wid)) slot.weaponIds.push(wid);
            } else {
              slot.weaponIds = slot.weaponIds.filter(id => id !== wid);
            }
            e.target.closest('.wcheck-label').classList.toggle('active', e.target.checked);
          }
        }
        // Loadout slot name
        if (e.target.classList.contains('slot-name')) {
          const slot = UnitForm.state.loadoutSlots[+e.target.dataset.slot];
          if (slot) slot.name = e.target.value;
        }
        // Ability name
        if (e.target.classList.contains('ability-name')) {
          const a = UnitForm.state.abilities[+e.target.dataset.ability];
          if (a) a.name = e.target.value;
        }
        // Ability description
        if (e.target.classList.contains('ability-desc')) {
          const a = UnitForm.state.abilities[+e.target.dataset.ability];
          if (a) a.description = e.target.value;
        }
      });

      // Cancel
      document.getElementById('btn-cancel').addEventListener('click', () => {
        if (UnitForm.state.isDirty && !confirm('Discard unsaved changes?')) return;
        location.hash = '#home';
      });

      // Save — validation only, Firebase not yet wired
      document.getElementById('btn-save').addEventListener('click', UnitForm._validate);
    },

    _validate() {
      const name    = document.getElementById('f-name').value.trim();
      const faction = document.getElementById('f-faction').value.trim();

      const setErr = (fieldId, errId, msg) => {
        document.getElementById(errId).textContent = msg;
        document.getElementById(fieldId).classList.toggle('has-error', !!msg);
      };

      setErr('field-name',    'err-name',    name    ? '' : 'Unit name is required');
      setErr('field-faction', 'err-faction', faction ? '' : 'Faction is required');

      if (!name || !faction) {
        document.querySelector('.has-error .uf-input')?.focus();
        return;
      }

      UnitForm._doSave(name, faction);
    },

    async _doSave(name, factionRaw) {
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const faction   = toTitleCase(factionRaw);
        const factionId = slugify(faction);
        const system    = UnitForm.state.system;

        const stats = {};
        document.querySelectorAll('.stat-input').forEach(el => {
          stats[el.dataset.stat] = el.value;
        });

        const isEdit = UnitForm.state.mode === 'edit' && UnitForm.state.unitId;
        let unitRef, unitId;
        if (isEdit) {
          unitId  = UnitForm.state.unitId;
          unitRef = App.db.ref(`gameData/${system}/factions/${UnitForm.state.factionId}/units/${unitId}`);
        } else {
          const pushed = App.db.ref(`gameData/${system}/factions/${factionId}/units`).push();
          unitRef = pushed;
          unitId  = pushed.key;
        }

        const unit = {
          id:             unitId,
          name,
          gameSystem:     system,
          faction,
          factionId,
          role:           document.getElementById('f-role').value.trim()  || null,
          points:         document.getElementById('f-points').value !== ''
                            ? parseInt(document.getElementById('f-points').value, 10)
                            : null,
          stats,
          weapons:        UnitForm.state.weapons.map(w => ({
                            id: w.id, name: w.name, type: w.type,
                            isDefault: w.isDefault, profiles: w.profiles
                          })),
          loadoutOptions: UnitForm.state.loadoutSlots.map(s => ({
                            slot: s.name, weaponIds: s.weaponIds
                          })),
          abilities:      UnitForm.state.abilities,
          equipment:      UnitForm.state.equipment,
          keywords:       UnitForm.state.keywords,
          notes:          document.getElementById('f-notes').value.trim() || '',
          source:         isEdit ? (UnitForm.state.originalSource || 'user') : 'user',
        };

        if (!isEdit) {
          const factionInfoRef = App.db.ref(`gameData/${system}/factions/${factionId}/info`);
          const fSnap = await factionInfoRef.once('value');
          if (!fSnap.val()) {
            await factionInfoRef.set({ name: faction, description: '', compositionRules: '' });
          }
        }

        await unitRef.set(unit);

        UnitForm.state.isDirty = false;
        const viewFactionId = isEdit ? UnitForm.state.factionId : factionId;
        UnitForm._showSuccess(system, viewFactionId, unitId);
      } catch (err) {
        const b = document.getElementById('btn-save');
        if (b) { b.disabled = false; b.textContent = 'Save to Library'; }
        alert(`Save failed: ${err.message}`);
      }
    },

    _showSuccess(system, factionId, unitId) {
      document.getElementById('screen-unit-form').innerHTML = `
        <div class="placeholder" style="gap:1.25rem;">
          <div style="font-size:2rem;color:var(--green);">&#x2713;</div>
          <h2>Unit Saved</h2>
          <p>Unit added to the library successfully.</p>
          <div style="display:flex;gap:0.75rem;margin-top:0.5rem;flex-wrap:wrap;justify-content:center;">
            <button class="btn btn-secondary"
                    onclick="location.hash='#unit-view/${system}/${factionId}/${unitId}'"
                    style="width:auto;padding:0.75rem 1.5rem;">View Unit</button>
            <button class="btn btn-secondary"
                    onclick="UnitForm.render('${system}', 'new', null)"
                    style="width:auto;padding:0.75rem 1.5rem;">Add Another Unit</button>
            <button class="btn btn-primary"
                    onclick="location.hash='#library/${system}'"
                    style="width:auto;padding:0.75rem 1.5rem;">Go to Library</button>
          </div>
        </div>
      `;
    }
  };

  // ── LIBRARY ──────────────────────────────────────────────────────────────────

  const Library = {
    state: { system: null, filter: 'all', search: '', factions: [] },

    async render(system) {
      Library.state = { system, filter: 'all', search: '', factions: [] };
      document.getElementById('screen-library').innerHTML = `
        <div class="lib-wrap">
          <div class="lib-toolbar">
            <input class="uf-input" id="lib-search" type="text" placeholder="Search units…">
            <button class="btn btn-primary lib-add-btn" id="lib-add">+ Add Unit</button>
          </div>
          <div class="lib-filters" id="lib-filters"></div>
          <div class="lib-list"    id="lib-list"><div class="loading-text">Loading…</div></div>
        </div>
      `;
      Library._bind();
      await Library._loadFactions(system);
    },

    async _loadFactions(system) {
      try {
        const snap = await App.db.ref(`gameData/${system}/factions`).once('value');
        const val  = snap.val() || {};
        Library.state.factions = Object.entries(val)
          .map(([fid, faction]) => ({
            id:    fid,
            name:  faction.info?.name || fid,
            units: Object.entries(faction.units || {}).map(([uid, u]) => ({
              id:     uid,
              name:   u.name,
              role:   u.role   || null,
              points: u.points != null ? u.points : null,
            }))
          }))
          .filter(f => f.units.length > 0)
          .sort((a, b) => a.name.localeCompare(b.name));
        Library._renderList();
      } catch (err) {
        document.getElementById('lib-list').innerHTML =
          `<div class="lib-empty">Error loading library: ${err.message}</div>`;
      }
    },

    _renderFilters() {
      const { factions, filter } = Library.state;
      document.getElementById('lib-filters').innerHTML = [
        `<button class="lib-filter ${filter === 'all' ? 'active' : ''}" data-faction="all">All</button>`,
        ...factions.map(f =>
          `<button class="lib-filter ${filter === f.id ? 'active' : ''}" data-faction="${f.id}">${f.name}</button>`
        )
      ].join('');
    },

    _renderList() {
      Library._renderFilters();
      const { system, factions, filter, search } = Library.state;
      const q = search.trim().toLowerCase();

      const groups = factions
        .filter(f => filter === 'all' || f.id === filter)
        .map(f => ({
          ...f,
          units: f.units.filter(u =>
            !q ||
            u.name.toLowerCase().includes(q) ||
            (u.role || '').toLowerCase().includes(q)
          )
        }))
        .filter(f => f.units.length > 0);

      const list = document.getElementById('lib-list');

      if (!groups.length) {
        list.innerHTML = `<div class="lib-empty">${
          q ? 'No units match your search.' : 'No units in this faction yet.'
        }</div>`;
        return;
      }

      list.innerHTML = groups.map(f => `
        <div class="lib-faction-group" data-faction="${f.id}">
          <div class="lib-faction-header">
            <span>${f.name}</span>
            <button class="lib-build-btn" onclick="event.stopPropagation();location.hash='#roster/new/${system}/${f.id}'">Build Roster</button>
          </div>
          ${f.units.map(u => `
            <div class="lib-unit-row"
                 onclick="Library._open('${system}','${f.id}','${u.id}')">
              <div class="lib-unit-info">
                <span class="lib-unit-name">${u.name}</span>
                ${u.role ? `<span class="lib-unit-role">${u.role}</span>` : ''}
              </div>
              <div class="lib-unit-meta">
                ${u.points != null ? `<span class="lib-unit-pts">${u.points} pts</span>` : ''}
                <button class="lib-action-btn lib-edit-btn"
                        onclick="event.stopPropagation();Library._edit('${system}','${f.id}','${u.id}')">Edit</button>
                <button class="lib-action-btn lib-del-btn"
                        onclick="event.stopPropagation();Library._delete('${system}','${f.id}','${u.id}','${u.name.replace(/'/g,"\\'")}')">×</button>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    },

    _bind() {
      document.getElementById('lib-add').addEventListener('click', () => {
        location.hash = `#unit/new/${Library.state.system}`;
      });
      document.getElementById('lib-search').addEventListener('input', e => {
        Library.state.search = e.target.value;
        Library._renderList();
      });
      document.getElementById('lib-filters').addEventListener('click', e => {
        const btn = e.target.closest('.lib-filter');
        if (!btn) return;
        Library.state.filter = btn.dataset.faction;
        Library._renderList();
      });
    },

    _open(system, factionId, unitId)   { location.hash = `#unit-view/${system}/${factionId}/${unitId}`; },
    _edit(system, factionId, unitId)   { location.hash = `#unit/edit/${system}/${factionId}/${unitId}`; },
    async _delete(system, factionId, unitId, name) {
      // ROSTER_UX_2 item 3: name the actual blast radius — this is
      // canonical gameData, not a personal draft. The router already
      // gated getting to this screen at all; this confirm is the last
      // line before an irreversible shared-library write.
      if (!confirm(`Delete "${name}"?\n\nThis removes it from the shared unit library for ALL rosters and future games — not just yours. This cannot be undone.`)) return;
      try {
        await App.db.ref(`gameData/${system}/factions/${factionId}/units/${unitId}`).remove();
        const faction = Library.state.factions.find(f => f.id === factionId);
        if (faction) faction.units = faction.units.filter(u => u.id !== unitId);
        Library.state.factions = Library.state.factions.filter(f => f.units.length > 0);
        Library._renderList();
      } catch (err) {
        alert(`Delete failed: ${err.message}`);
      }
    }
  };

  // ── FACTION PICKER (ROSTER_UX_2) ────────────────────────────────────────────
  // Player-facing "pick a faction to build with" step. Deliberately minimal —
  // no search, no +Add Unit, no per-unit Edit/Delete. Unit browsing for
  // roster-building itself happens inside RosterBuilder (it already has its
  // own browser — see RosterBuilder._renderBrowser); this screen's only job
  // is getting from "I picked a system" to "I'm in the builder for my
  // faction" in one uncluttered step.

  const FactionPicker = {
    async render(system) {
      const el = document.getElementById('screen-faction-pick');
      el.innerHTML = '<div class="lib-wrap"><div class="loading-text">Loading factions…</div></div>';
      try {
        const snap = await App.db.ref(`gameData/${system}/factions`).once('value');
        const val  = snap.val() || {};
        const factions = Object.entries(val)
          .map(([fid, faction]) => ({
            id:    fid,
            name:  faction.info?.name || fid,
            count: Object.keys(faction.units || {}).length,
          }))
          .filter(f => f.count > 0)
          .sort((a, b) => a.name.localeCompare(b.name));

        if (!factions.length) {
          el.innerHTML = '<div class="lib-wrap"><div class="lib-empty">No factions available yet for this system.</div></div>';
          return;
        }

        el.innerHTML = `
          <div class="lib-wrap">
            <p class="lead">Pick a faction to build a roster with:</p>
            <div class="lib-list">
              ${factions.map(f => `
                <div class="lib-faction-group">
                  <div class="lib-faction-header">
                    <span>${f.name} <span class="lib-unit-meta" style="font-weight:400;">(${f.count} units)</span></span>
                    <button class="btn btn-primary fp-build-btn" onclick="location.hash='#roster/new/${system}/${f.id}'">Build Roster</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } catch (err) {
        el.innerHTML = `<div class="lib-wrap"><div class="lib-empty">Error loading factions: ${err.message}</div></div>`;
      }
    },
  };

  // ── UNIT CARD ────────────────────────────────────────────────────────────────

  const UnitCard = {
    async render(system, factionId, unitId) {
      const el = document.getElementById('screen-unit-view');
      el.innerHTML = '<div class="loading-text">Loading…</div>';
      try {
        const snap = await App.db
          .ref(`gameData/${system}/factions/${factionId}/units/${unitId}`)
          .once('value');
        const unit = snap.val();
        if (!unit) {
          el.innerHTML = '<div class="placeholder"><h2>Unit not found</h2></div>';
          return;
        }
        const schema = App.schemas[system];
        el.innerHTML = UnitCard._buildPage(unit, schema);
        UnitCard._bind(unit, system, factionId);
      } catch (err) {
        el.innerHTML = `<div class="placeholder"><h2>Error</h2><p>${err.message}</p></div>`;
      }
    },

    _buildPage(unit, schema) {
      const weapons      = UnitCard._arr(unit.weapons);
      const abilities    = UnitCard._arr(unit.abilities);
      const equipment    = UnitCard._arr(unit.equipment);
      const keywords     = UnitCard._arr(unit.keywords);
      const loadoutOpts  = UnitCard._arr(unit.loadoutOptions);

      return `
        <div class="uc-wrap">
          <div class="uc-card">
            ${UnitCard._header(unit)}
            ${UnitCard._stats(unit, schema)}
            ${weapons.length   ? UnitCard._weapons(weapons, loadoutOpts, schema) : ''}
            ${abilities.length ? UnitCard._abilities(abilities) : ''}
            ${equipment.length ? UnitCard._tagSection('Equipment', equipment) : ''}
            ${keywords.length  ? UnitCard._tagSection('Keywords',  keywords)  : ''}
            ${unit.notes       ? UnitCard._notes(unit.notes) : ''}
            ${UnitCard._actions()}
          </div>
        </div>
      `;
    },

    _arr(v) {
      if (!v) return [];
      return Array.isArray(v) ? v : Object.values(v);
    },

    _header(unit) {
      const meta = [unit.faction, unit.role].filter(Boolean).join(' · ');
      return `
        <div class="uc-header">
          <div>
            <div class="uc-name">${unit.name}</div>
            ${meta ? `<div class="uc-meta">${meta}</div>` : ''}
          </div>
          ${unit.points != null ? `<div class="uc-points">${unit.points} PTS</div>` : ''}
        </div>
      `;
    },

    _stats(unit, schema) {
      const stats = unit.stats || {};
      const boxes = (schema.statBlock || []).map(s => `
        <div class="uc-stat">
          <div class="uc-stat-label">${s}</div>
          <div class="uc-stat-val">${stats[s] || '—'}</div>
        </div>
      `).join('');
      return `<div class="uc-stats">${boxes}</div>`;
    },

    _weapons(weapons, loadoutOpts, schema) {
      const profiles = schema.weaponProfiles || [];
      const hasType  = schema.hasWeaponType !== false;
      const byId     = Object.fromEntries(weapons.map(w => [w.id, w]));

      const headers = profiles.map(p => `<th>${p}</th>`).join('');
      const rows    = weapons.map(w => {
        const cells    = profiles.map(p => `<td>${w.profiles?.[p] || '—'}</td>`).join('');
        const typeBadge = hasType
          ? `<span class="uc-type-badge">${w.type === 'melee' ? 'M' : 'R'}</span>` : '';
        const star = w.isDefault ? `<span class="uc-default-star">★</span>` : '';
        return `
          <tr>
            <td><div class="uc-weapon-name">${cleanWeaponName(w.name) || '—'}${typeBadge}${star}</div></td>
            ${cells}
          </tr>
        `;
      }).join('');

      let loadoutHTML = '';
      if (loadoutOpts.length) {
        const slotRows = loadoutOpts.map(slot => {
          const names = UnitCard._arr(slot.weaponIds)
            .map(id => byId[id]?.name).filter(Boolean).join(', ');
          return `<div class="uc-loadout-row"><strong>${slot.slot}:</strong> ${names || '—'}</div>`;
        }).join('');
        loadoutHTML = `
          <div class="uc-loadout">
            <div class="uc-loadout-title">Loadout Options</div>
            ${slotRows}
          </div>
        `;
      }

      return `
        <div class="uc-section">
          <div class="uc-section-title">Weapons</div>
          <table class="uc-table">
            <thead><tr><th>Weapon</th>${headers}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${loadoutHTML}
        </div>
      `;
    },

    _abilities(abilities) {
      const items = abilities.map(a => `
        <div class="uc-ability">
          <div class="uc-ability-name">${a.name || ''}</div>
          <div class="uc-ability-text">${a.description || ''}</div>
        </div>
      `).join('');
      return `
        <div class="uc-section">
          <div class="uc-section-title">Abilities</div>
          ${items}
        </div>
      `;
    },

    _tagSection(label, items) {
      const tags = items.map(t =>
        `<span class="tag" style="cursor:default;">${t}</span>`
      ).join('');
      return `
        <div class="uc-section">
          <div class="uc-section-title">${label}</div>
          <div class="uc-tags">${tags}</div>
        </div>
      `;
    },

    _notes(text) {
      return `
        <div class="uc-section">
          <div class="uc-section-title">Notes</div>
          <div class="uc-notes-text">${text}</div>
        </div>
      `;
    },

    _actions() {
      return `
        <div class="uc-actions">
          <button class="btn btn-secondary" id="uc-edit">Edit</button>
          <button class="btn btn-secondary" id="uc-copy">Copy Unit</button>
          <button class="btn btn-danger"    id="uc-delete">Delete</button>
        </div>
      `;
    },

    _bind(unit, system, factionId) {
      document.getElementById('uc-edit').addEventListener('click', () => {
        location.hash = `#unit/edit/${system}/${factionId}/${unit.id}`;
      });

      document.getElementById('uc-copy').addEventListener('click', () => {
        const arr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
        const prefill = {
          ...unit,
          name: unit.name + ' (Copy)',
          id: null,
          weapons: arr(unit.weapons).map(w => ({ ...w, profiles: { ...w.profiles } })),
          loadoutOptions: arr(unit.loadoutOptions).map(s => ({ ...s, weaponIds: [...arr(s.weaponIds)] })),
          abilities:  arr(unit.abilities).map(a => ({ ...a })),
          equipment:  [...arr(unit.equipment)],
          keywords:   [...arr(unit.keywords)],
        };
        sessionStorage.setItem('unitFormPrefill', JSON.stringify(prefill));
        location.hash = `#unit/new/${system}`;
      });

      document.getElementById('uc-delete').addEventListener('click', async () => {
        if (!confirm(`Delete "${unit.name}"?\n\nThis cannot be undone.`)) return;
        const btn = document.getElementById('uc-delete');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        try {
          await App.db.ref(`gameData/${system}/factions/${factionId}/units/${unit.id}`).remove();
          location.hash = '#home';
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Delete';
          alert(`Delete failed: ${err.message}`);
        }
      });
    }
  };

  // ── ROSTER BUILDER ───────────────────────────────────────────────────────────

  const RosterBuilder = {
    state: null,

    _fresh(system, factionId) {
      return {
        rosterId: null, name: '', system, factionId,
        factionName: '', operatives: [], compositionRules: null,
        unitLibrary: [], _iCtr: 0, created: null, browserFilter: '',
      };
    },

    async render(system, factionId, rosterId) {
      const el = document.getElementById('screen-roster');

      if (rosterId) {
        el.innerHTML = '<div class="loading-text">Loading roster…</div>';
        try {
          const snap = await App.db.ref(`rosters/${rosterId}`).once('value');
          const data = snap.val();
          if (!data || !data.meta) {
            el.innerHTML = '<div class="placeholder"><h2>Roster not found</h2></div>';
            return;
          }
          system    = data.meta.gameSystem;
          factionId = data.meta.factionId;
          RosterBuilder.state             = RosterBuilder._fresh(system, factionId);
          RosterBuilder.state.rosterId    = rosterId;
          RosterBuilder.state.created     = data.meta.created || null;
          RosterBuilder.state.name        = data.meta.name    || '';
          const arr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          RosterBuilder.state.operatives  = arr(data.units).map(u => ({
            instanceId:    u.instanceId,
            unitId:        u.unitId,
            unitName:      u.unitName,
            role:          u.role          || null,
            points:        u.points        ?? null,
            countsAs:      u.countsAs      || 1,
            modelCount:    u.modelCount    ?? null,
            chosenLoadout: u.chosenLoadout || {},
            notes:         u.notes         || '',
            expanded:      false,
          }));
        } catch (err) {
          el.innerHTML = `<div class="placeholder"><h2>Error loading roster</h2><p>${err.message}</p></div>`;
          return;
        }
      } else if (!system || !factionId) {
        el.innerHTML = '<div class="placeholder"><h2>Select a faction from the Library to build a roster</h2></div>';
        return;
      } else {
        RosterBuilder.state = RosterBuilder._fresh(system, factionId);
      }

      el.innerHTML = RosterBuilder._shell();
      const nameEl = document.getElementById('rb-name');
      if (nameEl && RosterBuilder.state.name) nameEl.value = RosterBuilder.state.name;
      RosterBuilder._bind();
      await RosterBuilder._load();
      RosterBuilder._renderOperatives();
    },

    async _load() {
      const { system, factionId } = RosterBuilder.state;
      try {
        // Roster 3b Part 2 v3: for 40k, the flat pool (gameData/{system}/
        // {factionId}, keyed directly by unitId) is the canonical unit
        // source — it has squadSize/pointsTable, the BSData-pipeline
        // subtree (gameData/{system}/factions/{factionId}/units) doesn't
        // and is deprecated. KT is unaffected: unchanged confirmed-library
        // read below.
        if (system === 'warhammer-40k') {
          const poolSnap = await App.db.ref(`gameData/${system}/${factionId}`).once('value');
          const val = poolSnap.val() || {};

          RosterBuilder.state.factionName      = factionId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          RosterBuilder.state.compositionRules = null; // no legality banner for 40k yet — next roster brief

          const defName = `${RosterBuilder.state.factionName} Roster`;
          if (!RosterBuilder.state.name) RosterBuilder.state.name = defName;
          const nameEl = document.getElementById('rb-name');
          if (nameEl && !nameEl.value) nameEl.value = RosterBuilder.state.name;
          document.getElementById('rb-faction').textContent = RosterBuilder.state.factionName;

          RosterBuilder.state.unitLibrary = Object.entries(val)
            .map(([id, raw]) => UnitSearch._transformForRoster(id, raw))
            .sort((a, b) => (a.role || '').localeCompare(b.role || '') || (a.name || '').localeCompare(b.name || ''));

          RosterBuilder._renderBrowser();
          RosterBuilder._updateHeader();
          return;
        }

        const [infoSnap, unitsSnap] = await Promise.all([
          App.db.ref(`gameData/${system}/factions/${factionId}/info`).once('value'),
          App.db.ref(`gameData/${system}/factions/${factionId}/units`).once('value'),
        ]);

        const info = infoSnap.val() || {};
        RosterBuilder.state.factionName      = info.name || factionId;
        RosterBuilder.state.compositionRules = info.compositionRules || null;

        const def = `${RosterBuilder.state.factionName} Roster`;
        if (!RosterBuilder.state.name) RosterBuilder.state.name = def;
        const nameEl = document.getElementById('rb-name');
        if (nameEl && !nameEl.value) nameEl.value = RosterBuilder.state.name;
        document.getElementById('rb-faction').textContent = RosterBuilder.state.factionName;

        const val = unitsSnap.val() || {};
        RosterBuilder.state.unitLibrary = Object.entries(val)
          .map(([id, u]) => ({ ...u, id, countsAs: u.countsAs || 1 }))
          .sort((a, b) => (a.role || '').localeCompare(b.role || '') || (a.name || '').localeCompare(b.name || ''));

        RosterBuilder._renderBrowser();
        RosterBuilder._updateHeader();
      } catch (err) {
        document.getElementById('rb-browser').innerHTML =
          `<div class="rb-op-empty">Error loading faction: ${err.message}</div>`;
      }
    },

    _shell() {
      return `
        <div class="rb-wrap">
          <div class="rb-header">
            <div class="rb-header-top">
              <input class="uf-input rb-name-input" id="rb-name" type="text" placeholder="Roster name…">
              <div class="rb-counter" id="rb-counter">0 / — ${RosterBuilder._unitNoun()}</div>
            </div>
            <div class="rb-meta" id="rb-faction">Loading…</div>
            <div class="rb-legality-banner" id="rb-legality"></div>
          </div>
          <div class="rb-section-label">Operatives</div>
          <div class="rb-op-list" id="rb-op-list">
            <div class="rb-op-empty">No operatives added yet.</div>
          </div>
          <div class="rb-section-label rb-browser-label">Unit Browser</div>
          <div class="rb-browser" id="rb-browser">
            <div class="loading-text">Loading…</div>
          </div>
        </div>
        <div class="rb-actions">
          <div class="rb-draft-url" id="rb-draft-url">
            <span>Draft saved —</span>
            <a id="rb-share-link" href=""></a>
            <button class="rb-copy-btn" id="rb-copy-btn">Copy</button>
          </div>
          <button class="btn btn-secondary" id="rb-save">Save Draft</button>
          <button class="btn btn-primary"   id="rb-publish" disabled>Publish</button>
        </div>
      `;
    },

    _addOperative(unit) {
      RosterBuilder._invalidatePublish();
      const instanceId = `op_${Date.now()}_${++RosterBuilder.state._iCtr}`;
      const chosenLoadout = {};
      RosterBuilder._arr(unit.loadoutOptions).forEach(slot => {
        const ids = RosterBuilder._arr(slot.weaponIds);
        if (ids.length) chosenLoadout[slot.slot] = ids[0];
      });
      // Roster 3b Part 2 v3: variable-size 40k squads default to their
      // minimum and get a live-points recompute when changed (see
      // _setModelCount) — fixed-size/KT units have no squadSize, modelCount
      // stays null and points stays the flat value untouched.
      const hasVariableSize = unit.squadSize && unit.squadSize.min !== unit.squadSize.max;
      const modelCount = hasVariableSize ? unit.squadSize.min : null;
      RosterBuilder.state.operatives.push({
        instanceId, unitId: unit.id, unitName: unit.name,
        points: RosterBuilder._pointsFor(unit, modelCount),
        countsAs: unit.countsAs || 1, role: unit.role || null,
        chosenLoadout, modelCount, notes: '', expanded: false,
      });
      RosterBuilder._renderOperatives();
      RosterBuilder._renderBrowser();
      RosterBuilder._updateHeader();
    },

    // unit.pointsTable is normalized to { "<modelCount>": pts } by
    // _transformForRoster; falls back to the flat unit.points when there's
    // no modelCount yet, no table, or this count isn't a table key.
    _pointsFor(unit, modelCount) {
      if (modelCount != null && unit.pointsTable && unit.pointsTable[String(modelCount)] != null) {
        return unit.pointsTable[String(modelCount)];
      }
      return unit.points != null ? unit.points : null;
    },

    _setModelCount(instanceId, modelCount) {
      const op = RosterBuilder.state.operatives.find(o => o.instanceId === instanceId);
      if (!op) return;
      const unit = RosterBuilder.state.unitLibrary.find(u => u.id === op.unitId);
      if (!unit) return;
      RosterBuilder._invalidatePublish();
      op.modelCount = Number(modelCount);
      op.points = RosterBuilder._pointsFor(unit, op.modelCount);
      RosterBuilder._renderOperatives();
      RosterBuilder._updateHeader();
    },

    _removeOperative(instanceId) {
      RosterBuilder._invalidatePublish();
      RosterBuilder.state.operatives =
        RosterBuilder.state.operatives.filter(op => op.instanceId !== instanceId);
      RosterBuilder._renderOperatives();
      RosterBuilder._renderBrowser();
      RosterBuilder._updateHeader();
    },

    _moveOperative(instanceId, dir) {
      const ops = RosterBuilder.state.operatives;
      const idx = ops.findIndex(op => op.instanceId === instanceId);
      if (dir === 'up'   && idx > 0)              [ops[idx-1], ops[idx]] = [ops[idx], ops[idx-1]];
      if (dir === 'down' && idx < ops.length - 1) [ops[idx], ops[idx+1]] = [ops[idx+1], ops[idx]];
      RosterBuilder._renderOperatives();
    },

    _renderOperatives() {
      const list = document.getElementById('rb-op-list');
      const ops  = RosterBuilder.state.operatives;
      if (!ops.length) {
        list.innerHTML = '<div class="rb-op-empty">No operatives added yet.</div>';
        return;
      }
      list.innerHTML = ops.map((op, i) => {
        const unit = RosterBuilder.state.unitLibrary.find(u => u.id === op.unitId);
        return RosterBuilder._opRowHTML(op, i, ops.length, unit);
      }).join('');
    },

    _opRowHTML(op, i, total, unit) {
      const summary = unit ? RosterBuilder._summaryText(unit, op.chosenLoadout) : '';
      return `
        <div class="rb-op-row${op.expanded ? ' expanded' : ''}" data-iid="${op.instanceId}">
          <div class="rb-op-main" data-iid="${op.instanceId}">
            <div class="rb-op-info">
              <div class="rb-op-name">${op.unitName}</div>
              ${op.role ? `<div class="rb-op-role">${op.role}</div>` : ''}
              ${summary ? `<div class="rb-op-summary" data-iid="${op.instanceId}">${summary}</div>` : ''}
            </div>
            ${op.points != null ? `<div class="rb-op-pts">${op.points} pts</div>` : ''}
            <div class="rb-op-controls">
              <button class="arrow-btn" data-iid="${op.instanceId}" data-dir="up"
                      ${i === 0 ? 'disabled' : ''}>↑</button>
              <button class="arrow-btn" data-iid="${op.instanceId}" data-dir="down"
                      ${i === total - 1 ? 'disabled' : ''}>↓</button>
              <button class="remove-btn" data-iid="${op.instanceId}">×</button>
            </div>
          </div>
          ${op.expanded && unit ? RosterBuilder._loadoutPanel(op, unit) : ''}
        </div>
      `;
    },

    // Squad-size stepper (40k variable-size units only — squadSize.min !==
    // .max). Fixed-size and KT units have no squadSize, so this is a no-op
    // there.
    _squadSizeHTML(op, unit) {
      if (!unit.squadSize || unit.squadSize.min === unit.squadSize.max) return '';
      const { min, max } = unit.squadSize;
      const options = [];
      for (let n = min; n <= max; n++) options.push(n);
      return `
        <div class="rb-squad-size">
          <label>Squad size</label>
          <select class="uf-input" onchange="RosterBuilder._setModelCount('${op.instanceId}', this.value)">
            ${options.map(n => `<option value="${n}" ${op.modelCount === n ? 'selected' : ''}>${n} models</option>`).join('')}
          </select>
        </div>
      `;
    },

    // Points caveat (shadow-spectres-style pointsTable gaps — see
    // _normalizePointsTable) and the raw prose _parseWargear couldn't turn
    // into a clickable choice (Cadian Shock Troops' "for every N models"
    // special-weapon text is the acceptance case for this).
    _wargearNoticesHTML(unit) {
      const parts = [];
      if (unit.pointsCaveat) parts.push(`<div class="rb-points-caveat">${unit.pointsCaveat}</div>`);
      if (!unit.loadoutIsHandAuthored && (unit.unparsedWargear || []).length) {
        parts.push(`
          <div class="rb-wargear-unparsed">
            <div class="rb-wargear-unparsed-label">Additional wargear (not yet a pickable choice):</div>
            ${unit.unparsedWargear.map(u => `<div class="rb-wargear-unparsed-row">${u.rawText}</div>`).join('')}
            <button class="btn btn-secondary rb-author-loadout-btn" onclick="RosterBuilder._openLoadoutAuthor('${unit.id}')">
              Author this loadout…
            </button>
          </div>
        `);
      }
      return parts.join('');
    },

    _loadoutPanel(op, unit) {
      const slots   = RosterBuilder._arr(unit.loadoutOptions);
      const weapons = RosterBuilder._arr(unit.weapons);
      const schema  = App.schemas[RosterBuilder.state.system];
      const table   = RosterBuilder._profileTableHTML(unit, op.chosenLoadout, schema, op.instanceId);
      const squadSizeHTML = RosterBuilder._squadSizeHTML(op, unit);
      const noticesHTML   = RosterBuilder._wargearNoticesHTML(unit);

      if (!slots.length) {
        return `
          <div class="rb-loadout-panel">
            ${squadSizeHTML}
            <div class="rb-fixed-label">Fixed Loadout</div>
            ${table}
