            ${noticesHTML}
          </div>
        `;
      }

      const radioGroups = slots.map(slot => {
        const slotWeapons = RosterBuilder._arr(slot.weaponIds)
          .map(wid => weapons.find(w => w.id === wid)).filter(Boolean);
        const chosen   = op.chosenLoadout[slot.slot] || RosterBuilder._arr(slot.weaponIds)[0];
        const safeName = slot.slot.replace(/"/g, '&quot;');
        const radios   = slotWeapons.map(w => `
          <label class="rb-radio-label${chosen === w.id ? ' active' : ''}">
            <input type="radio" class="rb-loadout-radio"
                   data-iid="${op.instanceId}" data-slot="${safeName}"
                   name="slot_${op.instanceId}_${slot.slot.replace(/\s+/g, '_')}"
                   value="${w.id}" ${chosen === w.id ? 'checked' : ''}>
            ${cleanWeaponName(w.name) || '—'}
          </label>
        `).join('');
        return `
          <div class="rb-slot">
            <div class="rb-slot-label">${slot.slot}</div>
            <div class="rb-radio-group">${radios}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="rb-loadout-panel">
          ${squadSizeHTML}
          ${radioGroups}
          <div class="rb-wp-section">${table}</div>
          ${noticesHTML}
        </div>
      `;
    },

    // ── Lazy hand-author fallback hook (Roster 3b Part 2 v3, Scope #2) ──
    // Small dedicated editor, not a full UnitForm reuse — writes straight
    // back into the flat pool's own record (gameData/{system}/{factionId}/
    // {unitId}/loadoutOptions), the canonical source per the v3 decision,
    // NOT the deprecated gameData/{system}/factions/.../units subtree.
    // Skippable: closing without saving leaves the unit exactly as it was
    // (unparsedWargear notice still visible next time), which is the
    // "visibly marked as not authored" state — no separate flag needed.
    _loadoutAuthorState: null,

    _openLoadoutAuthor(unitId) {
      const unit = RosterBuilder.state.unitLibrary.find(u => u.id === unitId);
      if (!unit) return;
      RosterBuilder._loadoutAuthorState = { unitId, slots: [{ name: '', weaponIds: [] }] };
      RosterBuilder._renderLoadoutAuthor(unit);
    },

    _closeLoadoutAuthor() {
      RosterBuilder._loadoutAuthorState = null;
      const el = document.getElementById('rb-loadout-author-overlay');
      if (el) el.remove();
    },

    _renderLoadoutAuthor(unit) {
      let el = document.getElementById('rb-loadout-author-overlay');
      if (!el) {
        el = document.createElement('div');
        el.id = 'rb-loadout-author-overlay';
        el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;';
        document.body.appendChild(el);
      }

      const st = RosterBuilder._loadoutAuthorState;
      const weapons = RosterBuilder._arr(unit.weapons);

      const slotsHTML = st.slots.map((slot, si) => `
        <div style="border:1px solid #444;border-radius:6px;padding:0.6rem;margin-bottom:0.6rem;">
          <input class="uf-input" placeholder="Slot name (e.g. &quot;Replace flamer&quot;)"
                 value="${(slot.name || '').replace(/"/g, '&quot;')}"
                 oninput="RosterBuilder._loadoutAuthorState.slots[${si}].name = this.value">
          <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.4rem;">
            ${weapons.map(w => `
              <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.8rem;">
                <input type="checkbox" ${slot.weaponIds.includes(w.id) ? 'checked' : ''}
                       onchange="RosterBuilder._toggleAuthorWeapon(${si}, '${w.id}', this.checked)">
                ${cleanWeaponName(w.name)}
              </label>
            `).join('')}
          </div>
        </div>
      `).join('');

      el.innerHTML = `
        <div style="background:#1a1a1a;border:1px solid #555;border-radius:8px;padding:1rem;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;">
          <h3 style="margin-top:0;">Author loadout — ${unit.name}</h3>
          <div style="font-size:0.8rem;color:#999;margin-bottom:0.8rem;">
            Reference text for this unit's wargear is in the operative panel — use it to decide slots.
            Each slot becomes a radio-button choice; check every weapon that's a valid option for it.
          </div>
          <div id="rb-loadout-author-slots">${slotsHTML}</div>
          <button class="btn btn-secondary" onclick="RosterBuilder._addAuthorSlot('${unit.id}')">+ Add slot</button>
          <div style="display:flex;gap:0.5rem;margin-top:1rem;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="RosterBuilder._closeLoadoutAuthor()">Skip — author later</button>
            <button class="btn btn-primary" onclick="RosterBuilder._saveLoadoutAuthor()">Save</button>
          </div>
        </div>
      `;
    },

    _toggleAuthorWeapon(slotIdx, weaponId, checked) {
      const slot = RosterBuilder._loadoutAuthorState.slots[slotIdx];
      if (checked) { if (!slot.weaponIds.includes(weaponId)) slot.weaponIds.push(weaponId); }
      else slot.weaponIds = slot.weaponIds.filter(id => id !== weaponId);
    },

    _addAuthorSlot(unitId) {
      RosterBuilder._loadoutAuthorState.slots.push({ name: '', weaponIds: [] });
      const unit = RosterBuilder.state.unitLibrary.find(u => u.id === unitId);
      RosterBuilder._renderLoadoutAuthor(unit);
    },

    async _saveLoadoutAuthor() {
      const st = RosterBuilder._loadoutAuthorState;
      const { system, factionId } = RosterBuilder.state;
      const loadoutOptions = st.slots
        .filter(s => s.name.trim() && s.weaponIds.length)
        .map(s => ({ slot: s.name.trim(), weaponIds: s.weaponIds }));

      if (!loadoutOptions.length) { alert('Add at least one named slot with a weapon checked.'); return; }

      try {
        await App.db.ref(`gameData/${system}/${factionId}/${st.unitId}/loadoutOptions`).set(loadoutOptions);
      } catch (err) {
        alert(`Could not save: ${err.message}`);
        return;
      }

      // Reflect immediately without a full reload — mirrors what the
      // transform would produce on next load (hand-authored takes
      // precedence, unparsed notice clears).
      const unit = RosterBuilder.state.unitLibrary.find(u => u.id === st.unitId);
      if (unit) {
        unit.loadoutOptions = loadoutOptions;
        unit.loadoutIsHandAuthored = true;
        unit.unparsedWargear = [];
      }
      RosterBuilder._closeLoadoutAuthor();
      RosterBuilder._renderOperatives();
    },

    _profileTableHTML(unit, chosenLoadout, schema, iid) {
      const weapons  = RosterBuilder._resolveChosenWeapons(unit, chosenLoadout);
      const profiles = schema?.weaponProfiles || [];
      const hasType  = schema?.hasWeaponType !== false;
      const headers  = profiles.map(p => `<th>${p}</th>`).join('');
      const rows = weapons.map(w => {
        const cells     = profiles.map(p => `<td>${w.profiles?.[p] || '—'}</td>`).join('');
        const typeBadge = hasType ? `<span class="uc-type-badge">${w.type === 'melee' ? 'M' : 'R'}</span>` : '';
        return `<tr><td><span class="rb-wp-name">${cleanWeaponName(w.name) || '—'}</span>${typeBadge}</td>${cells}</tr>`;
      }).join('');
      return `
        <table class="rb-wp-table" data-iid="${iid}">
          <thead><tr><th>Weapon</th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    },

    _resolveChosenWeapons(unit, chosenLoadout) {
      const weapons = RosterBuilder._arr(unit.weapons);
      const slots   = RosterBuilder._arr(unit.loadoutOptions);
      if (!slots.length) return weapons;
      const slottedIds = new Set(slots.flatMap(s => RosterBuilder._arr(s.weaponIds)));
      const fixed      = weapons.filter(w => !slottedIds.has(w.id));
      const chosen     = slots.map(slot => {
        const wid = (chosenLoadout && chosenLoadout[slot.slot]) || RosterBuilder._arr(slot.weaponIds)[0];
        return weapons.find(w => w.id === wid) || null;
      }).filter(Boolean);
      return [...fixed, ...chosen];
    },

    _summaryText(unit, chosenLoadout) {
      const weapons = RosterBuilder._resolveChosenWeapons(unit, chosenLoadout);
      // Weapons with a ranged AND melee profile (e.g. "Singing spear" thrown
      // vs melee) are two distinct weapon records sharing one display name —
      // dedupe by name here so the summary line doesn't say the name twice.
      // The full profile table below still shows both profile rows.
      const names   = [...new Set(weapons.map(w => cleanWeaponName(w.name)).filter(Boolean))];
      return names.length ? `${unit.name} — ${names.join(' · ')}` : '';
    },

    _refreshProfileTable(iid, unit, chosenLoadout, schema) {
      const table = document.querySelector(`.rb-wp-table[data-iid="${iid}"]`);
      if (!table) return;
      const tbody    = table.querySelector('tbody');
      const weapons  = RosterBuilder._resolveChosenWeapons(unit, chosenLoadout);
      const profiles = schema?.weaponProfiles || [];
      const hasType  = schema?.hasWeaponType !== false;
      tbody.innerHTML = weapons.map(w => {
        const cells     = profiles.map(p => `<td>${w.profiles?.[p] || '—'}</td>`).join('');
        const typeBadge = hasType ? `<span class="uc-type-badge">${w.type === 'melee' ? 'M' : 'R'}</span>` : '';
        return `<tr><td><span class="rb-wp-name">${cleanWeaponName(w.name) || '—'}</span>${typeBadge}</td>${cells}</tr>`;
      }).join('');
    },

    _refreshSummary(iid, unit, chosenLoadout) {
      const el = document.querySelector(`.rb-op-summary[data-iid="${iid}"]`);
      if (el) el.textContent = RosterBuilder._summaryText(unit, chosenLoadout);
    },

    _refreshRadioLabels(iid, slotName, chosenWid) {
      const panel = document.querySelector(`.rb-op-row[data-iid="${iid}"] .rb-loadout-panel`);
      if (!panel) return;
      panel.querySelectorAll('.rb-radio-label').forEach(lbl => {
        const radio = lbl.querySelector('input.rb-loadout-radio');
        if (radio && radio.dataset.slot === slotName) {
          lbl.classList.toggle('active', radio.value === chosenWid);
        }
      });
    },

    // 40k's flat pool is 100+ units per faction — RosterBuilder now reads it
    // directly (Roster 3b Part 2 v3), so the old "go search a separate
    // screen, then come back" button no longer has a purpose; an inline
    // filter on this same browser does the job the search screen used to.
    _renderBrowser() {
      const browser  = document.getElementById('rb-browser');
      const { system } = RosterBuilder.state;
      const filter   = (RosterBuilder.state.browserFilter || '').trim().toLowerCase();
      const allUnits = RosterBuilder.state.unitLibrary;
      const units    = (system === 'warhammer-40k' && filter)
        ? allUnits.filter(u => (u.name || '').toLowerCase().includes(filter))
        : allUnits;

      const filterHTML = system === 'warhammer-40k' ? `
        <div class="rb-browser-filter">
          <input class="uf-input" id="rb-browser-search" type="text"
                 placeholder="Filter ${allUnits.length} units…"
                 value="${(RosterBuilder.state.browserFilter || '').replace(/"/g, '&quot;')}"
                 oninput="RosterBuilder._onBrowserFilterInput(this.value)">
        </div>` : '';

      if (!allUnits.length) {
        browser.innerHTML = filterHTML + `<div class="rb-op-empty">${
          system === 'warhammer-40k'
            ? 'No units found for this faction.'
            : 'No units in library for this faction yet.'
        }</div>`;
        return;
      }

      if (!units.length) {
        browser.innerHTML = filterHTML + '<div class="rb-op-empty">No units match.</div>';
        return;
      }

      browser.innerHTML = filterHTML + RosterBuilder._sectionedUnitsHTML(units);
    },

    // 40k's flat pool has no `role` field — _transformForRoster maps its
    // 3-value `category` (character/infantry/vehicle) onto `role` as a
    // stand-in, so this map only ever sees those three lowercase strings.
    // KT's real `role` field is per-operative naming (e.g. "Combat Medic"),
    // not a shared category — verified against live data, every KT faction
    // has as many distinct role values as it has units. Sectioning still
    // applies to it per-brief, it just doesn't group anything.
    _ROLE_DISPLAY: { character: 'Characters', infantry: 'Infantry', vehicle: 'Vehicles' },
    _ROLE_SECTION_ORDER: ['Characters', 'Infantry', 'Vehicles'],

    _sectionLabel(role) {
      const trimmed = (role || '').trim();
      if (!trimmed) return 'Other';
      return RosterBuilder._ROLE_DISPLAY[trimmed.toLowerCase()] || trimmed;
    },

    _sectionedUnitsHTML(units) {
      const sections = new Map();
      units.forEach(u => {
        const label = RosterBuilder._sectionLabel(u.role);
        if (!sections.has(label)) sections.set(label, []);
        sections.get(label).push(u);
      });

      const order = RosterBuilder._ROLE_SECTION_ORDER;
      const labels = [...sections.keys()].sort((a, b) => {
        if (a === 'Other') return 1;
        if (b === 'Other') return -1;
        const ia = order.indexOf(a), ib = order.indexOf(b);
        if (ia !== -1 || ib !== -1) return (ia === -1 ? order.length : ia) - (ib === -1 ? order.length : ib);
        return a.localeCompare(b);
      });

      return labels.map(label => {
        const rows = sections.get(label)
          .slice()
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
          .map(u => RosterBuilder._unitRowHTML(u))
          .join('');
        return `<div class="rb-role-section-label">${label}</div>${rows}`;
      }).join('');
    },

    _unitRowHTML(u) {
      const chk = RosterBuilder._checkMaxed(u);
      return `
        <div class="rb-unit-row${chk.maxed ? ' maxed' : ''}">
          <div class="rb-unit-info">
            <div class="rb-unit-name">${u.name}</div>
          </div>
          ${u.points != null ? `<div class="rb-unit-pts">${u.points} pts</div>` : ''}
          <button class="rb-add-btn" data-uid="${u.id}"
                  ${chk.maxed ? `disabled title="${chk.reason}"` : ''}>+ Add</button>
        </div>
      `;
    },

    // Filtering re-renders the whole browser innerHTML (same pattern as
    // every other RosterBuilder update) — restore focus/cursor so typing
    // doesn't visibly lose the input each keystroke.
    _onBrowserFilterInput(value) {
      RosterBuilder.state.browserFilter = value;
      const el = document.getElementById('rb-browser-search');
      const pos = el ? el.selectionStart : null;
      RosterBuilder._renderBrowser();
      const newEl = document.getElementById('rb-browser-search');
      if (newEl) { newEl.focus(); if (pos != null) newEl.setSelectionRange(pos, pos); }
    },

    // "ops" is Kill Team vocabulary (operatives) — 40k rosters count units.
    _unitNoun() {
      return RosterBuilder.state.system === 'warhammer-40k' ? 'units' : 'ops';
    },

    _updateHeader() {
      const ops   = RosterBuilder.state.operatives;
      const rules = RosterBuilder.state.compositionRules;
      const total = ops.reduce((s, op) => s + (op.countsAs || 1), 0);
      const max   = rules?.totalOperatives?.max;
      const pts   = ops.reduce((s, op) => s + (op.points || 0), 0);
      const el    = document.getElementById('rb-counter');
      if (!el) return;
      const noun  = RosterBuilder._unitNoun();
      const label = max != null ? `${total} / ${max} ${noun}` : `${total} ${noun}`;
      el.textContent = pts > 0 ? `${label} · ${pts} pts` : label;
      el.className   = 'rb-counter' +
        (max && total > max ? ' over' : max && total === max ? ' full' : '');
      RosterBuilder._updateLegalityBanner();
    },

    _checkMaxed(unit) {
      const rules = RosterBuilder.state.compositionRules;
      if (!rules) return { maxed: false };
      const ops  = RosterBuilder.state.operatives;

      const used = ops.reduce((s, op) => s + (op.countsAs || 1), 0);
      const left = rules.totalOperatives.max - used;
      if ((unit.countsAs || 1) > left) {
        return { maxed: true, reason: `Only ${left} slot${left === 1 ? '' : 's'} remaining` };
      }

      const unitCount = ops.filter(op => op.unitId === unit.id).length;

      const maxRule = (rules.rules || []).find(r => r.type === 'max' && r.unitRole === unit.role);
      if (maxRule && unitCount >= maxRule.count) {
        return { maxed: true, reason: maxRule.description };
      }

      const uniqueRule = (rules.rules || []).find(r => r.type === 'unique');
      if (uniqueRule) {
        const excluded = uniqueRule.excludeRoles || [];
        if (!excluded.includes(unit.role) && unitCount >= 1) {
          return { maxed: true, reason: `Only one ${unit.role || unit.name} allowed` };
        }
      }

      return { maxed: false };
    },

    _arr(v) {
      if (!v) return [];
      return Array.isArray(v) ? v : Object.values(v);
    },

    _checkLegality() {
      const rules = RosterBuilder.state.compositionRules;
      const ops   = RosterBuilder.state.operatives;
      // legal: null means "not validated" (no compositionRules exist for
      // this faction yet — true for all of 40k right now) — a THIRD state,
      // deliberately distinct from true/false. Returning legal:true here
      // was fine when compositionRules was always populated for every real
      // faction; 40k is the first legitimate case where it's null, and
      // that vacuous-true default is exactly what stamped a "Legal" badge
      // on 40k drafts no check had actually run against.
      if (!rules) return { legal: null, violations: [] };

      const violations = [];
      const total = ops.reduce((s, op) => s + (op.countsAs || 1), 0);

      // 1. Total operative count vs min/max
      const { min, max } = rules.totalOperatives || {};
      if (min != null && total < min) {
        violations.push(`Need ${min} operative${min === 1 ? '' : 's'} — have ${total}`);
      }
      if (max != null && total > max) {
        violations.push(`Too many operatives — maximum ${max}, have ${total}`);
      }

      // 2. Required roles present
      (rules.rules || []).filter(r => r.type === 'required').forEach(r => {
        const count = ops.filter(op => op.role === r.unitRole).length;
        if (count < r.count) {
          violations.push(r.description || `Requires ${r.count} ${r.unitRole}`);
        }
      });

      // 3. Role maximums not exceeded
      (rules.rules || []).filter(r => r.type === 'max').forEach(r => {
        const count = ops.filter(op => op.role === r.unitRole).length;
        if (count > r.count) {
          violations.push(r.description || `Maximum ${r.count} ${r.unitRole} — have ${count}`);
        }
      });

      // 4. Unique constraint — each non-repeatable unit template may appear only once
      const uniqueRule = (rules.rules || []).find(r => r.type === 'unique');
      if (uniqueRule) {
        const excluded = new Set(uniqueRule.excludeRoles || []);
        const unitCounts = {};
        ops.forEach(op => {
          if (!excluded.has(op.role)) {
            unitCounts[op.unitId] = (unitCounts[op.unitId] || 0) + 1;
          }
        });
        Object.entries(unitCounts).forEach(([uid, count]) => {
          if (count > 1) {
            const unit = RosterBuilder.state.unitLibrary.find(u => u.id === uid);
            violations.push(`Only one ${unit?.name || uid} allowed`);
          }
        });
      }

      // 5. Special per-faction loadout rules — added per faction as needed
      violations.push(...RosterBuilder._checkSpecialRules());

      return { legal: violations.length === 0, violations };
    },

    _checkSpecialRules() {
      // Faction-specific cross-team weapon limits.
      // When more factions need this treatment, convert to a dispatch table keyed by factionId.
      const errors = [];
      if (RosterBuilder.state.factionId === 'void-dancer-troupe') {
        const fusionCount = RosterBuilder.state.operatives.filter(op =>
          Object.values(op.chosenLoadout || {}).includes('w-fusion-pistol')
        ).length;
        const neuroCount = RosterBuilder.state.operatives.filter(op =>
          Object.values(op.chosenLoadout || {}).includes('w-neuro-disruptor')
        ).length;
        if (fusionCount > 1) errors.push('Max 1 fusion pistol across the team');
        if (neuroCount  > 1) errors.push('Max 1 neuro disruptor across the team');
      }
      return errors;
    },

    async _doSaveDraft() {
      const btn = document.getElementById('rb-save');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      try {
        const s   = RosterBuilder.state;
        const pts = s.operatives.reduce((sum, op) => sum + (op.points || 0), 0);

        const isNew = !s.rosterId;
        if (isNew) {
          s.rosterId = App.db.ref('rosters').push().key;
          s.created  = Date.now();
          localStorage.setItem(`roster_owner_${s.rosterId}`, '1');
        }

        const { legal } = RosterBuilder._checkLegality();
        const meta = {
          name:        s.name || 'Untitled Roster',
          gameSystem:  s.system,
          factionId:   s.factionId,
          factionName: s.factionName,
          created:     s.created,
          updated:     Date.now(),
          pointsTotal: pts,
          status:      'draft',
          isLegal:     legal,
        };

        const units = s.operatives.map(op => ({
          instanceId:    op.instanceId,
          unitId:        op.unitId,
          unitName:      op.unitName,
          role:          op.role,
          points:        op.points,
          countsAs:      op.countsAs,
          modelCount:    op.modelCount ?? null,
          chosenLoadout: op.chosenLoadout,
          notes:         op.notes,
        }));

        await App.db.ref(`rosters/${s.rosterId}`).update({ meta, units });
        RosterBuilder._showDraftURL(s.rosterId);
      } catch (err) {
        alert(`Save failed: ${err.message}`);
      } finally {
        const b = document.getElementById('rb-save');
        if (b) { b.disabled = false; b.textContent = 'Save Draft'; }
      }
    },

    _showDraftURL(rosterId) {
      const url   = `${location.origin}${location.pathname}#roster/${rosterId}`;
      const div   = document.getElementById('rb-draft-url');
      const link  = document.getElementById('rb-share-link');
      const label = div?.querySelector('span');
      if (!div || !link) return;
      if (label) label.textContent = 'Draft saved —';
      link.href        = url;
      link.textContent = url;
      div.classList.add('visible');
    },

    _showPublishedURL(rosterId) {
      const url   = `${location.origin}${location.pathname}#roster/${rosterId}`;
      const div   = document.getElementById('rb-draft-url');
      const link  = document.getElementById('rb-share-link');
      const label = div?.querySelector('span');
      if (!div || !link) return;
      if (label) label.textContent = 'Published —';
      link.href        = url;
      link.textContent = url;
      div.classList.add('visible');
    },

    _invalidatePublish() {
      const s = RosterBuilder.state;
      if (!s.rosterId) return;
      s.rosterId = null;
      s.created  = null;
      const div = document.getElementById('rb-draft-url');
      if (div) div.classList.remove('visible');
    },

    // BUG_40K_PUBLISH_2 Amendment 2: Firebase forbids . # $ / [ ] in keys.
    // 40k's weaponProfiles schema uses 'BS/WS' as a single combined
    // ballistic-/weapon-skill column (schema.weaponProfiles, line ~1580) —
    // that key reaches the export verbatim via _transformForRoster's
    // profiles object and gets rejected on write. Fixed 1:1 renames go
    // here first (documented, since Part 3's sim reads these exact export
    // keys); anything else forbidden falls through to a general strip so
    // one bad key doesn't reappear as a silent publish failure elsewhere.
    // Also applied to chosenLoadout's keys: those come from _parseWargear's
    // prose-derived slot names, which are far less constrained than a fixed
    // schema list — a live sweep of both 40k factions' real wargear text
    // found 3 units (ynnari-kabalite-warriors, hippogriff-afv, kasrkin)
    // where a parser mis-split produces a garbled slot label containing a
    // literal period. That's a distinct _parseWargear quality bug (garbage
    // slot text, not just a forbidden character) worth its own brief —
    // not fixed here — but sanitizing defensively at the export boundary
    // still stops it from breaking publish for those 3 units today.
    _FIREBASE_KEY_MAP: { 'BS/WS': 'bsws' },
    _sanitizeFirebaseKey(key) {
      const map = RosterBuilder._FIREBASE_KEY_MAP;
      if (Object.prototype.hasOwnProperty.call(map, key)) return map[key];
      return /[.#$/\[\]]/.test(key) ? key.replace(/[.#$/\[\]]/g, '') : key;
    },
    _sanitizeKeyedObject(obj) {
      const out = {};
      for (const [k, v] of Object.entries(obj || {})) out[RosterBuilder._sanitizeFirebaseKey(k)] = v;
      return out;
    },

    async _doPublish() {
      const btn = document.getElementById('rb-publish');
      if (btn) { btn.disabled = true; btn.textContent = 'Publishing…'; }
      try {
        const s = RosterBuilder.state;

        // Ensure a roster node exists in Firebase
        if (!s.rosterId) {
          s.rosterId = App.db.ref('rosters').push().key;
          s.created  = Date.now();
          localStorage.setItem(`roster_owner_${s.rosterId}`, '1');
        }

        const pts = s.operatives.reduce((sum, op) => sum + (op.points || 0), 0);

        const arr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);

        // Roster 3b Part 2 v3: for 40k, templates come from the already-
        // transformed unitLibrary in memory (flat pool, canonical) — NOT a
        // fresh fetch from the deprecated gameData/{system}/factions/...
        // subtree, which has no loadoutOptions at all and would silently
        // publish every 40k roster with an empty chosenLoadout. KT keeps
        // its original fresh-fetch-from-confirmed-library behavior,
        // unchanged, below.
        let templates;
        if (s.system === 'warhammer-40k') {
          templates = {};
          for (const u of s.unitLibrary) templates[u.id] = u;
        } else {
          const tSnap = await App.db
            .ref(`gameData/${s.system}/factions/${s.factionId}/units`)
            .once('value');
          templates = tSnap.val() || {};
        }

        const units = s.operatives.map(op => {
          const tmpl    = templates[op.unitId] || {};
          const rawWeapons = arr(tmpl.weapons);
          // Sanitize weapon profile keys before anything else derives from
          // this array, so chosenLoadout (built below from these same
          // weapon objects) inherits clean keys too rather than needing a
          // second pass.
          const weapons = rawWeapons.map(w => ({ ...w, profiles: RosterBuilder._sanitizeKeyedObject(w.profiles) }));
          // Resolve chosenLoadout IDs → full weapon objects (each weapon
          // object already carries its own `bonuses` array, if any, since
          // it's copied whole — nothing strips it). Slot keys are also
          // sanitized: they're prose-derived (_parseWargear), not a fixed
          // schema list, so they're not guaranteed clean.
          const chosenLoadout = {};
          arr(tmpl.loadoutOptions).forEach(slot => {
            const wid    = (op.chosenLoadout && op.chosenLoadout[slot.slot])
                           || arr(slot.weaponIds)[0];
            const weapon = weapons.find(w => w.id === wid);
            if (weapon) chosenLoadout[RosterBuilder._sanitizeFirebaseKey(slot.slot)] = { ...weapon };
          });
          return {
            instanceId:   op.instanceId,
            unitId:       op.unitId,
            name:         op.unitName,
            role:         op.role       || null,
            points:       op.points     ?? null,
            countsAs:     op.countsAs   || 1,
            modelCount:   op.modelCount ?? null,
            stats:        tmpl.stats    || {},
            weapons:      weapons.map(w => ({ ...w })),
            chosenLoadout,
            abilities:    arr(tmpl.abilities).map(a => ({ ...a })),
            keywords:     arr(tmpl.keywords || tmpl.tags),
            equipment:    arr(tmpl.equipment),
            notes:        op.notes      || '',
          };
        });

        const exportData = {
          meta: {
            name:        s.name || 'Untitled Roster',
            gameSystem:  s.system,
            factionId:   s.factionId,
            factionName: s.factionName,
            pointsTotal: pts,
            publishedAt: Date.now(),
            rosterId:    s.rosterId,
          },
          units,
        };

        // Write export and mark draft published in parallel. isLegal was
        // previously hardcoded true here — harmless while the Publish
        // button's own disabled-without-rules gate was the only way to
        // reach this code, but a defense-in-depth fix belongs here too:
        // record what was actually checked, not an assumption.
        const { legal: publishLegal } = RosterBuilder._checkLegality();
        await Promise.all([
          App.db.ref(`exports/${s.system}/${s.rosterId}`).set(exportData),
          App.db.ref(`rosters/${s.rosterId}/meta`).update({ status: 'published', isLegal: publishLegal }),
        ]);

        const publishedId = s.rosterId;
        // Clear state — subsequent edits will create a new draft
        s.rosterId = null;
        s.created  = null;
        RosterBuilder._showPublishedURL(publishedId);
      } catch (err) {
        alert(`Publish failed: ${err.message}`);
      } finally {
        const b = document.getElementById('rb-publish');
        if (b) {
          const { legal } = RosterBuilder._checkLegality();
          b.disabled    = legal === false; // null (unvalidated) is publishable
          b.textContent = 'Publish';
        }
      }
    },

    _updateLegalityBanner() {
      const banner  = document.getElementById('rb-legality');
      const publish = document.getElementById('rb-publish');
      if (!banner) return;

      // AMENDMENT 1 (BUG_40K_PUBLISH_1): null legality — no compositionRules
      // for this faction (all of 40k today) — is PUBLISHABLE. Only an
      // explicit legal === false blocks Publish; unvalidated is not the same
      // as forbidden. This used to return early with publish.disabled=true
      // for any faction lacking rules, which locked 40k publishing entirely.
      const { legal, violations } = RosterBuilder._checkLegality();

      if (legal === null) {
        banner.className   = 'rb-legality-banner';
        banner.textContent = 'Not validated — no composition rules for this faction yet';
      } else if (legal) {
        banner.className  = 'rb-legality-banner legal';
        banner.textContent = 'Roster is legal';
      } else {
        banner.className = 'rb-legality-banner illegal';
        banner.innerHTML = violations.map(v => `<div>• ${v}</div>`).join('');
      }

      if (publish) publish.disabled = legal === false;
    },

    _bind() {
      document.getElementById('rb-name').addEventListener('input', e => {
        RosterBuilder.state.name = e.target.value;
        RosterBuilder._invalidatePublish();
      });

      const opList = document.getElementById('rb-op-list');

      opList.addEventListener('click', e => {
        if (e.target.classList.contains('arrow-btn')) {
          RosterBuilder._moveOperative(e.target.dataset.iid, e.target.dataset.dir);
          return;
        }
        if (e.target.classList.contains('remove-btn')) {
          RosterBuilder._removeOperative(e.target.dataset.iid);
          return;
        }
        if (!e.target.closest('.rb-op-controls') && !e.target.closest('.rb-loadout-panel')) {
          const row = e.target.closest('.rb-op-row');
          if (row) {
            const op = RosterBuilder.state.operatives.find(o => o.instanceId === row.dataset.iid);
            if (op) {
              op.expanded = !op.expanded;
              RosterBuilder._renderOperatives();
            }
          }
        }
      });

      opList.addEventListener('change', e => {
        if (!e.target.classList.contains('rb-loadout-radio')) return;
        const { iid, slot } = e.target.dataset;
        const wid = e.target.value;
        const op  = RosterBuilder.state.operatives.find(o => o.instanceId === iid);
        if (!op) return;
        op.chosenLoadout[slot] = wid;
        const unit   = RosterBuilder.state.unitLibrary.find(u => u.id === op.unitId);
        const schema = App.schemas[RosterBuilder.state.system];
        RosterBuilder._refreshProfileTable(iid, unit, op.chosenLoadout, schema);
        RosterBuilder._refreshSummary(iid, unit, op.chosenLoadout);
        RosterBuilder._refreshRadioLabels(iid, slot, wid);
      });

      document.getElementById('rb-browser').addEventListener('click', e => {
        const btn = e.target.closest('.rb-add-btn');
        if (!btn || btn.disabled) return;
        const unit = RosterBuilder.state.unitLibrary.find(u => u.id === btn.dataset.uid);
        if (unit) RosterBuilder._addOperative(unit);
      });

      document.getElementById('rb-save').addEventListener('click', RosterBuilder._doSaveDraft);
      document.getElementById('rb-copy-btn').addEventListener('click', () => {
        const link = document.getElementById('rb-share-link');
        if (!link?.href) return;
        navigator.clipboard.writeText(link.href).then(() => {
          const btn = document.getElementById('rb-copy-btn');
          if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 1500); }
        }).catch(() => {});
      });
      document.getElementById('rb-publish').addEventListener('click', RosterBuilder._doPublish);
    },
  };

  // ── ROSTER VIEW ──────────────────────────────────────────────────────────────

  const RosterView = {
    async render(rosterId) {
      const el = document.getElementById('screen-roster');
      el.innerHTML = '<div class="loading-text">Loading…</div>';
      try {
        const snap = await App.db.ref(`rosters/${rosterId}`).once('value');
        const data = snap.val();
        if (!data) {
          el.innerHTML = '<div class="placeholder"><h2>Roster not found</h2><p>This link may be invalid or the roster was deleted.</p></div>';
          return;
        }
        const { meta, units } = data;
        const unitTemplates = await RosterView._loadUnitTemplates(meta.gameSystem, meta.factionId);
        const isOwner = !!localStorage.getItem(`roster_owner_${rosterId}`);
        el.innerHTML = RosterView._buildPage(rosterId, meta, units, unitTemplates, isOwner);
      } catch (err) {
        el.innerHTML = `<div class="placeholder"><h2>Error loading roster</h2><p>${err.message}</p></div>`;
      }
    },

    async _loadUnitTemplates(system, factionId) {
      try {
        const snap = await App.db.ref(`gameData/${system}/factions/${factionId}/units`).once('value');
        return snap.val() || {};
      } catch { return {}; }
    },

    _arr(v) {
      if (!v) return [];
      return Array.isArray(v) ? v : Object.values(v);
    },

    _resolveWeaponNames(op, unitTemplate) {
      if (!unitTemplate) return [];
      const weapons    = RosterView._arr(unitTemplate.weapons);
      const slots      = RosterView._arr(unitTemplate.loadoutOptions);
      const loadout    = op.chosenLoadout || {};
      // Same dedupe as RosterBuilder._summaryText: a ranged+melee profile
      // pair sharing one display name (e.g. "Singing spear") is two weapon
      // records, not two items — collapse to one mention in this summary.
      if (!slots.length) return [...new Set(weapons.map(w => cleanWeaponName(w.name)).filter(Boolean))];
      const slottedIds = new Set(slots.flatMap(s => RosterView._arr(s.weaponIds)));
      const fixed      = weapons.filter(w => !slottedIds.has(w.id)).map(w => cleanWeaponName(w.name)).filter(Boolean);
      const chosen     = slots.map(slot => {
        const wid = loadout[slot.slot] || RosterView._arr(slot.weaponIds)[0];
        const w   = weapons.find(w => w.id === wid);
        return w ? cleanWeaponName(w.name) : null;
      }).filter(Boolean);
      return [...new Set([...fixed, ...chosen])];
    },

    _buildPage(rosterId, meta, units, unitTemplates, isOwner) {
      const ops   = RosterView._arr(units);
      const total = ops.reduce((s, op) => s + (op.countsAs || 1), 0);
      const pts   = meta.pointsTotal || 0;

      const systemName = App.schemas[meta.gameSystem]?.name || meta.gameSystem || '';
      const metaLine   = [meta.factionName, systemName].filter(Boolean).join(' · ');
      const countParts = [`${total} operative${total === 1 ? '' : 's'}`];
      if (pts > 0) countParts.push(`${pts} pts`);

      const isPublished  = meta.status === 'published';
      const isLegal      = meta.isLegal === true;
      // meta.isLegal is null/undefined when no compositionRules exist for
      // this faction yet (all of 40k today) — a real "not validated" state,
      // not the same as "checked and failed" (false) or "checked and
      // passed" (true). Surfacing it as its own badge is the whole point:
      // a green "Legal" here was claiming a check that never ran.
      const notValidated = meta.isLegal == null;
      const badgeClass  = isPublished ? 'published' : (notValidated ? 'unvalidated' : (isLegal ? 'legal' : 'draft'));
      const badgeLabel  = isPublished ? 'Published'  : (notValidated ? 'Not Validated' : (isLegal ? 'Legal' : 'Draft'));

      const opRows = ops.map(op => {
        const tmpl    = unitTemplates[op.unitId];
        const names   = RosterView._resolveWeaponNames(op, tmpl);
        const summary = names.length ? `${op.unitName} — ${names.join(' · ')}` : '';
        return `
          <div class="rv-op-row">
            <div class="rv-op-top">
              <div>
                <span class="rv-op-name">${op.unitName}</span>
                ${op.role ? `<span class="rv-op-role"> · ${op.role}</span>` : ''}
                ${op.modelCount != null ? `<span class="rv-op-role"> · ${op.modelCount} models</span>` : ''}
              </div>
              ${op.points != null ? `<div class="rv-op-pts">${op.points} pts</div>` : ''}
            </div>
            ${summary ? `<div class="rv-op-weapons">${summary}</div>` : ''}
          </div>
        `;
      }).join('');

      return `
        <div class="rv-wrap">
          <div class="rv-header">
            <div class="rv-header-top">
              <div class="rv-title">${meta.name || 'Untitled Roster'}</div>
              <div class="rv-legal-badge ${badgeClass}">${badgeLabel}</div>
            </div>
            <div class="rv-meta">${metaLine}</div>
            <div class="rv-meta">${countParts.join(' · ')}</div>
          </div>
          <div class="rv-section-label">Operatives (${ops.length})</div>
          <div class="rv-op-list">
            ${opRows || '<div class="rv-empty">No operatives.</div>'}
          </div>
          ${isOwner ? `
            <button class="btn btn-secondary rv-edit-btn"
                    onclick="location.hash='#roster/edit/${rosterId}'">
              Edit this roster
            </button>
          ` : ''}
        </div>
      `;
    },
  };

  // ── UNIT SEARCH (40k lazy migration) ────────────────────────────────────────

  const UnitSearch = {
    state: { system: null, factionSlug: null, sourcePool: null, preview: null },

    async render(system, factionSlug) {
      UnitSearch.state = { system, factionSlug, sourcePool: null, preview: null };
      const el = document.getElementById('screen-unit-search');
      if (!system || !factionSlug) {
        el.innerHTML = '<div class="placeholder"><h2>No faction selected</h2></div>';
        return;
      }
      el.innerHTML = `
        <div class="us-wrap">
          <div class="us-search-bar">
            <input class="uf-input" id="us-search-input" type="text"
                   placeholder="Type a unit name…" disabled>
            <div class="us-pool-label" id="us-pool-count">Loading source pool…</div>
          </div>
          <div id="us-results"></div>
          <div id="us-preview"></div>
        </div>
      `;
      document.getElementById('us-search-input').addEventListener('input', e => {
        UnitSearch._runSearch(e.target.value);
      });
      await UnitSearch._loadPool();
    },

    async _loadPool() {
      try {
        const snap = await App.db
          .ref(`gameData/${UnitSearch.state.system}/${UnitSearch.state.factionSlug}`)
          .once('value');
        UnitSearch.state.sourcePool = snap.val() || {};
        const count = Object.keys(UnitSearch.state.sourcePool).length;
        document.getElementById('us-pool-count').textContent = `${count} units available`;
        const input = document.getElementById('us-search-input');
        if (input) { input.disabled = false; input.focus(); }
      } catch (err) {
        document.getElementById('screen-unit-search').innerHTML =
          `<div class="placeholder"><h2>Error loading source pool</h2><p>${err.message}</p></div>`;
      }
    },

    _runSearch(query) {
      const q   = query.trim().toLowerCase();
      const el  = document.getElementById('us-results');
      document.getElementById('us-preview').innerHTML = '';
      if (!q) { el.innerHTML = ''; return; }

      const matches = Object.entries(UnitSearch.state.sourcePool || {})
        .filter(([, u]) => u.name && u.name.toLowerCase().includes(q))
        .sort(([, a], [, b]) => (a.name || '').localeCompare(b.name || ''));

      if (!matches.length) {
        el.innerHTML = '<div class="us-empty">No units match.</div>';
        return;
      }

      el.innerHTML = matches.map(([uid, u]) => `
        <div class="us-result-row" data-uid="${uid}" onclick="UnitSearch._selectUnit('${uid}')">
          <div class="us-result-info">
            <span class="us-result-name">${u.name}</span>
            ${u.category ? `<span class="us-result-cat">${u.category}</span>` : ''}
          </div>
          ${u.points != null ? `<span class="us-result-pts">${u.points} pts</span>` : ''}
        </div>
      `).join('');
    },

    _selectUnit(unitId) {
      const raw = (UnitSearch.state.sourcePool || {})[unitId];
      if (!raw) return;
      const transformed = UnitSearch._transform(unitId, raw);
      UnitSearch.state.preview = transformed;
      UnitSearch._renderPreview(transformed);
    },

    _transform(unitId, raw) {
      const weapons = Object.entries(raw.weapons || {}).map(([wid, w]) => ({
        id:       wid,
        name:     w.name  || wid,
        type:     w.type  || 'ranged',
        isDefault: true,
        keywords: w.keywords || [],
        profiles: {
          'RANGE': (w.type === 'melee' || w.range === 0) ? 'Melee' : `${w.range}"`,
          'A':     String(w.attacks ?? ''),
          'BS/WS': w.skill != null ? `${w.skill}+` : '',
          'S':     String(w.S  ?? ''),
          'AP':    String(w.AP ?? ''),
          'D':     String(w.D  ?? ''),
        },
      }));

      const wargearText = Array.isArray(raw.wargearOptions)
        ? raw.wargearOptions.join(' ')
        : (raw.wargearOptions || '');
      const loadoutOptions = UnitSearch._parseWargear(wargearText);

      return {
        id:          unitId,
        name:        raw.name     || unitId,
        gameSystem:  UnitSearch.state.system,
        faction:     UnitSearch.state.factionSlug,
        factionId:   UnitSearch.state.factionSlug,
        role:        raw.category || null,
        points:      raw.points   ?? null,
        stats:       raw.stats    || {},
        weapons,
        loadoutOptions,
        keywords:    raw.keywords || [],
        pointsTable: raw.pointsTable || null,
        squadSize:   raw.squadSize   || null,
        category:    raw.category    || null,
        isCharacter: raw.isCharacter || false,
        isPsyker:    raw.isPsyker    || false,
        isVehicle:   raw.isVehicle   || false,
        abilities:   !raw.abilities ? []
                       : Array.isArray(raw.abilities)
                           ? raw.abilities
                           : Object.values(raw.abilities),
        notes: '',
      };
    },

    _parseWargear(text) {
      if (!text) return [];

      // Strip abilities/faction noise the scraper concatenated into this field
      text = text
        .replace(/\bABILITIES\b[\s\S]*/i, '')
        .replace(/\bFACTION:\s*[\s\S]*/i, '')
        .replace(/\*\s*You cannot[^.]+\./gi, '')  // strip footnote sentences
        .replace(/\s{2,}/g, ' ')
        .trim();

      if (!text) return [];

      const parsed   = [];
      const unparsed = [];

      // Pattern 4: "For every N models…" — pull out first, flag as unparsed
      text = text.replace(/For every \d+[^.]+\./gi, m => {
        unparsed.push({ type: 'unparsed', rawText: m.trim() });
        return '';
      });

      // Pattern 1c: "X can be replaced with (one|N) of the following: opts" — run BEFORE p1.
      // p1 assumes "can have their/its/the X replaced"; when the phrasing is instead
      // "X can be replaced" (X comes before "can", not after), p1's lazy capture group
      // matched the literal word "be" as if it were the replaced item ("Replace be").
      const p1c = /([^.]*?)\s+can be replaced with (?:one|\d+) of the following[*]?\s*:\s*([^.]+)/gi;
      text = text.replace(p1c, (_, replaces, optText) => {
        const options = UnitSearch._parseOptionsList(optText);
        if (options.length) {
          const r = UnitSearch._cleanRef(replaces);
          parsed.push({ type: 'one-of', name: `Replace ${r}`, replaces: r, options });
        }
        return '';
      });

      // Pattern 1: "…can [each] [have their] X replaced with one of the following[*]: opts"
      // Accepts "N of the following" too (BSData sometimes writes "1 of the following"
      // instead of "one of the following" — same meaning, different wording).
      const p1 = /[^.]*?can (?:each )?(?:have (?:their|its|the) )?(.+?)\s+replaced with (?:one|\d+) of the following[*]?\s*:\s*([^.]+)/gi;
      text = text.replace(p1, (_, replaces, optText) => {
        const options = UnitSearch._parseOptionsList(optText);
        if (options.length) {
          const r = UnitSearch._cleanRef(replaces);
          parsed.push({ type: 'one-of', name: `Replace ${r}`, replaces: r, options });
        }
        return '';
      });

      // Pattern 1b: "…can [each] [have their] X replaced with 1 Y" (single option)
      const p1b = /[^.]*?can (?:each )?(?:have (?:their|its|the) )?(.+?)\s+replaced with (?:1 )?([a-z][^.(]+)\./gi;
      text = text.replace(p1b, (_, replaces, option) => {
        const opt = UnitSearch._cleanRef(option);
        const r   = UnitSearch._cleanRef(replaces);
        if (opt && !opt.includes('cannot') && !opt.includes('more than') && opt.length < 60) {
          parsed.push({ type: 'one-of', name: `Replace ${r}`, replaces: r, options: [opt] });
        }
        return '';
      });

      // Pattern 2: "This model/unit can be equipped with 1 Y"
      const p2 = /[Tt]his (?:model|unit) can be equipped with (?:1 )?([^.(]+)\./g;
      text = text.replace(p2, (_, option) => {
        const opt = UnitSearch._cleanRef(option);
        if (opt) parsed.push({ type: 'optional', name: `Optional: ${opt}`, options: [opt] });
        return '';
      });

      // Pattern 3: "Up to N models can replace X with one of the following: opts"
      const p3 = /[Uu]p to (\d+) [^.]+?(?:one|\d+) of the following[*]?\s*:\s*([^.]+)/g;
      text = text.replace(p3, (_, n, optText) => {
        const options = UnitSearch._parseOptionsList(optText);
        if (options.length) {
          parsed.push({ type: 'counted', name: `Optional (up to ${n})`, max: parseInt(n), options });
        }
        return '';
      });

      // Remaining substantial text → unparsed
      text.split(/\.\s+/).forEach(chunk => {
        const s = chunk.replace(/\.$/, '').trim();
        if (s.length > 20) unparsed.push({ type: 'unparsed', rawText: s });
      });

      return [...parsed, ...unparsed];
    },

    _parseOptionsList(text) {
      // Options are "1 flamer 1 grenade launcher 1 meltagun" — split on " 1 "
      return text.trim()
        .split(/\s+1\s+/)
        .map(p => p.replace(/^1\s+/, '').replace(/[*\s]+$/, '').trim())
        .filter(p => p.length > 0 && p.length < 80);
    },

    _cleanRef(text) {
      return text
        .replace(/^(?:their|its|the|1)\s+/i, '')
        .replace(/\s+and\s+.*$/i, '')
        .replace(/[*]$/, '')
        .trim();
    },

    // ── Roster 3b Part 2 v3 — bridges _parseWargear's name-string options to
    // the weaponIds RosterBuilder's loadout UI expects (KT-native shape). ──

    _weaponNameNorm(s) { return (s || '').toLowerCase().replace(/[\s-]+/g, ''); },

    // Matches an option/replaces name string against a unit's own weapons
    // object by name. Tries, in order: exact name, exact name after a
    // possessive prefix is stripped ("Platform's shuriken cannon" →
    // "shuriken cannon" — common in this prose), space/dash-normalized
    // exact match, then normalized PREFIX match. A prefix match can return
    // MULTIPLE weapon ids on purpose — e.g. "missile launcher" prose maps to
    // both "Missile launcher – starshot" and "Missile launcher – sunburst"
    // on the same unit, and there's no way to know which one prose means
    // without guessing, so both are offered as real choices.
    _matchWeaponIds(name, weaponsObj) {
      const candidates = [name];
      const possessive = name.match(/'s\s+(.+)$/i);
      if (possessive) candidates.push(possessive[1]);

      for (const cand of candidates) {
        const exact = cand.toLowerCase().trim();
        for (const [wid, w] of Object.entries(weaponsObj || {})) {
          if ((w.name || '').toLowerCase().trim() === exact) return [wid];
        }
        const target = UnitSearch._weaponNameNorm(cand);
        if (!target) continue;
        for (const [wid, w] of Object.entries(weaponsObj || {})) {
          if (UnitSearch._weaponNameNorm(w.name) === target) return [wid];
        }
        const prefixMatches = Object.entries(weaponsObj || {})
          .filter(([, w]) => UnitSearch._weaponNameNorm(w.name).startsWith(target));
        if (prefixMatches.length) return prefixMatches.map(([wid]) => wid);
      }
      return [];
    },

    // parsedEntries: _parseWargear's output. weaponsObj: the flat-pool unit's
    // own `weapons` object (keyed, BSData-flat-pool shape). Returns
    // { loadoutOptions: [{slot, weaponIds}], unparsed: [...] } — unparsed
    // carries forward both _parseWargear's own unparsed entries AND any
    // parsed entry whose option names didn't resolve to a real weapon id
    // (never silently dropped — surfaced as reference text instead).
    _resolveLoadoutOptions(parsedEntries, weaponsObj) {
      const resolved = [];
      const unparsed = [];
      const seenNames = {};
      for (const entry of parsedEntries) {
        if (entry.type === 'unparsed') { unparsed.push(entry); continue; }

        const optionIds = [];
        const unresolvedOptions = [];
        for (const o of (entry.options || [])) {
          const ids = UnitSearch._matchWeaponIds(o, weaponsObj);
          if (ids.length) optionIds.push(...ids);
          else unresolvedOptions.push(o);
        }
        const uniqueIds = [...new Set(optionIds)];

        if (!uniqueIds.length) {
          unparsed.push({
            type: 'unparsed',
            rawText: `${entry.name}: ${(entry.options || []).join(', ')} (no matching weapon id on this unit)`,
          });
          continue;
        }

        let weaponIds = uniqueIds;
        if (entry.type === 'one-of' && entry.replaces) {
          const defaultIds = UnitSearch._matchWeaponIds(entry.replaces, weaponsObj);
          for (const d of defaultIds) if (!weaponIds.includes(d)) weaponIds = [d, ...weaponIds];
        }

        // Same "replaces" name can legitimately produce two independent slots
        // (e.g. Cadian Sergeant: pistol-only swap AND pistol+melee swap, both
        // literally named "Replace laspistol") — keep both, disambiguate the
        // slot label rather than silently merging two different choices.
        let slotName = entry.name, n = 2;
        while (seenNames[slotName]) { slotName = `${entry.name} (${n++})`; }
        seenNames[slotName] = true;

        resolved.push({ slot: slotName, weaponIds });
        if (unresolvedOptions.length) {
          unparsed.push({
            type: 'unparsed',
            rawText: `${entry.name}: ${unresolvedOptions.join(', ')} (no matching weapon id — not offered as a choice)`,
          });
        }
      }
      return { loadoutOptions: resolved, unparsed };
    },

    // pointsTable: [{models: "10 models", points: N}, ...] (flat-pool shape).
    // Never guesses the model count from position — a row missing `models`
    // (confirmed gap: shadow-spectres) is dropped and flagged, not inferred
    // from squadSize.min/max by row order.
    _normalizePointsTable(pointsTable) {
      const table = {};
      const droppedRows = [];
      for (const row of (pointsTable || [])) {
        const m = String(row.models || '').match(/^(\d+)\s*model/i);
        if (m) table[m[1]] = row.points;
        else droppedRows.push(row);
      }
      return { table, droppedRows, usable: Object.keys(table).length > 0 && droppedRows.length === 0 };
    },

    // Flat-pool unit (keyed weapons object, prose wargearOptions) →
    // RosterBuilder-compatible shape (array weapons, {slot,weaponIds}
    // loadoutOptions — same fields UnitForm/_loadoutPanel already consume
    // for hand-authored KT units, so the rest of RosterBuilder needs no
    // system-specific branching once this transform has run).
    _transformForRoster(unitId, raw) {
      const weapons = Object.entries(raw.weapons || {}).map(([wid, w]) => ({
        id: wid,
        name: w.name || wid,
        type: w.type || 'ranged',
        isDefault: true,
        keywords: w.keywords || [],
        profiles: {
          'RANGE': (w.type === 'melee' || w.range === 0) ? 'Melee' : `${w.range}"`,
          'A':     String(w.attacks ?? ''),
          'BS/WS': w.skill != null ? `${w.skill}+` : '',
          'S':     String(w.S  ?? ''),
          'AP':    String(w.AP ?? ''),
          'D':     String(w.D  ?? ''),
        },
      }));

      const wargearText = Array.isArray(raw.wargearOptions) ? raw.wargearOptions.join(' ') : (raw.wargearOptions || '');
      const parsed = UnitSearch._parseWargear(wargearText);
      const { loadoutOptions: parsedSlots, unparsed } = UnitSearch._resolveLoadoutOptions(parsed, raw.weapons || {});

      // Hand-authored override (lazy fallback hook) takes precedence over
      // the automatic prose parse — it exists specifically because the
      // parse was insufficient for this unit.
      const loadoutOptions = (raw.loadoutOptions && raw.loadoutOptions.length)
        ? raw.loadoutOptions
        : parsedSlots;
      const loadoutIsHandAuthored = !!(raw.loadoutOptions && raw.loadoutOptions.length);

      const { table: pointsTable, usable: pointsTableUsable } = UnitSearch._normalizePointsTable(raw.pointsTable);

      return {
        id: unitId,
        name: raw.name || unitId,
        role: raw.category || null,
        category: raw.category || null,
        points: raw.points ?? null,
        pointsTable: pointsTableUsable ? pointsTable : null,
        pointsCaveat: !pointsTableUsable && raw.pointsTable && raw.pointsTable.length
          ? 'Points vary by squad size — see composition text; showing base price.'
          : null,
        squadSize: raw.squadSize || null,
        stats: raw.stats || {},
        weapons,
        loadoutOptions,
        loadoutIsHandAuthored,
        unparsedWargear: loadoutIsHandAuthored ? [] : unparsed,
        keywords: raw.keywords || [],
        countsAs: raw.countsAs || 1,
        isCharacter: raw.isCharacter || false,
        isPsyker: raw.isPsyker || false,
        isVehicle: raw.isVehicle || false,
        abilities: !raw.abilities ? []
          : Array.isArray(raw.abilities) ? raw.abilities : Object.values(raw.abilities),
        composition: raw.composition || null,
      };
    },

    _renderPreview(unit) {
      const el     = document.getElementById('us-preview');
      const schema = App.schemas[UnitSearch.state.system] || {};
      const statBlock = schema.statBlock      || [];
      const profiles  = schema.weaponProfiles || [];

      const statsHTML = statBlock.map(s => `
        <div class="uc-stat">
          <div class="uc-stat-label">${s}</div>
          <div class="uc-stat-val">${unit.stats[s] || '—'}</div>
        </div>
      `).join('');

      const weaponCards = unit.weapons.map((w, wi) => `
        <div class="us-weapon-card">
          <div class="us-weapon-head">
            <span class="us-weapon-name">${cleanWeaponName(w.name)}</span>
            <span class="uc-type-badge">${w.type === 'melee' ? 'M' : 'R'}</span>
            <label class="us-default-label">
              <input type="checkbox" ${w.isDefault ? 'checked' : ''}
                     onchange="UnitSearch._onDefaultChange(this,${wi})">
              Default
            </label>
            <button class="btn btn-danger" style="padding:0.2rem 0.5rem;font-size:0.7rem;width:auto;"
                    onclick="UnitSearch._removeWeapon(${wi})">×</button>
          </div>
          <div class="us-weapon-profiles">
            ${profiles.map(p => `
              <div class="us-profile-field">
                <span class="us-profile-label">${p}</span>
                <input class="uf-input us-profile-input"
                       value="${w.profiles[p] || ''}"
                       oninput="UnitSearch._onProfileInput(this,${wi},'${p}')">
              </div>
            `).join('')}
          </div>
          ${w.keywords?.length ? `<div class="us-weapon-kw">${w.keywords.join(', ')}</div>` : ''}
        </div>
      `).join('');

      const parsedSlots  = unit.loadoutOptions.filter(s => s.type !== 'unparsed');
      const unparsedSlots = unit.loadoutOptions.filter(s => s.type === 'unparsed');

      const parsedHTML = parsedSlots.length
        ? parsedSlots.map(slot => `
            <div class="us-wargear-row">
              <span class="us-slot-name">${slot.name}</span>
              <span class="us-slot-type">${slot.type}</span>
              <span class="us-slot-options">${(slot.options || []).join(' / ')}</span>
            </div>
          `).join('')
        : '<div class="us-empty">None parsed automatically.</div>';

      const unparsedHTML = unparsedSlots.length
        ? unparsedSlots.map(s => `<div class="us-unparsed-row">${s.rawText}</div>`).join('')
        : '';

      el.innerHTML = `
        <div class="us-preview-panel">
          <div class="us-section-title">
            ${unit.name}
            ${unit.points != null ? `<span class="us-pts-badge">${unit.points} pts</span>` : ''}
            ${unit.category ? `<span class="lib-unit-role">${unit.category}</span>` : ''}
          </div>

          <div class="us-preview-section">
            <div class="us-subsection-label">Stats</div>
            <div class="uc-stats">${statsHTML}</div>
            ${unit.squadSize ? `<div class="us-squad-size">
              Squad size: ${unit.squadSize.min}–${unit.squadSize.max} models
            </div>` : ''}
          </div>

          <div class="us-preview-section">
            <div class="us-subsection-label">
              Weapons — toggle Default, edit profiles if wrong
            </div>
            <div id="us-weapon-list">${weaponCards}</div>
          </div>

          <div class="us-preview-section">
            <div class="us-subsection-label">Wargear Options</div>
            <div class="us-wargear-parsed">
              <div class="us-wargear-label">Structured</div>
              ${parsedHTML}
            </div>
            ${unparsedSlots.length ? `
              <div class="us-wargear-unparsed">
                <div class="us-wargear-label">Needs manual review (not added as loadout slots)</div>
                ${unparsedHTML}
              </div>
            ` : ''}
          </div>

          <div class="us-preview-actions">
            <button class="btn btn-primary" onclick="UnitSearch._doConfirm()">
              Confirm &amp; Add to Library
            </button>
            <button class="btn btn-secondary" onclick="UnitSearch._cancelPreview()">
              Cancel
            </button>
          </div>
        </div>
      `;
    },

    _onProfileInput(el, wi, profile) {
      const u = UnitSearch.state.preview;
      if (u) u.weapons[wi].profiles[profile] = el.value;
    },

    _onDefaultChange(el, wi) {
      const u = UnitSearch.state.preview;
      if (u) u.weapons[wi].isDefault = el.checked;
    },

    _removeWeapon(wi) {
      const u = UnitSearch.state.preview;
      if (!u) return;
      u.weapons.splice(wi, 1);
      UnitSearch._renderPreview(u);
    },

    _cancelPreview() {
      const ret = sessionStorage.getItem('unitSearchReturn');
      sessionStorage.removeItem('unitSearchReturn');
      location.hash = ret || '#home';
    },

    _doConfirm() {
      UnitSearch._confirm(UnitSearch.state.preview);
    },

    async _confirm(unit) {
      if (!unit) return;
      const { system, factionSlug } = UnitSearch.state;
      const btn = document.querySelector('#us-preview .btn-primary');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      try {
        // Create faction info node if this is the first confirmed unit for this faction
        const infoRef  = App.db.ref(`gameData/${system}/factions/${factionSlug}/info`);
        const infoSnap = await infoRef.once('value');
        if (!infoSnap.val()) {
          const name = factionSlug.replace(/-/g, ' ')
            .replace(/\b\w/g, c => c.toUpperCase());
          await infoRef.set({ name, compositionRules: {} });
        }

        await App.db
          .ref(`gameData/${system}/factions/${factionSlug}/units/${unit.id}`)
          .set(unit);

        const ret = sessionStorage.getItem('unitSearchReturn');
        sessionStorage.removeItem('unitSearchReturn');
        location.hash = ret || `#library/${system}`;
      } catch (err) {
        alert(`Save failed: ${err.message}`);
        if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Add to Library'; }
      }
    },
  };

  // ── ROSTER CLEANER ───────────────────────────────────────────────────────────

  const RosterCleaner = {

    // Loaded once per render: { [factionId]: { [unitId]: unit } }
    _factionCache: {},

    async render() {
      const el = document.getElementById('screen-clean-drafts');
      el.innerHTML = '<div class="cleaner-wrap"><div class="loading-text">Scanning draft rosters…</div></div>';

      let rosters;
      try {
        const snap = await App.db.ref('rosters').once('value');
        rosters = snap.val() || {};
      } catch (e) {
        el.innerHTML = `<div class="cleaner-wrap"><p class="tag-error">Failed to load rosters: ${e.message}</p></div>`;
        return;
      }

      // Filter to drafts only
      const drafts = Object.entries(rosters)
        .filter(([, r]) => r.meta && r.meta.status === 'draft')
        .map(([id, r]) => ({ id, meta: r.meta, units: RosterCleaner._toArray(r.units) }));

      if (!drafts.length) {
        el.innerHTML = '<div class="cleaner-wrap"><div class="loading-text">No draft rosters found.</div></div>';
        return;
      }

      // Check each unit in each draft roster
      const results = await Promise.all(drafts.map(r => RosterCleaner._checkRoster(r)));

      RosterCleaner._renderReport(el, results);
    },

    _toArray(units) {
      if (!units) return [];
      return Array.isArray(units) ? units : Object.values(units);
    },

    async _checkRoster(roster) {
      const { id, meta, units } = roster;
      const system    = meta.gameSystem || 'kill-team';
      const factionId = meta.factionId  || null;

      const unitResults = await Promise.all(units.map(u => RosterCleaner._checkUnit(system, factionId, u)));
      return { id, meta, system, factionId, unitResults };
    },

    async _checkUnit(system, factionId, unit) {
      const { unitId, unitName } = unit;
      if (!factionId || !unitId) {
        return { unit, status: 'manual', reason: !factionId ? 'roster has no factionId' : 'unit has no unitId' };
      }

      // 1. Does the current ID exist?
      const snap = await App.db.ref(`gameData/${system}/factions/${factionId}/units/${unitId}`).once('value');
      if (snap.exists()) return { unit, status: 'ok' };

      // 2. Try slug-strip: remove trailing -NNN
      const stripped = unitId.replace(/-\d+$/, '');
      if (stripped !== unitId) {
        const stripSnap = await App.db.ref(`gameData/${system}/factions/${factionId}/units/${stripped}`).once('value');
        if (stripSnap.exists()) {
          return { unit, status: 'auto', newId: stripped, method: 'slug-strip' };
        }
      }

      // 3. Try name-match across all faction units
      const allUnits = await RosterCleaner._loadFaction(system, factionId);
      if (!allUnits) {
        return { unit, status: 'manual', reason: 'faction not found in gameData' };
      }

      const target  = (unitName || '').toLowerCase().trim();
      const matches = target
        ? Object.entries(allUnits).filter(([, u]) => (u.name || '').toLowerCase().trim() === target)
        : [];

      if (matches.length === 1) {
        return { unit, status: 'auto', newId: matches[0][0], method: 'name-match' };
      }

      return {
        unit, status: 'manual',
        reason:     matches.length === 0 ? 'no unit found with matching name' : 'multiple units share that name',
        candidates: matches.map(([id]) => id),
      };
    },

    async _loadFaction(system, factionId) {
      const key = `${system}/${factionId}`;
      if (RosterCleaner._factionCache[key] !== undefined) return RosterCleaner._factionCache[key];
      const snap = await App.db.ref(`gameData/${system}/factions/${factionId}/units`).once('value');
      RosterCleaner._factionCache[key] = snap.val() || null;
      return RosterCleaner._factionCache[key];
    },

    _renderReport(el, results) {
      const totalRosters  = results.length;
      let   autoCount     = 0;
      let   manualCount   = 0;
      let   okCount       = 0;

      const rosterHtml = results.map(r => {
        const rosterMeta = `${r.meta.factionName || r.factionId || '?'} · ${r.system}`;
        const rowsHtml   = r.unitResults.map(({ unit, status, newId, method, reason, candidates }) => {
          if (status === 'ok') {
            okCount++;
            return `
              <div class="cleaner-unit-row">
                <div class="cleaner-unit-name">${unit.unitName || unit.unitId}</div>
                <div class="cleaner-unit-id">${unit.unitId}</div>
                <div class="cleaner-status tag-ok">✓ ok</div>
              </div>`;
          }
          if (status === 'auto') {
            autoCount++;
            const methodLabel = method === 'slug-strip' ? 'slug' : 'name';
            return `
              <div class="cleaner-unit-row" data-roster="${r.id}" data-old="${unit.unitId}" data-new="${newId}" data-instance="${unit.instanceId}">
                <div class="cleaner-unit-name">${unit.unitName || unit.unitId}</div>
                <div class="cleaner-unit-id">${unit.unitId}<span class="fix-arrow">→</span>${newId}</div>
                <div class="cleaner-status tag-auto">↻ auto (${methodLabel})</div>
                <div class="cleaner-note">Loadout selections may need re-picking — weapon IDs also changed.</div>
              </div>`;
          }
          // manual
          manualCount++;
          const candText = candidates && candidates.length
            ? `Candidates: ${candidates.join(', ')}`
            : reason || 'no match';
          return `
            <div class="cleaner-unit-row">
              <div class="cleaner-unit-name">${unit.unitName || unit.unitId}</div>
              <div class="cleaner-unit-id">${unit.unitId}</div>
              <div class="cleaner-status tag-manual">⚠ manual</div>
              <div class="cleaner-note">${candText}</div>
            </div>`;
        }).join('');

        return `
          <div class="cleaner-roster">
            <div class="cleaner-roster-header">
              ${r.meta.name || r.id}
              <span class="cleaner-roster-meta">${rosterMeta} · ${r.id}</span>
            </div>
            ${rowsHtml}
          </div>`;
      }).join('');

      const hasAuto = autoCount > 0;
      el.innerHTML = `
        <div class="cleaner-wrap">
          <div class="cleaner-summary">
            ${totalRosters} draft roster${totalRosters !== 1 ? 's' : ''} checked ·
            <span class="tag-ok">${okCount} units ok</span> ·
            <span class="tag-auto">${autoCount} auto-fixable</span> ·
            <span class="tag-manual">${manualCount} need manual review</span>
          </div>
          ${rosterHtml}
          <div class="cleaner-actions">
            <button class="cleaner-apply-btn" id="cleaner-apply" ${hasAuto ? '' : 'disabled'}
                    onclick="RosterCleaner.applyFixes()">
              Apply ${autoCount} Fix${autoCount !== 1 ? 'es' : ''}
            </button>
            <span class="cleaner-status-msg" id="cleaner-msg">
              ${manualCount ? `${manualCount} unit${manualCount !== 1 ? 's' : ''} need manual attention — edit their rosters directly.` : ''}
            </span>
          </div>
        </div>`;
    },

    async applyFixes() {
      const btn = document.getElementById('cleaner-apply');
      const msg = document.getElementById('cleaner-msg');
      btn.disabled = true;
      btn.textContent = 'Applying…';
      msg.textContent = '';

      // Collect all auto-fix rows
      const rows = document.querySelectorAll('.cleaner-unit-row[data-old]');

      // Group by rosterId so we can PATCH the whole units array at once per roster
      const byRoster = {};
      rows.forEach(row => {
        const rosterId   = row.dataset.roster;
        const instanceId = row.dataset.instance;
        const newId      = row.dataset.new;
        if (!byRoster[rosterId]) byRoster[rosterId] = [];
        byRoster[rosterId].push({ instanceId, newId });
      });

      let errorCount = 0;

      for (const [rosterId, fixes] of Object.entries(byRoster)) {
        try {
          // Fetch the current units array
          const snap  = await App.db.ref(`rosters/${rosterId}/units`).once('value');
          const units = RosterCleaner._toArray(snap.val());

          // Apply fixes
          fixes.forEach(({ instanceId, newId }) => {
            const u = units.find(u => u.instanceId === instanceId);
            if (u) u.unitId = newId;
          });

          // Write back
          await App.db.ref(`rosters/${rosterId}/units`).set(units);
        } catch (e) {
          console.error(`Failed to patch roster ${rosterId}:`, e);
          errorCount++;
        }
      }

      if (errorCount) {
        msg.textContent = `Done with ${errorCount} error(s) — check console.`;
        msg.style.color = 'var(--red)';
      } else {
        btn.textContent = 'Applied ✓';
        msg.textContent = 'Fixes written. Re-select loadouts in the roster builder for repaired units.';
        msg.style.color = 'var(--green)';
        // Refresh to show updated state
        setTimeout(() => RosterCleaner.render(), 1800);
      }
    },
  };

  // ── MY ROSTERS (ROSTER_UX_1 Amendment 1) ──────────────────────────────────────
  // Lists every draft (rosters/, status !== 'published') and every published
  // export (exports/{system}/, both systems) — no auth exists, so this is
  // every roster in the database, which today means Nox's. Fine at current
  // scale; revisit if a second real user ever shows up.
  const MyRosters = {

    _arr(v) { return !v ? [] : Array.isArray(v) ? v : Object.values(v); },

    _unitNoun(system) { return system === 'warhammer-40k' ? 'units' : 'ops'; },

    _fmtDate(ts) {
      return ts ? new Date(ts).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
    },

    async render() {
      const el = document.getElementById('screen-my-rosters');
      el.innerHTML = '<div class="cleaner-wrap"><div class="loading-text">Loading rosters…</div></div>';

      let rostersVal, ktExportsVal, fortykExportsVal;
      try {
        [rostersVal, ktExportsVal, fortykExportsVal] = await Promise.all([
          App.db.ref('rosters').once('value').then(s => s.val() || {}),
          App.db.ref('exports/kill-team').once('value').then(s => s.val() || {}),
          App.db.ref('exports/warhammer-40k').once('value').then(s => s.val() || {}),
        ]);
      } catch (e) {
        el.innerHTML = `<div class="cleaner-wrap"><p class="tag-error">Failed to load rosters: ${e.message}</p></div>`;
        return;
      }

      const drafts = Object.entries(rostersVal)
        .filter(([, r]) => r && r.meta && r.meta.status !== 'published')
        .map(([id, r]) => ({ id, ...r.meta, unitCount: MyRosters._arr(r.units).length }))
        .sort((a, b) => (b.updated || 0) - (a.updated || 0));

      const published = [];
      [['kill-team', ktExportsVal], ['warhammer-40k', fortykExportsVal]].forEach(([system, byId]) => {
        Object.entries(byId).forEach(([id, exp]) => {
          published.push({
            id, system,
            ...(exp.meta || {}),
            unitCount: MyRosters._arr(exp.units).length,
          });
        });
      });
      published.sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));

      MyRosters._renderReport(el, drafts, published);
    },

    _rowHTML(r, kind) {
      const systemName = App.schemas[r.gameSystem || r.system]?.name || r.gameSystem || r.system || '';
      const metaLine    = [r.factionName || r.factionId, systemName].filter(Boolean).join(' · ');
      const countParts  = [`${r.unitCount} ${MyRosters._unitNoun(r.gameSystem || r.system)}`];
      if (r.pointsTotal) countParts.push(`${r.pointsTotal} pts`);
      const dateLabel   = kind === 'draft'
        ? `Updated ${MyRosters._fmtDate(r.updated)}`
        : `Published ${MyRosters._fmtDate(r.publishedAt)}`;
      const viewAction  = kind === 'draft'
        ? `<button class="btn btn-secondary" onclick="location.hash='#roster/edit/${r.id}'">Open in builder</button>`
        : `<button class="btn btn-secondary" onclick="location.hash='#roster/${r.id}'">View</button>`;
      const deleteAction = kind === 'draft'
        ? `onclick="MyRosters._deleteDraft('${r.id}')"`
        : `onclick="MyRosters._deleteExport('${r.system}', '${r.id}')"`;

      return `
        <div class="cleaner-roster">
          <div class="cleaner-roster-header">
            ${r.name || 'Untitled Roster'}
            <span class="cleaner-roster-meta">${metaLine}</span>
          </div>
          <div class="myr-row">
            <span class="cleaner-roster-meta">${countParts.join(' · ')} · ${dateLabel}</span>
            <div class="myr-actions">
              ${viewAction}
              <button class="btn btn-danger" ${deleteAction}>Delete</button>
            </div>
          </div>
        </div>
      `;
    },

    _renderReport(el, drafts, published) {
      el.innerHTML = `
        <div class="cleaner-wrap">
          <div class="cleaner-summary">
            No auth exists — this lists every roster in the database, which today means just yours.
          </div>
          <div class="rb-role-section-label">Drafts (${drafts.length})</div>
          ${drafts.map(d => MyRosters._rowHTML(d, 'draft')).join('') || '<div class="loading-text">No draft rosters.</div>'}
          <div class="rb-role-section-label myr-section-gap">Published (${published.length})</div>
          ${published.map(p => MyRosters._rowHTML(p, 'published')).join('') || '<div class="loading-text">No published rosters.</div>'}
        </div>
      `;
    },

    async _deleteDraft(id) {
      if (!confirm('Delete this draft roster? This cannot be undone.')) return;
      try {
        await App.db.ref(`rosters/${id}`).remove();
        MyRosters.render();
      } catch (e) {
        alert(`Could not delete: ${e.message}`);
      }
    },

    // Safe for any game that has already baked this roster in: both the KT
    // and 40k game apps read the roster/export data ONCE at game creation
    // (or at join, per-player) and copy it into their own game document —
    // neither ever re-reads exports/ or rosters/ afterward (verified against
    // killteam/index.html's createGame/joinGame and warhammer40k/js/state.js's
    // createGame/joinGame). The one real gap: a KT game sitting in "waiting"
    // status (player1 joined, player2 hasn't yet) still needs player2's
    // export to exist at the moment they join — deleting it in that narrow
    // window would break that join. Not guarded against here; flagged in
    // the brief report instead of adding cross-table lookup machinery for it.
    async _deleteExport(system, id) {
      // ROSTER_UX_2 item 2/3: export deletion is the one My Rosters action
      // that's gated (draft deletion stays ungated — it's the user's own
      // work product, per the brief). Item 3 also adds the known-gap
      // warning line logged above: a game still waiting on player 2 needs
      // this export to exist at join time.
      if (!Maintenance.gate('Delete published roster')) return;
      if (!confirm('Delete this published roster? The link will stop working. Games already created from it are unaffected — they snapshot roster data at creation and never re-read this. EXCEPT: if a game made from this roster is still waiting for a second player to join, deleting it now will break that join.')) return;
      try {
        await App.db.ref(`exports/${system}/${id}`).remove();
        MyRosters.render();
      } catch (e) {
        alert(`Could not delete: ${e.message}`);
      }
    },
  };

  // ── ROUTER ───────────────────────────────────────────────────────────────────

  const Router = {
    init() {
      window.addEventListener('hashchange', Router.render);
      Router.render();
    },

    render() {
      const raw   = location.hash.slice(1) || 'home';
      const parts = raw.split('/').filter(Boolean);
      const [screen, sub, param] = parts;

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

      const back  = document.getElementById('nav-back');
      const title = document.getElementById('nav-title');
      const crumb = document.getElementById('nav-crumb');

      crumb.textContent = '';

      // ROSTER_UX_2: Unit Creator (+ Add Unit, edit, delete), Library
      // browsing/editing, and Clean Drafts are all maintenance surfaces —
      // gated here at the router so direct hash navigation can't bypass it
      // (not just the buttons that link here). Failing the gate bounces
      // to home rather than rendering the screen half-authorized.
      const MAINTENANCE_SCREENS = new Set(['unit', 'library', 'clean-drafts']);
      if (MAINTENANCE_SCREENS.has(screen) && !Maintenance.gate('this is a Maintenance-only screen')) {
        location.hash = '#home';
        return;
      }

      switch (screen) {
        case 'unit':
          document.getElementById('screen-unit-form').classList.add('active');
          back.classList.add('visible');
          title.textContent = sub === 'new' ? 'Add Unit' : 'Edit Unit';
