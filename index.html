<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e1a;
      --surface:  #181828;
      --border:   #2e2e50;
      --text:     #dcdcf0;
      --text-dim: #6a6a90;
      --green:    #4caf74;
      --red:      #cc6060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #status {
      text-align: center;
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      min-width: 320px;
    }

    #status h1 { font-size: 1.2rem; margin-bottom: 1rem; letter-spacing: 0.05em; }
    #status p  { font-size: 0.9rem; color: var(--text-dim); margin-top: 0.5rem; }

    .ok  { color: var(--green); }
    .err { color: var(--red); }
  </style>
</head>
<body>
  <div id="status">
    <h1>Roster Manager</h1>
    <p>Connecting to Firebase...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();

    const SCHEMAS = {
      'kill-team': {
        name: 'Kill Team',
        statBlock: ['APL', 'MOVE', 'SAVE', 'WOUNDS'],
        weaponProfiles: ['ATK', 'HIT', 'DMG', 'WR'],
        hasWeaponType: true
      },
      'warhammer-40k': {
        name: 'Warhammer 40,000',
        statBlock: ['M', 'T', 'SV', 'W', 'LD', 'OC'],
        weaponProfiles: ['RANGE', 'A', 'BS/WS', 'S', 'AP', 'D'],
        hasWeaponType: true
      }
    };

    async function seedSchemas() {
      const snap = await db.ref('rosterSchemas').once('value');
      const existing = snap.val() || {};
      const writes = {};
      for (const [id, schema] of Object.entries(SCHEMAS)) {
        if (!existing[id]) writes[id] = schema;
      }
      if (Object.keys(writes).length > 0) {
        await db.ref('rosterSchemas').update(writes);
        return Object.keys(writes);
      }
      return [];
    }

    const statusEl = document.getElementById('status');

    seedSchemas()
      .then(seeded => {
        statusEl.innerHTML = `
          <h1>Roster Manager</h1>
          <p class="ok">Firebase connected ✓</p>
          ${seeded.length > 0
            ? `<p>Seeded: ${seeded.join(', ')}</p>`
            : '<p>Schemas already present.</p>'}
        `;
      })
      .catch(err => {
        statusEl.innerHTML = `
          <h1>Roster Manager</h1>
          <p class="err">Connection failed: ${err.message}</p>
        `;
      });
  </script>
</body>
</html>
