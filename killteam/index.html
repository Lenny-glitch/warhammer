  const otherReady = hasReady(otherSlot);
  const myReady    = hasReady(justActivatedSlot);

  if (!otherReady && !myReady) {
    // All operatives expended — end Turning Point
    await endTurningPoint();
    return;
  }

  // Switch to other player; if they have no ready ops, stay with current
  const next = otherReady ? otherSlot : justActivatedSlot;
  await db.ref(`games-kt/${gameId}/turn/activatingPlayer`).set(next);
}

async function endTurningPoint() {
  const tp           = gameData.turn?.turningPoint || 1;
  const activePlayer = gameData.turn?.activePlayer || 'player1';

  if (tp >= 4) {
    await db.ref(`games-kt/${gameId}`).update({ 'meta/status': 'ended' });
    return;
  }

  // Single atomic update: TP increment + strategy phase reset in one write.
  await startStrategyPhase(activePlayer, { 'turn/turningPoint': tp + 1 });
}

// ═══════════════════════════════════════════════════════════
//  DRAG TO MOVE
// ═══════════════════════════════════════════════════════════

function startMove(playerSlot, isDash) {
  if (!activation) return;
  if (shootState || gameData.pendingShot) return;
  hideRadialMenu();
  const op     = (gameData.operatives || {})[activation.opId];
  if (!op || op.x < 0) return;

  const maxMove = isDash ? 3 : op.move;
  const boardWrap = document.getElementById(`board-wrap-${playerSlot}`);
  const svg = boardWrap?.querySelector('svg.board-svg');
  if (!svg) return;

  // Dim all tokens except active
  svg.querySelectorAll('.op-token').forEach(g => {
    g.style.opacity = g.getAttribute('data-op-id') === op.id ? '1' : '0.25';
  });

  const overlay = svg.querySelector(`#overlay-${playerSlot}`);
  clearEl(overlay);

  const arcRgb = playerSlot === 'player1' ? '74,158,255' : '201,122,247';
  dragState = { opId: op.id, startX: op.x, startY: op.y, maxMove, isDash, svg, overlay, playerSlot,
                maxSightRange: getMaxSightRange(op), arcRgb };

  // Ghost at start position
  overlay.appendChild(svgEl('circle', {
    cx: op.x, cy: op.y, r: TOKEN_R * 0.8,
    fill: 'none', stroke: 'rgba(201,168,76,0.4)', 'stroke-width': 0.1, 'stroke-dasharray': '0.4 0.25',
  }));

  // Range circle
  overlay.appendChild(svgEl('circle', {
    cx: op.x, cy: op.y, r: maxMove,
    fill: 'rgba(201,168,76,0.04)', stroke: 'rgba(201,168,76,0.25)', 'stroke-width': 0.1, 'stroke-dasharray': '0.5 0.3',
  }));

  svg.style.cursor = 'crosshair';

  function onMouseMove(e) {
    if (!dragState) return;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const p   = pt.matrixTransform(svg.getScreenCTM().inverse());
    const clamped = clampVec(dragState.startX, dragState.startY, p.x, p.y, maxMove);
    const snapped = snapToGrid(clamped.x, clamped.y);
    updateDragOverlay(snapped.x, snapped.y);
  }

  function onMouseUp(e) {
    if (!dragState) return;
    svg.removeEventListener('mousemove', onMouseMove);
    svg.removeEventListener('mouseup',   onMouseUp);
    svg.style.cursor = '';

    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const p       = pt.matrixTransform(svg.getScreenCTM().inverse());
    const clamped = clampVec(dragState.startX, dragState.startY, p.x, p.y, maxMove);
    const snapped = snapToGrid(clamped.x, clamped.y);

    if (activation) {
      if (isDash) activation.hasDashed = true;
      else        activation.hasMoved  = true;
    }
    commitMove(snapped.x, snapped.y, 1, playerSlot);
    dragState = null;
  }

  svg.addEventListener('mousemove', onMouseMove);
  svg.addEventListener('mouseup',   onMouseUp);
}

function updateDragOverlay(tx, ty) {
  if (!dragState) return;
  const { overlay, startX, startY } = dragState;
  // Remove old arrow (keep range circle and ghost — first two children)
  while (overlay.children.length > 2) overlay.removeChild(overlay.lastChild);

  const dist = Math.hypot(tx - startX, ty - startY);

  // Distance line
  overlay.appendChild(svgEl('line', {
    x1: startX, y1: startY, x2: tx, y2: ty,
    stroke: '#c9a84c', 'stroke-width': 0.2, 'stroke-dasharray': '0.5 0.25', opacity: '0.7',
  }));

  // Destination token preview
  overlay.appendChild(svgEl('circle', {
    cx: tx, cy: ty, r: TOKEN_R,
    fill: 'rgba(201,168,76,0.2)', stroke: '#c9a84c', 'stroke-width': 0.15, opacity: '0.8',
  }));

  // Distance label
  const lx = (startX + tx) / 2 + 0.3;
  const ly = (startY + ty) / 2 - 0.5;
  overlay.appendChild(svgEl('rect', { x: lx - 0.5, y: ly - 0.5, width: 2.2, height: 0.9, fill: '#0a0a14', rx: 0.2, opacity: '0.85' }));
  const lbl = svgEl('text', {
    x: lx + 0.6, y: ly + 0.15,
    'text-anchor': 'middle', fill: '#c9a84c', 'font-size': 0.75,
    'font-family': 'sans-serif', 'font-weight': 700,
  });
  lbl.textContent = dist.toFixed(1) + '"';
  overlay.appendChild(lbl);

  // Firing arc — weapon range projected from drag destination
  if (dragState.maxSightRange > 0) {
    const { arcRgb, maxSightRange } = dragState;
    // BUG_KT_UNLIMITED_RANGE: Infinity (an unlimited-range weapon) has no
    // meaningful circle to draw — skip the radius ring, but every enemy
    // still counts as "in range" below.
    const unlimited = !Number.isFinite(maxSightRange);
    if (!unlimited) {
      overlay.appendChild(svgEl('circle', {
        cx: tx, cy: ty, r: maxSightRange,
        fill: `rgba(${arcRgb},0.10)`,
        stroke: `rgba(${arcRgb},0.30)`,
        'stroke-width': 0.12, 'stroke-dasharray': '0.4 0.25',
      }));
    }
    const myPlayer = (gameData.operatives[dragState.opId] || {}).player;
    for (const enemy of Object.values(gameData.operatives || {})) {
      if (enemy.player === myPlayer || enemy.wounds <= 0 || enemy.x < 0) continue;
      if (unlimited || Math.hypot(enemy.x - tx, enemy.y - ty) <= maxSightRange) {
        overlay.appendChild(svgEl('circle', {
          cx: enemy.x, cy: enemy.y, r: TOKEN_R + 0.12,
          fill: 'none', stroke: 'rgba(255,220,50,0.60)', 'stroke-width': 0.14,
        }));
      }
    }
  }
}

async function commitMove(tx, ty, apCost, playerSlot) {
  if (!activation) return;
  const opId = activation.opId;

  await db.ref(`games-kt/${gameId}/operatives/${opId}`).update({ x: tx, y: ty });

  activation.apSpent = true;
  activation.apRemaining -= apCost;
  if (activation.apRemaining <= 0) {
    await endActivation(playerSlot);
  } else {
    reRenderPhaseBar();
  }
}

function setupDragMove(svg, playerSlot, unitG, overlay) {
  svg.addEventListener('contextmenu', e => {
    e.preventDefault();
    cancelActivation();
  });

  svg.addEventListener('click', e => {
    if (dragState || shootState) return;
    // Walk up from event target to find an op-token group.
    let node = e.target;
    while (node && node !== svg) {
      if (node.classList?.contains('op-token')) break;
      node = node.parentElement;
    }
    const opId = node?.classList?.contains('op-token') ? node.getAttribute('data-op-id') : null;

    if (opId) {
      const op = (gameData.operatives || {})[opId];
      // Already selected with no AP spent — deselect on second click.
      if (activation?.opId === opId && !activation.apSpent) { cancelActivation(); return; }
      // My ready operative, my turn to activate, nothing currently active.
      const myTurn = gameData.turn?.activatingPlayer === playerSlot;
      if (op?.player === playerSlot && op.ready && op.wounds > 0 && myTurn && !activation) {
        activateOperative(opId, playerSlot);
      }
    } else if (activation && !activation.apSpent) {
      // Empty-space click — deselect with no AP cost.
      cancelActivation();
    }
  });
}

// KT-2 Part 2: drag directly from the active operative's own token onto a
// target to start Shoot in one motion — an addition alongside the
// existing Shoot-button -> aim-drag -> release flow, not a replacement.
// Once armed (mouse moved past THRESHOLD), this hands off to the exact
// same beginShootDrag()/updateShootOverlay()/getShootValidity()/
// confirmShootTarget() pipeline the button path already uses — same code,
// so live validity feedback during the drag (LOS/engaged/concealed
// reasons) and everything downstream (crit coloring, bonus resolution)
// come for free, not re-implemented.
//
// Document-level, registered once (idempotent via flag, same pattern as
// the Escape-key binding below) rather than per-render on the SVG. First
// attempt attached to the SVG only and missed a real conflict: the
// moment an operative activates, showRadialMenu() draws a 44px "End"
// button as a plain HTML <div>, positioned exactly on top of the token's
// screen position — a mousedown starting there never reaches the SVG at
// all, so a token-scoped listener silently never arms. Checking proximity
// to the active operative's own screen position (via its board's SVG
// CTM) instead of walking up from e.target sidesteps the question of
// which element is actually on top.
//
// Below-threshold mousedown+mouseup (a plain click, no real drag) never
// calls preventDefault/stopPropagation, so the native `click` event still
// reaches setupDragMove's listener afterward — existing activate/deselect
// behavior on the active operative's own token is untouched.
if (!window._ktDragShootBound) {
  window._ktDragShootBound = true;
  const THRESHOLD = 8;   // px, screen space — real drag vs a plain click
  const ARM_RADIUS = 28; // px, screen space — token radius + the radial menu's End button + slack
  let candidate = null;

  function ktDragShootArm(e) {
    if (candidate || dragState || shootState || fightState) return;
    if (!activation || !gameData || gameData.pendingShot || gameData.pendingFight) return;

    const playerSlot = activation.playerSlot;
    const op = (gameData.operatives || {})[activation.opId];
    if (!op || op.player !== playerSlot || op.x < 0) return;
    if (activation.apRemaining < 1 || op.order === 'conceal') return;
    const ranged = getRangedWeapons(op);
    if (!ranged.length) return;

    const svg = document.getElementById(`board-wrap-${playerSlot}`)?.querySelector('svg.board-svg');
    if (!svg) return;
    const pt = svg.createSVGPoint();
    pt.x = op.x; pt.y = op.y;
    const screen = pt.matrixTransform(svg.getScreenCTM());
    if (Math.hypot(e.clientX - screen.x, e.clientY - screen.y) > ARM_RADIUS) return;

    candidate = { startX: e.clientX, startY: e.clientY, ranged, playerSlot };
  }

  function ktDragShootMove(e) {
    if (!candidate) return;
    const dx = e.clientX - candidate.startX, dy = e.clientY - candidate.startY;
    if (Math.hypot(dx, dy) < THRESHOLD) return;

    const { ranged, playerSlot } = candidate;
    candidate = null;
    hideRadialMenu();
    if (ranged.length === 1) {
      beginShootDrag(playerSlot, ranged[0]);
    } else {
      // Multiple ranged weapons: picker appears, same as the button path
      // ("as today" per the brief) — the one-motion drag ends here, the
      // player picks a weapon via the existing picker UI, which itself
      // starts the normal beginShootDrag aim step from there.
      shootWeapon = 'picking';
      reRenderPhaseBar();
    }
  }

  document.addEventListener('mousedown', ktDragShootArm);
  document.addEventListener('mousemove', ktDragShootMove);
  document.addEventListener('mouseup',   () => { candidate = null; });
}

// ═══════════════════════════════════════════════════════════
//  RADIAL ACTION MENU
// ═══════════════════════════════════════════════════════════

function showRadialMenu(opId, playerSlot) {
  const op = (gameData.operatives || {})[opId];
  if (!op || op.x < 0) { hideRadialMenu(); return; }

  const boardWrap = document.getElementById(`board-wrap-${playerSlot}`);
  const svg = boardWrap?.querySelector('svg.board-svg');
  if (!svg) { hideRadialMenu(); return; }

  const pt = svg.createSVGPoint();
  pt.x = op.x; pt.y = op.y;
  const screen = pt.matrixTransform(svg.getScreenCTM());

  const menu = document.getElementById('radial-menu');
  if (!menu) return;

  const ap        = activation?.apRemaining ?? 0;
  const ranged    = getRangedWeapons(op);
  const melee     = getMeleeWeapons(op);
  const conceal   = op.order === 'conceal';
  const hasMoved  = activation?.hasMoved  || false;
  const hasDashed = activation?.hasDashed || false;
  const hasShot   = activation?.hasShot   || false;
  const hasFought = activation?.hasFought || false;

  const shootDisabled = ap < 1 || !ranged.length || !!shootState || !!fightState || !!gameData.pendingShot || !!gameData.pendingFight || conceal;
  const fightDisabled = ap < 1 || !melee.length  || !hasFightTarget(op) || !!shootState || !!fightState || !!gameData.pendingShot || !!gameData.pendingFight || hasFought;
  const moveDisabled  = ap < 1 || hasMoved;
  const dashDisabled  = ap < 1 || hasDashed;
  const orderDisabled = hasShot;

  const R    = 72;
  const bSz  = 50;
  const bOff = -Math.round(bSz / 2);
  const eSz  = 44;
  const eOff = -Math.round(eSz / 2);

  const orderLabel = op.order === 'engage' ? 'Conceal' : 'Engage';
  const orderCls   = op.order === 'engage' ? 'r-conceal' : 'r-engage';

  // locks: comma-sep data-action ids that become restricted if this action is taken
  const actions = [
    { id: 'order',  label: orderLabel, ap: null, angle: -90,
      cls: `r-order ${orderCls}`, fn: `toggleOrder('${opId}','${playerSlot}')`,
      disabled: orderDisabled, locks: '',
      title: orderDisabled ? 'Cannot switch to Conceal after shooting' : '' },
    { id: 'move',   label: 'Move', ap: 1, angle: -30, cls: '',
      fn: `startMove('${playerSlot}',false)`, disabled: moveDisabled, locks: '',
      title: hasMoved ? 'Already moved this activation' : '' },
    { id: 'dash',   label: 'Dash', ap: 1, angle: 30, cls: '',
      fn: `startMove('${playerSlot}',true)`, disabled: dashDisabled, locks: 'charge',
      title: hasDashed ? 'Already dashed' : '3″ — combine with Move for max distance' },
    { id: 'shoot',  label: 'Shoot', ap: 1, angle: 90, cls: 'r-shoot',
      fn: `startShoot('${playerSlot}')`, disabled: shootDisabled, locks: 'order',
      title: conceal ? 'Locked: Conceal order' : '' },
    { id: 'fight',  label: 'Fight',  ap: 1, angle: 150, cls: 'r-fight',
      fn: `startFight('${playerSlot}')`, disabled: fightDisabled, locks: '',
      title: hasFought ? 'Already fought this activation' : !hasFightTarget(op) ? 'No enemies in control range (1")' : !melee.length ? 'No melee weapons' : '' },
    { id: 'charge', label: 'Charge', ap: 1, angle: 210, cls: '', fn: '',
      disabled: true, locks: 'shoot',
      title: conceal ? 'Locked: Conceal order' : 'Coming in KT-3' },
  ];

  const items = actions.map(a => {
    const rad = a.angle * Math.PI / 180;
    const ix  = Math.round(R * Math.cos(rad)) + bOff;
    const iy  = Math.round(R * Math.sin(rad)) + bOff;
    const handler = !a.disabled && a.fn ? `onclick="${a.fn}"` : '';
    const titleAttr = a.title ? `title="${a.title}"` : '';
    return `<button class="radial-item ${a.cls}" style="left:${ix}px;top:${iy}px;" ${a.disabled ? 'disabled' : ''} ${handler} data-action="${a.id}" data-locks="${a.locks}" ${titleAttr}>
      <span class="ri-label">${a.label}</span>${a.ap != null ? `<span class="ri-ap">${a.ap}AP</span>` : ''}
    </button>`;
  }).join('');

  menu.innerHTML = `
    <button class="radial-end" style="left:${eOff}px;top:${eOff}px;width:${eSz}px;height:${eSz}px;" onclick="endActivation('${playerSlot}')">End</button>
    ${items}
  `;

  // Hover restriction display: show red X badge on buttons that would be locked
  menu.querySelectorAll('.radial-item[data-locks]').forEach(btn => {
    const lockIds = (btn.dataset.locks || '').split(',').filter(Boolean);
    if (!lockIds.length) return;
    btn.addEventListener('mouseenter', () => {
      lockIds.forEach(id => {
        menu.querySelectorAll(`[data-action="${id}"]`).forEach(b => b.classList.add('restriction-target'));
      });
    });
    btn.addEventListener('mouseleave', () => {
      menu.querySelectorAll('.restriction-target').forEach(b => b.classList.remove('restriction-target'));
    });
  });

  menu.style.left = screen.x + 'px';
  menu.style.top  = screen.y + 'px';
  menu.classList.add('visible');
}

function hideRadialMenu() {
  const menu = document.getElementById('radial-menu');
  if (!menu) return;
  menu.classList.remove('visible');
  menu.innerHTML = '';
}

function refreshRadialIfActive() {
  if (activation && !dragState && !shootState && !fightState) {
    showRadialMenu(activation.opId, activation.playerSlot);
  } else {
    hideRadialMenu();
  }
}

// ═══════════════════════════════════════════════════════════
//  SHOOT ACTION — KT-2 Part 2
// ═══════════════════════════════════════════════════════════

// BUG_KT_UNLIMITED_RANGE (2026-07-11): absent RNG means unlimited range,
// not zero — pipeline convention confirmed in PIPE-H1 (Firebase drops null
// keys, so an absent field IS the null; true for every PSYCHIC weapon in
// every faction, e.g. Legionary's Fireblast/Life siphon). Returns null for
// unlimited so callers can't accidentally treat it as a real numeric range
// via truthy/falsy collapse the way the old `|| 0` fallback did — every
// consumer below is written to check `=== null` explicitly, not `!range`
// (which null and 0 would both satisfy, silently reintroducing this bug).
function parseRng(s) {
  if (s === undefined || s === null || s === '') return null;
  const n = parseInt(s);
  return Number.isFinite(n) ? n : null;
}
// Range from the RNG field, falling back to a WR-text "Range N"" match —
// consolidates two previously-duplicated inline versions of this fallback
// (getMaxSightRange, the unit-card weapon row). Needed for older/
// snapshotted games whose export predates the pipeline capturing RNG
// directly (snapshot rule: those games must keep working as before, not
// just newly-uploaded ones). Returns null when genuinely unlimited (no
// RNG, no "Range N" in WR either).
function weaponRange(w) {
  const r = parseRng(w.profiles?.RNG);
  if (r !== null) return r;
  const m = /Range\s+(\d+)/i.exec(w.profiles?.WR || '');
  return m ? (parseInt(m[1]) || null) : null;
}
function parseHit(s)  { return parseInt(s  || '4') || 4; }
function parseDmgPair(s) {
  const p = String(s || '1/1').split('/').map(v => parseInt(v) || 1);
  return [p[0] || 1, p[1] || p[0] || 1]; // [normalDmg, critDmg]
}
function isInjuredOp(op) { return op.wounds > 0 && op.wounds <= op.maxWounds / 2; }

// BON-2a — profile extraction (pure refactor, no behavior change).
//
// Field names match shared/bonus-resolver.js's abstract stat vocabulary
// exactly (atkDice, hit, critThreshold, dmgNormal, dmgCrit, defDice, save)
// so BON-2b can call resolveStats(profile, bonuses, context) and plug the
// result straight back in — no renames at the integration point.
//
// critThreshold always holds 6 today (nothing sets it otherwise yet) — it
// exists as a real field, not a literal, specifically so Lethal x+ has
// somewhere to land in BON-2b without another pass through these
// functions. Same weapon/op inputs as before; only WHERE the numbers live
// changed.
function buildAttackProfile(weapon, op) {
  const hitStat = parseHit(weapon.profiles.HIT);
  const [dmgNormal, dmgCrit] = parseDmgPair(weapon.profiles.DMG);
  return {
    atkDice: parseInt(weapon.profiles.ATK) || 1,
    hit: isInjuredOp(op) ? Math.min(hitStat + 1, 6) : hitStat,
    critThreshold: 6,
    dmgNormal,
    dmgCrit,
  };
}

function buildDefenseProfile(op) {
  return {
    defDice: op.def  || 3,
    save:    op.save || 5,
  };
}

// ═══════════════════════════════════════════════════════════
//  BON-2b — bonus resolution
// ═══════════════════════════════════════════════════════════
//
// Verified-vs-assumed notes (checked against the live
// gameData/kill-team/bonuses/ catalog and the resolver's own doc comments
// before writing any of this — see DEVLOG for the full writeup):
//
// - Every catalog entry's `description` is the literal placeholder string
//   "Flavor/reference text only. Engine never reads this." — there is no
//   real prose to read for the dice-readout. describeBonus() below
//   generates the plain-English line from the bonus's name + effects
//   instead of from `description`.
// - No catalog effect sets `appliesTo: "target"` (the resolver's own doc
//   comment names Piercing's -1 defDice as the canonical appliesTo:target
//   example, but the live data doesn't tag it that way — only the `stun`
//   condition does). splitBonusesBySide() below routes mod effects by
//   stat name instead (defDice/save are exclusive to the defense side in
//   Shoot, so routing on the stat name is unambiguous and needs no
//   per-bonus special-casing); condition/flag effects still use
//   effect.appliesTo since they have no stat name to key off of.
// - Every catalog entry's `scope` object omits `filter`/`range` entirely
//   rather than setting them to `[]`/`null`. eligibleBonuses' range check
//   is `bonus.scope.range !== null` — with range OMITTED (undefined) that
//   condition is true, and it then fails closed if `context.positions` is
//   missing. So positions must ALWAYS be passed (see buildBonusContext),
//   even for plain weapon-keyword bonuses with no real range gate, or
//   every single bonus is silently dropped as an out-of-range aura.

function getWeaponBonuses(weapon, catalog) {
  const raw = Array.isArray(weapon?.bonuses) ? weapon.bonuses : [];
  // Weapon bonuses may already be full inline objects (gameData's per-unit
  // weapons carry them that way) or plain id strings referencing the
  // game-doc's snapshotted catalog — handle both without caring which.
  return raw.map(b => (typeof b === 'string' ? catalog[b] : b)).filter(Boolean);
}

// defDice/save only ever exist on a defenseProfile (Shoot only — Fight has
// no separate defense roll). Any mod effect targeting them belongs on the
// OTHER side's resolveStats call; everything else stays with the actor.
const DEFENSE_ONLY_STATS = new Set(['defDice', 'save']);

// Splits a flat list of (already weapon-attached) bonuses into two bonus
// lists — one to feed into the actor's own resolveStats call, one for the
// target's — by cloning each bonus with its effects array filtered. A
// single bonus with effects on both sides (none exist today) would appear,
// correctly, in both output lists.
function splitBonusesBySide(bonuses) {
  const actorBonuses = [], targetBonuses = [];
  for (const bonus of bonuses) {
    const actorEffects = [], targetEffects = [];
    for (const effect of bonus.effects || []) {
      const isTargetSide = effect.type === 'mod'
        ? DEFENSE_ONLY_STATS.has(effect.stat)
        : effect.appliesTo === 'target';
      (isTargetSide ? targetEffects : actorEffects).push(effect);
    }
    if (actorEffects.length)  actorBonuses.push({ ...bonus, effects: actorEffects });
    if (targetEffects.length) targetBonuses.push({ ...bonus, effects: targetEffects });
  }
  return { actorBonuses, targetBonuses };
}

// halfRange fact: derived purely from shared game-doc state (both
// combatants' board positions + the weapon's own range) — deterministic,
// so both clients would compute the same value if they ever needed to;
// no randomness involved, nothing to write into the action record for it.
// Unlimited range (null) always resolves false per the brief — already
// correct before BUG_KT_UNLIMITED_RANGE (parseRng's old 0-fallback was
// falsy too), kept explicit now that null is the real sentinel rather
// than relying on 0 and null happening to both be falsy.
function computeHalfRangeFact(weapon, distance) {
  const rng = parseRng(weapon?.profiles?.RNG);
  if (rng === null) return false;
  return distance <= rng / 2;
}

function buildBonusContext(trigger, facts, actorPos, targetPos) {
  // positions always supplied — see the scope.range landmine noted above.
  return {
    trigger, facts,
    actor:  { keywords: [] },
    target: { keywords: [] },
    positions: { actor: actorPos, target: targetPos },
  };
}

// Reroll failed attack dice per the resolved profile's rerollOne/rerollAll
// (Balanced / Ceaseless / Relentless). "Failed" mirrors the classification
// used everywhere else: a natural 1 always fails, otherwise fails if below
// `hit`. rerollAll takes priority (Ceaseless/Relentless over Balanced);
// each die gets at most one reroll — no chained re-rerolling.
function applyRerolls(rolls, profile) {
  const isMiss = d => d === 1 || d < profile.hit;
  if (profile.rerollAll > 0) return rolls.map(d => isMiss(d) ? Math.ceil(Math.random() * 6) : d);
  if (profile.rerollOne > 0) {
    const idx = rolls.findIndex(isMiss);
    if (idx >= 0) { const out = rolls.slice(); out[idx] = Math.ceil(Math.random() * 6); return out; }
  }
  return rolls;
}

// Discards the `count` lowest-value already-rolled dice. Used when a
// post-roll conditional pass (Piercing Crits) lowers defDice after the
// dice for the ORIGINAL (higher) defDice count are already rolled —
// dice can't retroactively un-roll, so the effect is realized as the
// defender's worst already-rolled dice being knocked out instead.
function discardWorstDice(rolls, count) {
  if (count <= 0) return rolls.slice();
  const order = rolls.map((v, i) => i).sort((a, b) => rolls[a] - rolls[b]);
  const drop = new Set(order.slice(0, count));
  return rolls.filter((_, i) => !drop.has(i));
}

const STAT_LABELS = {
  atkDice: 'attack dice', hit: 'hit threshold', critThreshold: 'crit threshold',
  dmgNormal: 'normal damage', dmgCrit: 'crit damage', defDice: 'defence dice',
  save: 'save threshold', retainNormal: 'bonus normal hit(s)', retainCrit: 'bonus crit hit(s)',
  rerollOne: 'reroll worst die', rerollAll: 'reroll all failed dice',
};
const WHEN_LABELS = { critScored: 'on a crit', noCritScored: 'if no crit scored', halfRange: 'at half range' };

// Generates the dice-readout's plain-English line for one applied bonus.
// Reads bonus.name + effect shape, NOT bonus.description — see the
// verified-vs-assumed note above for why (every description in the live
// catalog is an identical placeholder string).
function describeBonus(bonus) {
  const parts = (bonus.effects || []).map(e => {
    const whenTxt = e.when ? ` (${WHEN_LABELS[e.when] || e.when})` : '';
    if (e.type === 'flag') return `flags ${e.flag}`;
    if (e.type === 'condition') return `applies ${e.condition}${whenTxt}`;
    if (e.type === 'mod') {
      const label = STAT_LABELS[e.stat] || e.stat;
      if (e.op === 'cap') return `cap ${label} at ${e.value}${whenTxt}`;
      if (e.op === 'set') return `set ${label} to ${e.value}${whenTxt}`;
      const sign = e.value >= 0 ? '+' : '';
      return `${sign}${e.value} ${label}${whenTxt}`;
    }
    return '';
  }).filter(Boolean);
  return `${bonus.name}: ${parts.join(', ')}`;
}

// resolveStats' `applied` array has one entry per effect (a bonus with
// multiple effects, or one that fired on both the pre- and post-roll pass,
// appears more than once) — dedupe to one readout line per bonus id.
// Looks bonus objects up in the ORIGINAL (unsplit) weapon-bonuses list so
// describeBonus sees every effect, not just whichever side a given effect
// was routed to.
function dedupeAppliedBonuses(originalBonuses, appliedRecords) {
  const byId = new Map(originalBonuses.map(b => [b.id, b]));
  const seen = new Set();
  const out = [];
  for (const rec of appliedRecords) {
    if (seen.has(rec.bonusId)) continue;
    seen.add(rec.bonusId);
    const bonus = byId.get(rec.bonusId);
    if (bonus) out.push({ bonusId: bonus.id, name: bonus.name, text: describeBonus(bonus) });
  }
  return out;
}

// A natural 6 is an unmodifiable crit-save in KT — unlike attack crits
// (Lethal x+ can lower attackProfile.critThreshold), no keyword touches
// the defender's save-crit face. Not part of buildDefenseProfile's shape
// (that shape is fixed by the resolver vocabulary) — a plain constant so
// there's still no bare numeric literal at the defense roll-classification
// site below.
const DEFENSE_CRIT_FACE = 6;

// Pure: takes ALREADY-ROLLED dice (never calls Math.random itself), so it's
// directly testable — this is what the replay-identity harness runs
// against. Mirrors the pre-refactor inline logic exactly, with one
// intentional widening: crit-hit classification changed from `d === 6` to
// `d >= profile.critThreshold`. Behaviorally identical today (critThreshold
// is always 6, and nothing rolls above 6 on a d6) — but `===` would
// silently exclude actual 6s the moment Lethal x+ lowers the threshold
// below 6 in BON-2b, so this is a latent-bug fix riding along with the
// extraction, not scope creep.
function resolveShotOutcome(attackProfile, defenseProfile, atkRolls, defRolls, useCover) {
  defRolls = defRolls.slice();

  if (useCover && defRolls.length > 0) {
    // Convert the lowest non-crit die to an auto normal save.
    let minIdx = -1;
    for (let i = 0; i < defRolls.length; i++) {
      if (defRolls[i] !== DEFENSE_CRIT_FACE && (minIdx < 0 || defRolls[i] < defRolls[minIdx])) minIdx = i;
    }
    if (minIdx >= 0) defRolls[minIdx] = 'auto';
  }

  // retainCrit/retainNormal (BON-2b): guaranteed extra hits granted outright
  // by a bonus (Accurate, Punishing, Rending, Severe) — not tied to any
  // die, so they're added on top of the dice-classified counts. Default 0
  // when absent (no bonuses / pre-BON-2b games) — identical to 2a's output.
  const critHits    = atkRolls.filter(d => d >= attackProfile.critThreshold).length + (attackProfile.retainCrit || 0);
  const normalHits  = atkRolls.filter(d => d < attackProfile.critThreshold && d !== 1 && d >= attackProfile.hit).length + (attackProfile.retainNormal || 0);
  const critSaves   = defRolls.filter(d => d === DEFENSE_CRIT_FACE).length;
  const normalSaves = defRolls.filter(d => d === 'auto' || (typeof d === 'number' && d !== DEFENSE_CRIT_FACE && d >= defenseProfile.save)).length;

  let rC = critHits, rN = normalHits, rCS = critSaves, rNS = normalSaves;
  const csForCrit = Math.min(rC, rCS); rC -= csForCrit; rCS -= csForCrit;
  while (rC > 0 && rNS >= 2) { rC--; rNS -= 2; }
  const csForNorm = Math.min(rN, rCS); rN -= csForNorm;
  const nsForNorm = Math.min(rN, rNS); rN -= nsForNorm;

  const totalDamage = rC * attackProfile.dmgCrit + rN * attackProfile.dmgNormal;

  return { defRolls, remainingCritHits: rC, remainingNormalHits: rN, totalDamage };
}

// Pure, same shape as resolveShotOutcome — both combatants in a fight are
// "attacking" (KT melee has no separate save roll, both sides roll to-hit
// and block), so both get an attackProfile via the SAME buildAttackProfile
// call, not a defenseProfile. One construction path, two consumers, per
// the brief.
function resolveFightOutcome(atkProfile, defProfile, atkRolls, defRolls) {
  const classify = (d, profile) => {
    if (d >= profile.critThreshold) return 'crit';
    if (d !== 1 && d >= profile.hit) return 'hit';
    return 'miss';
  };
  const atkAnnotated = atkRolls.map(d => classify(d, atkProfile));
  const defRaw        = defRolls.map(d => classify(d, defProfile));

  // retainCrit/retainNormal (BON-2b): guaranteed extra hits from a bonus,
  // not tied to a die — folded into the totals the blocking simulation and
  // damage math both run against. Defaults to 0 (no bonuses) reproduces 2a
  // exactly, since the totals then equal the dice-only counts below.
  const totalAtkCrits = atkAnnotated.filter(c => c === 'crit').length + (atkProfile.retainCrit || 0);
  const totalAtkHits  = atkAnnotated.filter(c => c === 'hit').length  + (atkProfile.retainNormal || 0);
  const totalDefCrits = defRaw.filter(c => c === 'crit').length + (defProfile.retainCrit || 0);
  const totalDefHits  = defRaw.filter(c => c === 'hit').length  + (defProfile.retainNormal || 0);

  let rAtkCrits = totalAtkCrits, rAtkHits = totalAtkHits, rDefCrits = totalDefCrits, rDefHits = totalDefHits;

  const dCritBlockC = Math.min(rDefCrits, rAtkCrits);
  rDefCrits -= dCritBlockC; rAtkCrits -= dCritBlockC;
  const dCritBlockH = Math.min(rDefCrits, rAtkHits);
  rDefCrits -= dCritBlockH; rAtkHits -= dCritBlockH;
  const dHitBlockH = Math.min(rDefHits, rAtkHits);
  rDefHits -= dHitBlockH; rAtkHits -= dHitBlockH;

  const defStrikeCrits = rDefCrits;
  const defStrikeHits  = rDefHits;

  const dmgToDefender = (totalAtkCrits - dCritBlockC) * atkProfile.dmgCrit +
                        (totalAtkHits  - dCritBlockH - dHitBlockH) * atkProfile.dmgNormal;
  const dmgToAttacker = defStrikeCrits * defProfile.dmgCrit + defStrikeHits * defProfile.dmgNormal;

  let defCritBlockLeft = dCritBlockC + dCritBlockH;
  let defHitBlockLeft  = dHitBlockH;
  const defAnnotated = defRaw.map(c => {
    if (c === 'crit' && defCritBlockLeft > 0) { defCritBlockLeft--; return 'crit-block'; }
    if (c === 'hit'  && defHitBlockLeft  > 0) { defHitBlockLeft--;  return 'hit-block'; }
    if (c === 'crit') return 'crit-strike';
    if (c === 'hit')  return 'hit-strike';
    return 'miss';
  });

  return { atkAnnotated, defAnnotated, dmgToDefender, dmgToAttacker };
}
function getRangedWeapons(op) {
  // BUG_KT_UNLIMITED_RANGE: was `parseRng(...) > 0`, using range as a
  // proxy for "is this a ranged weapon" — an unlimited-range weapon
  // (parseRng null) silently vanished from this list, no error, just no
  // Shoot button. The weapon's own type field is the actual discriminator
  // (same pattern getMeleeWeapons already uses); range has nothing to do
  // with whether a weapon IS ranged, only how far it reaches.
  return (op.weapons || []).filter(w => w.type === 'ranged');
}
function getMeleeWeapons(op) {
  return (op.weapons || []).filter(w => w.type === 'melee');
}
function getDefaultMeleeWeapon(op) {
  const melee = getMeleeWeapons(op);
  return melee.find(w => w.isDefault) || melee[0] || null;
}
// Returns Infinity if any ranged weapon has unlimited range — callers
// (movement-drag firing-arc overlay) must handle that explicitly, since
// drawing an SVG circle with r=Infinity isn't meaningful.
function getMaxSightRange(op) {
  let max = 0;
  for (const w of (op.weapons || [])) {
    if (w.type !== 'ranged') continue;
    const r = weaponRange(w);
    if (r === null) return Infinity;
    if (r > max) max = r;
  }
  return max;
}
function hasFightTarget(op) {
  return Object.values(gameData.operatives || {}).some(o =>
    o.player !== op.player && o.wounds > 0 && o.x >= 0 &&
    Math.hypot(o.x - op.x, o.y - op.y) <= 1
  );
}

// Returns { valid, reason, inCover }
function getShootValidity(attacker, target, weapon) {
  const terrain = gameData.terrain || {};
  const range   = weaponRange(weapon);
  const dist    = Math.hypot(target.x - attacker.x, target.y - attacker.y);

  if (target.wounds <= 0)                    return { valid: false, reason: 'Incapacitated', inCover: false };
  if (target.order === 'conceal')            return { valid: false, reason: 'CONCEALED',     inCover: false };
  // BUG_KT_UNLIMITED_RANGE: range === null means unlimited — any target
  // in LOS is in range, per the brief. Previously `range` fell back to 0
  // for an absent RNG, so `dist > range` was true for any positive
  // distance and every unlimited-range shot read as "Out of range".
  if (range !== null && dist > range)        return { valid: false, reason: 'Out of range',  inCover: false };

  const los = rayResult(attacker.x, attacker.y, target.x, target.y, terrain);
  if (los === 'blocked')          return { valid: false, reason: 'LOS blocked',   inCover: false };

  // Don't shoot into melee: attacker has a friendly within 1" of target
  const friendlyInMelee = Object.values(gameData.operatives || {}).some(o =>
    o.player === attacker.player && o.id !== attacker.id && o.x >= 0 &&
    o.wounds > 0 && Math.hypot(o.x - target.x, o.y - target.y) < 1
  );
  if (friendlyInMelee) return { valid: false, reason: 'Friendly in melee', inCover: false };

  return { valid: true, reason: null, inCover: los === 'cover' };
}

function startShoot(playerSlot) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  if (!op || op.x < 0) return;
  const ranged = getRangedWeapons(op);
  if (!ranged.length) return;
  hideRadialMenu();
  if (ranged.length === 1) { beginShootDrag(playerSlot, ranged[0]); return; }
  shootWeapon = 'picking';
  reRenderPhaseBar();
}

function pickWeaponForShoot(playerSlot, idx) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  const w  = getRangedWeapons(op)[idx];
  if (w) beginShootDrag(playerSlot, w);
}

function cancelShoot() {
  shootWeapon = null;
  if (shootState) {
    clearEl(shootState.overlay);
    shootState.svg.style.cursor = '';
    shootState = null;
  }
  const ps = activation?.playerSlot;
  if (gameId) db.ref(`games-kt/${gameId}/pendingShot`).remove();
  // AP already spent on target confirmation — if exhausted, end activation
  if (activation && activation.apSpent && activation.apRemaining <= 0) {
    endActivation(ps);
  } else {
    reRenderPhaseBar();
    reRender();
  }
}

function beginShootDrag(playerSlot, weapon) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  if (!op || op.x < 0) return;

  shootWeapon = weapon;
  reRenderPhaseBar();

  const boardWrap = document.getElementById(`board-wrap-${playerSlot}`);
  const svg = boardWrap?.querySelector('svg.board-svg');
  if (!svg) return;

  const overlay = svg.querySelector(`#overlay-${playerSlot}`);
  clearEl(overlay);
  shootState = { opId: op.id, weapon, svg, overlay, playerSlot };
  svg.style.cursor = 'crosshair';

  function onMouseMove(e) {
    if (!shootState) return;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    updateShootOverlay(pt.matrixTransform(svg.getScreenCTM().inverse()));
  }

  function onMouseUp(e) {
    if (!shootState) return;
    svg.removeEventListener('mousemove', onMouseMove);
    svg.removeEventListener('mouseup',   onMouseUp);

    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const p = pt.matrixTransform(svg.getScreenCTM().inverse());

    const attacker = (gameData.operatives || {})[shootState.opId];
    const target   = Object.values(gameData.operatives || {}).find(o =>
      o.player !== attacker?.player && o.wounds > 0 && o.x >= 0 &&
      Math.hypot(o.x - p.x, o.y - p.y) < TOKEN_R * 1.5
    );

    const ss = shootState;
    shootState = null;
    clearEl(ss.overlay);
    ss.svg.style.cursor = '';

    if (target && attacker) {
      const v = getShootValidity(attacker, target, weapon);
      if (v.valid) { confirmShootTarget(attacker, target, weapon, playerSlot, v.inCover); return; }
    }
    shootWeapon = null;
    reRenderPhaseBar();
  }

  svg.addEventListener('mousemove', onMouseMove);
  svg.addEventListener('mouseup',   onMouseUp);
}

function updateShootOverlay(p) {
  if (!shootState) return;
  const { opId, weapon, overlay } = shootState;
  const attacker = (gameData.operatives || {})[opId];
  if (!attacker) return;

  clearEl(overlay);
  const range = weaponRange(weapon);
  const mx = p.x, my = p.y;

  // Weapon range circle — BUG_KT_UNLIMITED_RANGE: null (unlimited) has no
  // meaningful radius to draw; getShootValidity() below already treats
  // every target as in-range regardless, so skipping the ring is the only
  // change needed here.
  if (range !== null) {
    overlay.appendChild(svgEl('circle', {
      cx: attacker.x, cy: attacker.y, r: range,
      fill: 'rgba(200,80,50,0.04)', stroke: 'rgba(200,80,50,0.25)',
      'stroke-width': 0.1, 'stroke-dasharray': '0.5 0.3',
    }));
  }

  // Nearest hovered enemy
  const hoverTarget = Object.values(gameData.operatives || {}).find(o =>
    o.player !== attacker.player && o.wounds > 0 && o.x >= 0 &&
    Math.hypot(o.x - mx, o.y - my) < TOKEN_R * 1.5
  );

  let stroke = 'rgba(160,160,180,0.5)', dash = '0.3 0.2', lw = 0.12, lc = 'rgba(160,160,180,0.9)';
  let ex = mx, ey = my, labelTxt = Math.hypot(mx - attacker.x, my - attacker.y).toFixed(1) + '"';

  if (hoverTarget) {
    ex = hoverTarget.x; ey = hoverTarget.y;
    const v = getShootValidity(attacker, hoverTarget, weapon);
    const tDist = Math.hypot(ex - attacker.x, ey - attacker.y).toFixed(1);
    if (!v.valid) {
      stroke = '#e74c3c'; dash = '0.35 0.2'; lw = 0.15; lc = '#e74c3c';
      labelTxt = v.reason || 'Invalid';
    } else if (v.inCover) {
      stroke = '#e67e22'; dash = 'none'; lw = 0.2; lc = '#e67e22';
      labelTxt = tDist + '" (Cover)';
    } else {
      stroke = '#27ae60'; dash = 'none'; lw = 0.2; lc = '#27ae60';
      labelTxt = tDist + '"';
    }
    const ringCol = !v.valid ? '#e74c3c' : v.inCover ? '#e67e22' : '#f1c40f';
    overlay.appendChild(svgEl('circle', {
      cx: ex, cy: ey, r: TOKEN_R * 1.65,
      fill: 'none', stroke: ringCol, 'stroke-width': 0.14, opacity: '0.85',
    }));
  }

  const lineAttrs = { x1: attacker.x, y1: attacker.y, x2: ex, y2: ey, stroke, 'stroke-width': lw };
  if (dash !== 'none') lineAttrs['stroke-dasharray'] = dash;
  overlay.appendChild(svgEl('line', lineAttrs));

  const midX = (attacker.x + ex) / 2, midY = (attacker.y + ey) / 2 - 0.55;
  const lblW  = Math.max(1.4, labelTxt.length * 0.165 + 0.4);
  overlay.appendChild(svgEl('rect', { x: midX - lblW/2, y: midY - 0.35, width: lblW, height: 0.72, fill: '#0a0a14', rx: 0.15, opacity: '0.9' }));
  const lbl = svgEl('text', { x: midX, y: midY + 0.12, 'text-anchor': 'middle', fill: lc, 'font-size': 0.6, 'font-family': 'sans-serif', 'font-weight': 700 });
  lbl.textContent = labelTxt;
  overlay.appendChild(lbl);
}

async function confirmShootTarget(attacker, target, weapon, playerSlot, inCover) {
  if (!activation) return;
  activation.hasShot      = true;
  activation.apSpent      = true;
  activation.apRemaining -= 1;

  await db.ref(`games-kt/${gameId}/pendingShot`).set({
    attackerOpId: attacker.id,
    targetOpId:   target.id,
    attackerSlot: playerSlot,
    weapon,
    inCover,
    useCover:     false,
    coverDecided: !inCover,  // no cover = decision is instant
    phase:        'coverChoice',
  });
  shootWeapon = null;
  reRenderPhaseBar();
}

async function decideCover(useIt) {
  const p = gameData.pendingShot;
  if (!p || !p.inCover) return;
  await db.ref(`games-kt/${gameId}/pendingShot`).update({ useCover: useIt, coverDecided: true });
}

async function rollShot(playerSlot) {
  const p = gameData.pendingShot;
  if (!p || p.phase !== 'coverChoice' || !p.coverDecided) return;

  const attacker = (gameData.operatives || {})[p.attackerOpId];
  const target   = (gameData.operatives || {})[p.targetOpId];
  if (!attacker || !target) return;

  const baseAttack  = buildAttackProfile(p.weapon, attacker);
  const baseDefense = buildDefenseProfile(target);

  // BON-2b: this whole block only ever runs on the attacker's client (the
  // Roll Dice button is attacker-only) — the defender's client just reads
  // the fully-resolved fields written below and never recomputes anything,
  // preserving the existing cross-client determinism pattern.
  const catalog = gameData.bonuses || {};
  const weaponBonuses = getWeaponBonuses(p.weapon, catalog);
  const { actorBonuses, targetBonuses } = splitBonusesBySide(weaponBonuses);

  const distance  = Math.hypot(attacker.x - target.x, attacker.y - target.y);
  const halfRange = computeHalfRangeFact(p.weapon, distance);
  const preFacts  = halfRange ? ['halfRange'] : [];
  const actorPos  = { x: attacker.x, y: attacker.y };
  const targetPos = { x: target.x,   y: target.y };

  const preCtx     = buildBonusContext('onShoot', preFacts, actorPos, targetPos);
  const actorElig0  = BonusResolver.eligibleBonuses(actorBonuses,  preCtx);
  const targetElig0 = BonusResolver.eligibleBonuses(targetBonuses, preCtx);
  const preAttack  = BonusResolver.resolveStats(baseAttack,  actorElig0,  preCtx).stats;
  const preDefense = BonusResolver.resolveStats(baseDefense, targetElig0, preCtx).stats;

  let atkRolls = Array.from({ length: preAttack.atkDice },  () => Math.ceil(Math.random() * 6));
  atkRolls     = applyRerolls(atkRolls, preAttack);
  const defRollsRaw = Array.from({ length: preDefense.defDice }, () => Math.ceil(Math.random() * 6));

  // Post-roll conditional pass: now that the dice are down, resolve again
  // with critScored/noCritScored in the fact list. A single resolveStats
  // call naturally sums unconditional + now-satisfied conditional effects
  // for the same stat (e.g. Piercing's flat -1 defDice and Piercing Crits'
  // conditional -1 defDice both land on the same `defDice` add-bucket) —
  // no manual per-bonus delta-diffing, no special-casing Rending/Severe/
  // Punishing vs anything else.
  const rawCritCount = atkRolls.filter(d => d >= preAttack.critThreshold).length;
  const critScored   = (rawCritCount + (preAttack.retainCrit || 0)) > 0;
  const condFacts    = preFacts.concat(critScored ? 'critScored' : 'noCritScored');
  const condCtx      = buildBonusContext('onShoot', condFacts, actorPos, targetPos);

  const actorElig1  = BonusResolver.eligibleBonuses(actorBonuses,  condCtx);
  const targetElig1 = BonusResolver.eligibleBonuses(targetBonuses, condCtx);
  const finalAttackR  = BonusResolver.resolveStats(baseAttack,  actorElig1,  condCtx);
  const finalDefenseR = BonusResolver.resolveStats(baseDefense, targetElig1, condCtx);
  const attackProfile  = finalAttackR.stats;
  const defenseProfile = finalDefenseR.stats;

  // defDice can only shrink after the fact by discarding already-rolled
  // dice (see discardWorstDice) — the pool was rolled at preDefense's
  // (possibly higher) count before critScored was known.
  const dropCount = Math.max(0, preDefense.defDice - Math.max(0, defenseProfile.defDice));
  const defRolls  = discardWorstDice(defRollsRaw, dropCount);

  const outcome = resolveShotOutcome(attackProfile, defenseProfile, atkRolls, defRolls, p.useCover);

  playBeamOnly(p, attacker, target);

  const appliedBonuses = dedupeAppliedBonuses(weaponBonuses, finalAttackR.applied.concat(finalDefenseR.applied));
  const flags      = Array.from(new Set([...finalAttackR.flags, ...finalDefenseR.flags]));
  const conditions = finalAttackR.conditions.concat(finalDefenseR.conditions);

  // Same flattened field names as before the refactor — the resolution-bar
  // rendering reads these directly and doesn't need to know profiles exist.
  await db.ref(`games-kt/${gameId}/pendingShot`).update({
    phase: 'rolled', atkRolls, defRolls: outcome.defRolls,
    remainingCritHits: outcome.remainingCritHits,
    remainingNormalHits: outcome.remainingNormalHits,
    totalDamage: outcome.totalDamage,
    normalDmg: attackProfile.dmgNormal,
    critDmg: attackProfile.dmgCrit,
    effectiveHit: attackProfile.hit,
    critThreshold: attackProfile.critThreshold,
    halfRange, critScored,
    appliedBonuses, flags, conditions,
  });
}

async function confirmShotDamage(playerSlot) {
  const p = gameData.pendingShot;
  if (!p || p.phase !== 'rolled') return;
  const target = (gameData.operatives || {})[p.targetOpId];
  if (!target) return;

  const newWounds = Math.max(0, (target.wounds || 0) - (p.totalDamage || 0));
  await db.ref(`games-kt/${gameId}`).update({
    [`operatives/${target.id}/wounds`]: newWounds,
    pendingShot: null,
  });

  if (activation && activation.apRemaining <= 0) {
    await endActivation(playerSlot);
  } else {
    reRenderPhaseBar();
  }
}

// ── BON-2b dice readout ───────────────────────────────────────
// Display only — flags/conditions are badges, not enforcement (BON-3
// territory). This IS the acceptance test the brief asks for: one plain-
// English line per applied bonus. Always expanded in ?dev=true; collapsed
// behind a toggle in normal play.

function toggleDiceReadout(key) {
  diceReadoutExpanded[key] = !diceReadoutExpanded[key];
  reRenderPhaseBar();
}

function renderBonusReadout(pending, key) {
  const applied    = pending.appliedBonuses || [];
  const flags      = pending.flags || [];
  const conditions = pending.conditions || [];
  if (!applied.length && !flags.length && !conditions.length) return '';

  const expanded = devMode || !!diceReadoutExpanded[key];
  const count = applied.length + conditions.length;
  const toggleBtn = devMode ? '' :
    `<button class="btn" style="font-size:10px;padding:2px 8px;margin-top:4px;" onclick="toggleDiceReadout('${key}')">${expanded ? 'Hide' : 'Show'} bonus readout (${count})</button>`;

  if (!expanded) return `<div>${toggleBtn}</div>`;

  const badge = (txt, bg, border) =>
    `<span style="display:inline-block;padding:2px 6px;margin:2px 4px 2px 0;border-radius:4px;background:${bg};border:1px solid ${border};font-size:10px;text-transform:uppercase;letter-spacing:.4px;">${escHtml(txt)}</span>`;
  const badges = [
    ...flags.map(f => badge(f, 'var(--surface2)', 'var(--border-hi)')),
    ...conditions.map(c => badge(c.condition + (c.appliesTo === 'target' ? ' → target' : ''), 'var(--red-dim)', 'var(--red)')),
  ].join('');

  const lines = applied.map(a => `<div style="font-size:11px;color:var(--text-dim);">${escHtml(a.text)}</div>`).join('');

  return `
    <div style="margin-top:4px;padding:6px 8px;background:rgba(0,0,0,0.15);border-radius:4px;">
      ${badges ? `<div style="margin-bottom:4px;">${badges}</div>` : ''}
      ${lines}
      ${toggleBtn}
    </div>`;
}

// ── Shoot resolution render helpers ──────────────────────────

function renderDicePool(rolls, isAtk, hitStat, saveStat, critThreshold) {
  if (!rolls || !rolls.length) return '<span style="font-size:11px;color:var(--text-dim);">—</span>';
  // BON-2b: atk-side crit grouping now follows the resolved critThreshold
  // (Lethal x+) instead of a hardcoded natural 6 — flagged in BON-2a's
  // DEVLOG as a latent mis-coloring bug waiting for exactly this. The
  // def-side crit-SAVE stays a hardcoded 6 deliberately: it's unmodifiable
  // (see DEFENSE_CRIT_FACE), no keyword touches it.
  const ct = critThreshold || 6;
  const g = { crit: [], hit: [], miss: [], critSave: [], normSave: [], auto: [], fail: [] };
  rolls.forEach(d => {
    if (isAtk) {
      if (d >= ct)                             g.crit.push(d);
      else if (d !== 1 && d >= hitStat)       g.hit.push(d);
      else                                     g.miss.push(d);
    } else {
      if (d === 'auto')                        g.auto.push(d);
      else if (d === 6)                        g.critSave.push(d);
      else if (typeof d === 'number' && d >= saveStat) g.normSave.push(d);
      else                                     g.fail.push(d);
    }
  });
  const defs = isAtk
    ? [['crit','CRIT','#e74c3c'],['hit','HIT','#27ae60'],['miss','MISS','var(--text-dim)']]
    : [['critSave','CRIT SAVE','#e74c3c'],['normSave','SAVE','#27ae60'],['auto','COVER','#e67e22'],['fail','FAIL','var(--text-dim)']];
  return defs.map(([key, lbl, col]) => {
    const dice = g[key];
    if (!dice.length) return '';
    return `<div class="dice-group">
      <div class="dice-group-dice">${dice.map(d => `<span style="color:${col}">${d === 'auto' ? `<span style="font-size:18px;line-height:1">★</span>` : dieFaceSVG(d, 22)}</span>`).join('')}</div>
      <div class="dice-group-label" style="color:${col}">${lbl}</div>
    </div><div class="dice-separator"></div>`;
  }).join('');
}

function renderShotResolutionBar(playerSlot, pending, iAmAttacker, attOp, tgtOp) {
  const w        = pending.weapon || {};
  const attName  = attOp?.name || '?';
  const tgtName  = tgtOp?.name || '?';
  const hitStat  = pending.effectiveHit || parseHit(w.profiles?.HIT);
  const saveStat = tgtOp?.save || 5;

  // Cover row (only if target is in cover)
  let coverHtml = '';
  if (pending.inCover) {
    if (!pending.coverDecided) {
      coverHtml = !iAmAttacker
        ? `<div style="display:flex;flex-direction:column;gap:6px;">
             <span style="font-size:11px;color:var(--gold);">You are in cover — use it? Convert one defence die to an automatic normal success, or roll all dice normally.</span>
             <div style="display:flex;gap:8px;">
               <button class="action-btn" onclick="decideCover(true)" style="border-color:var(--green);color:var(--green);">Use Cover (+1 auto save)</button>
               <button class="action-btn" onclick="decideCover(false)">Roll Normally</button>
             </div>
           </div>`
        : `<span style="font-size:11px;color:var(--text-dim);">Cover: waiting for defender's choice…</span>`;
    } else {
      const cc = pending.useCover ? '#e67e22' : 'var(--text-dim)';
      coverHtml = `<span style="font-size:11px;color:${cc};">Cover: ${pending.useCover ? 'USED (+1 auto save)' : 'Not used'}</span>`;
    }
  }

  const rollBtn = (pending.phase === 'coverChoice' && pending.coverDecided && iAmAttacker)
    ? `<button class="action-btn" style="border-color:var(--green);color:var(--green);" onclick="rollShot('${playerSlot}')">Roll Dice</button>`
    : '';

  const cancelBtn = (iAmAttacker && pending.phase !== 'rolled')
    ? `<button class="btn" onclick="cancelShoot()">Cancel Shot</button>`
    : '';

  let diceHtml = '', resultHtml = '', animating = false;
  if (pending.phase === 'rolled' && pending.atkRolls) {
    animating = !!diceAnimState;
    const displayAtk = animating ? (diceAnimState.displayAtk || pending.atkRolls) : pending.atkRolls;
    const displayDef = animating ? (diceAnimState.displayDef || pending.defRolls) : pending.defRolls;

    diceHtml = `
      <div style="display:flex;flex-direction:column;gap:6px;width:100%;">
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;">Attack (${w.profiles?.ATK || '?'} dice, hit on ${hitStat}+${isInjuredOp(attOp) ? ' — Injured' : ''})</div>
        <div class="dice-pool">${renderDicePool(displayAtk, true, hitStat, saveStat, pending.critThreshold)}</div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;">Defence (${tgtOp?.def || 3} dice, save on ${saveStat}+${pending.useCover ? ' + cover' : ''})</div>
        <div class="dice-pool">${renderDicePool(displayDef, false, hitStat, saveStat)}</div>
      </div>`;

    if (!animating) {
      const parts = [];
      if (pending.remainingCritHits > 0)   parts.push(`${pending.remainingCritHits}× crit (${pending.critDmg} dmg)`);
      if (pending.remainingNormalHits > 0) parts.push(`${pending.remainingNormalHits}× hit (${pending.normalDmg} dmg)`);
      const dmgStr = parts.length ? parts.join(' + ') + ` = ${pending.totalDamage} wound${pending.totalDamage !== 1 ? 's' : ''}` : 'All hits saved — 0 damage';
      resultHtml = `<div class="shoot-result">${dmgStr}</div>`;
      resultHtml += iAmAttacker
        ? `<button class="btn btn-primary" onclick="confirmShotDamage('${playerSlot}')">Apply ${pending.totalDamage} Damage to ${escHtml(tgtName)}</button>`
        : `<span style="font-size:11px;color:var(--text-dim);">Waiting for attacker to confirm…</span>`;
      resultHtml += renderBonusReadout(pending, 'shot');
    }
  }

  const label = iAmAttacker ? 'Shooting' : 'Incoming Shot';
  const vs    = iAmAttacker
    ? `${escHtml(w.name || '?')} → ${escHtml(tgtName)} &nbsp;|&nbsp; ATK ${w.profiles?.ATK || '?'} / ${w.profiles?.HIT || '?'} / ${w.profiles?.DMG || '?'}`
    : `${escHtml(w.name || '?')} ← ${escHtml(attName)} &nbsp;|&nbsp; DEF ${tgtOp?.def || 3}d / SAVE ${saveStat}+`;
  // KT-2 Part 2: click-to-skip during the tumble — same affordance Fight's
  // tumble gets (renderFightResolutionBar).
  const skipHint = animating ? '<div class="dice-skip-hint">(click to skip)</div>' : '';

  return `
    <span class="phase-bar-label">${label}</span>
    <div class="phase-bar-body">
      <div class="shoot-panel"${animating ? ' onclick="skipDiceAnimation()" style="cursor:pointer;"' : ''}>
        <div class="shoot-panel-header">
          <strong style="font-size:13px;">${escHtml(iAmAttacker ? attName : tgtName)}</strong>
          <span class="shoot-stats"><span>${vs}</span></span>
          ${cancelBtn}
        </div>
        ${coverHtml}
        ${rollBtn}
        ${diceHtml}
        ${skipHint}
        ${resultHtml}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  FIGHT ACTION — KT-2 Part 3
// ═══════════════════════════════════════════════════════════

function startFight(playerSlot) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  if (!op || op.x < 0) return;
  const melee = getMeleeWeapons(op);
  if (!melee.length) return;
  hideRadialMenu();
  if (melee.length === 1) { beginFightDrag(playerSlot, melee[0]); return; }
  fightWeapon = 'picking';
  reRenderPhaseBar();
}

function pickWeaponForFight(playerSlot, idx) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  const w  = getMeleeWeapons(op)[idx];
  if (w) beginFightDrag(playerSlot, w);
}

function cancelFight() {
  fightWeapon = null;
  if (fightState) {
    clearEl(fightState.overlay);
    fightState.svg.style.cursor = '';
    fightState = null;
  }
  reRenderPhaseBar();
  reRender();
}

function beginFightDrag(playerSlot, weapon) {
  if (!activation) return;
  const op = (gameData.operatives || {})[activation.opId];
  if (!op || op.x < 0) return;

  fightWeapon = weapon;
  reRenderPhaseBar();

  const boardWrap = document.getElementById(`board-wrap-${playerSlot}`);
  const svg = boardWrap?.querySelector('svg.board-svg');
  if (!svg) return;

  const overlay = svg.querySelector(`#overlay-${playerSlot}`);
  clearEl(overlay);
  fightState = { opId: op.id, weapon, svg, overlay, playerSlot };
  svg.style.cursor = 'crosshair';

  function onMouseMove(e) {
    if (!fightState) return;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    updateFightOverlay(pt.matrixTransform(svg.getScreenCTM().inverse()));
  }

  function onMouseUp(e) {
    if (!fightState) return;
    svg.removeEventListener('mousemove', onMouseMove);
    svg.removeEventListener('mouseup', onMouseUp);

    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const p = pt.matrixTransform(svg.getScreenCTM().inverse());

    const attacker = (gameData.operatives || {})[fightState.opId];
    const target = Object.values(gameData.operatives || {}).find(o =>
      o.player !== attacker?.player && o.wounds > 0 && o.x >= 0 &&
      Math.hypot(o.x - p.x, o.y - p.y) < TOKEN_R * 1.5
    );

    const fs = fightState;
    fightState = null;
    clearEl(fs.overlay);
    fs.svg.style.cursor = '';

    if (target && attacker && Math.hypot(target.x - attacker.x, target.y - attacker.y) <= 1) {
      confirmFightTarget(attacker, target, weapon, playerSlot);
      return;
    }
    fightWeapon = null;
    reRenderPhaseBar();
    reRender();
  }

  svg.addEventListener('mousemove', onMouseMove);
  svg.addEventListener('mouseup', onMouseUp);
}

function updateFightOverlay(p) {
  if (!fightState) return;
  const { opId, overlay } = fightState;
  const attacker = (gameData.operatives || {})[opId];
  if (!attacker) return;

  clearEl(overlay);

  // 1" control range circle
  overlay.appendChild(svgEl('circle', {
    cx: attacker.x, cy: attacker.y, r: 1,
    fill: 'rgba(200,80,80,0.07)', stroke: 'rgba(200,80,80,0.3)',
    'stroke-width': 0.1, 'stroke-dasharray': '0.4 0.25',
  }));

  const hoverTarget = Object.values(gameData.operatives || {}).find(o =>
    o.player !== attacker.player && o.wounds > 0 && o.x >= 0 &&
    Math.hypot(o.x - p.x, o.y - p.y) < TOKEN_R * 1.5
  );

  if (hoverTarget) {
    const dist  = Math.hypot(hoverTarget.x - attacker.x, hoverTarget.y - attacker.y);
    const valid = dist <= 1;
    overlay.appendChild(svgEl('circle', {
      cx: hoverTarget.x, cy: hoverTarget.y, r: TOKEN_R * 1.65,
      fill: 'none', stroke: valid ? '#e74c3c' : '#666',
      'stroke-width': valid ? 0.18 : 0.1, opacity: '0.85',
    }));
    const lineAttrs = {
      x1: attacker.x, y1: attacker.y, x2: hoverTarget.x, y2: hoverTarget.y,
      stroke: valid ? '#e74c3c' : 'rgba(100,100,100,0.35)',
      'stroke-width': 0.12, 'stroke-dasharray': '0.35 0.2',
    };
    overlay.appendChild(svgEl('line', lineAttrs));
    const dTxt = valid ? 'FIGHT' : dist.toFixed(1) + '" — out of reach';
    const midX = (attacker.x + hoverTarget.x) / 2;
    const midY = (attacker.y + hoverTarget.y) / 2 - 0.55;
    const lblW = Math.max(1.4, dTxt.length * 0.165 + 0.4);
    overlay.appendChild(svgEl('rect', { x: midX - lblW/2, y: midY - 0.35, width: lblW, height: 0.72, fill: '#0a0a14', rx: 0.15, opacity: '0.9' }));
    const lbl = svgEl('text', { x: midX, y: midY + 0.12, 'text-anchor': 'middle', fill: valid ? '#e74c3c' : '#888', 'font-size': 0.6, 'font-family': 'sans-serif', 'font-weight': 700 });
    lbl.textContent = dTxt;
    overlay.appendChild(lbl);
  }
}

async function confirmFightTarget(attacker, target, atkWeapon, playerSlot) {
  if (!activation) return;

  const defWeapon = getDefaultMeleeWeapon(target);

  activation.hasFought    = true;
  activation.apSpent      = true;
  activation.apRemaining -= 1;

  // Both combatants "attack" in KT melee (no separate save roll) — one
  // builder, two consumers, per the brief. No-weapon defender gets a
  // zero-dice profile (matches the original defCount=0 fallback). The old
  // inline code still applied the injured-op hit boost to the base-4 stat
  // even with no weapon (isInjuredOp(target) never depended on defWeapon),
  // so the fallback here must too — a bare `hit: 4` would silently regress
  // an injured no-weapon defender's displayed hit stat from 5+ to 4+.
  const baseAtk = buildAttackProfile(atkWeapon, attacker);
  const baseDef = defWeapon
    ? buildAttackProfile(defWeapon, target)
    : { atkDice: 0, hit: isInjuredOp(target) ? Math.min(4 + 1, 6) : 4, critThreshold: 6, dmgNormal: 0, dmgCrit: 0 };

  // BON-2b: fight is symmetric (both sides "attack"), so each combatant's
  // own weapon bonuses resolve against their own profile only — no
  // appliesTo/target-routing exists for melee in the live catalog (only
  // Shoot's Piercing needs it, via defDice), so this stays a single
  // per-side resolve rather than the shoot side's actor/target split.
  // Only the attacker's client runs any of this (fight resolves in one
  // shot, unlike shoot's separate roll step) — defender's client just
  // reads the fully-resolved pendingFight fields.
  const catalog    = gameData.bonuses || {};
  const atkBonuses = getWeaponBonuses(atkWeapon, catalog);
  const defBonuses = defWeapon ? getWeaponBonuses(defWeapon, catalog) : [];
  const actorPos   = { x: attacker.x, y: attacker.y };
  const targetPos  = { x: target.x,   y: target.y };

  function resolveMeleeSide(baseProfile, bonuses) {
    const preCtx  = buildBonusContext('onFight', [], actorPos, targetPos);
    const preElig = BonusResolver.eligibleBonuses(bonuses, preCtx);
    const pre     = BonusResolver.resolveStats(baseProfile, preElig, preCtx).stats;

    let rolls = Array.from({ length: pre.atkDice }, () => Math.ceil(Math.random() * 6));
    rolls     = applyRerolls(rolls, pre);

    const rawCritCount = rolls.filter(d => d >= pre.critThreshold).length;
    const critScored   = (rawCritCount + (pre.retainCrit || 0)) > 0;
    const condCtx      = buildBonusContext('onFight', [critScored ? 'critScored' : 'noCritScored'], actorPos, targetPos);
    const condElig     = BonusResolver.eligibleBonuses(bonuses, condCtx);
    const finalR       = BonusResolver.resolveStats(baseProfile, condElig, condCtx);

    return { profile: finalR.stats, rolls, applied: finalR.applied, flags: finalR.flags, conditions: finalR.conditions };
  }

  const atkSide = resolveMeleeSide(baseAtk, atkBonuses);
  const defSide = defWeapon
    ? resolveMeleeSide(baseDef, defBonuses)
    : { profile: baseDef, rolls: [], applied: [], flags: [], conditions: [] };

  const atkProfile = atkSide.profile;
  const defProfile = defSide.profile;
  const atkRolls   = atkSide.rolls;
  const defRolls   = defSide.rolls;

  const outcome = resolveFightOutcome(atkProfile, defProfile, atkRolls, defRolls);

  const appliedBonuses = dedupeAppliedBonuses(atkBonuses.concat(defBonuses), atkSide.applied.concat(defSide.applied));
  const flags      = Array.from(new Set([...atkSide.flags, ...defSide.flags]));
  const conditions = atkSide.conditions.concat(defSide.conditions);

  await db.ref(`games-kt/${gameId}/pendingFight`).set({
    attackerOpId: attacker.id,
    defenderOpId: target.id,
    attackerSlot: playerSlot,
    atkWeapon,
    defWeapon: defWeapon || null,
    atkHitStat: atkProfile.hit,
    defHitStat: defProfile.hit,
    atkNDmg: atkProfile.dmgNormal, atkCDmg: atkProfile.dmgCrit,
    defNDmg: defProfile.dmgNormal, defCDmg: defProfile.dmgCrit,
    phase: 'confirm',
    atkRolls,
    defRolls,
    atkAnnotated: outcome.atkAnnotated,
    defAnnotated: outcome.defAnnotated,
    dmgToDefender: outcome.dmgToDefender,
    dmgToAttacker: outcome.dmgToAttacker,
    appliedBonuses, flags, conditions,
  });

  fightWeapon = null;
  reRenderPhaseBar();
}

async function confirmFightDamage(playerSlot) {
  const p = gameData.pendingFight;
  if (!p || p.phase !== 'confirm') return;
  if (p.attackerSlot !== playerSlot) return;

  const attacker = (gameData.operatives || {})[p.attackerOpId];
  const defender = (gameData.operatives || {})[p.defenderOpId];
  if (!attacker || !defender) return;

  const newAtkWounds = Math.max(0, (attacker.wounds || 0) - (p.dmgToAttacker || 0));
  const newDefWounds = Math.max(0, (defender.wounds || 0) - (p.dmgToDefender || 0));

  await db.ref(`games-kt/${gameId}`).update({
    [`operatives/${attacker.id}/wounds`]: newAtkWounds,
    [`operatives/${defender.id}/wounds`]: newDefWounds,
    pendingFight: null,
  });

  if (activation && activation.apRemaining <= 0) {
    await endActivation(playerSlot);
  } else {
    reRenderPhaseBar();
  }
}

// ── Fight resolution render (auto-resolve) ─────────────────

function renderFightResolutionBar(playerSlot, p, iAmAttacker, iAmDefender, attOp, defOp) {
  // KT-2 Part 2: while fightDiceAnimState is live, show tumbling faces
  // with no outcome revealed yet (annotations/damage would spoil the
  // drama) — same gating shape renderShotResolutionBar already uses for
  // Shoot's tumble.
  const animating = !!fightDiceAnimState;
  const atkRolls  = animating ? (fightDiceAnimState.displayAtk || p.atkRolls || []) : (p.atkRolls || []);
  const defRolls  = animating ? (fightDiceAnimState.displayDef || p.defRolls || []) : (p.defRolls || []);
  const atkAnnot  = animating ? [] : (p.atkAnnotated || []);
  const defAnnot  = animating ? [] : (p.defAnnotated || []);

  const attName = escHtml(attOp?.name || '?');
  const defName = escHtml(defOp?.name || '?');

  const ATK_STYLE = {
    crit:  { label: 'CRIT STRIKE', color: '#e74c3c' },
    hit:   { label: 'STRIKE',      color: '#27ae60' },
    miss:  { label: 'MISS',        color: 'var(--text-dim)' },
  };
  const DEF_STYLE = {
    'crit-block':   { label: 'CRIT BLOCK ✓',  color: '#27ae60' },
    'hit-block':    { label: 'BLOCK ✓',        color: '#27ae60' },
    'crit-strike':  { label: 'CRIT STRIKE',    color: '#e74c3c' },
    'hit-strike':   { label: 'STRIKE',         color: '#e67e22' },
    'miss':         { label: 'MISS',           color: 'var(--text-dim)' },
  };
  const ROLLING_STYLE = { label: '', color: 'var(--text-dim)' };

  function renderDie(roll, style) {
    const isActive = style.label !== 'MISS';
    return `<div class="fight-die${isActive ? '' : ' used'}">
      <span style="color:${style.color}">${dieFaceSVG(roll, 20)}</span>
      <div class="fight-die-result" style="color:${style.color}">${style.label}</div>
    </div>`;
  }

  const atkDice = atkRolls.map((r, i) => renderDie(r, animating ? ROLLING_STYLE : ATK_STYLE[atkAnnot[i] || 'miss'])).join('') ||
    '<span style="font-size:11px;color:var(--text-dim)">No dice</span>';
  const defDice = defRolls.map((r, j) => renderDie(r, animating ? ROLLING_STYLE : DEF_STYLE[defAnnot[j] || 'miss'])).join('') ||
    '<span style="font-size:11px;color:var(--text-dim)">No dice</span>';

  const dmgAtk = p.dmgToDefender || 0;
  const dmgDef = p.dmgToAttacker || 0;

  let confirmHtml = '';
  if (!animating) {
    const summaryParts = [
      dmgAtk > 0 ? `${attName} deals <strong>${dmgAtk}</strong> wounds to ${defName}` : null,
      dmgDef > 0 ? `${defName} deals <strong>${dmgDef}</strong> wounds to ${attName}` : null,
      dmgAtk === 0 && dmgDef === 0 ? 'No damage dealt.' : null,
    ].filter(Boolean);

    confirmHtml = (iAmAttacker
      ? `<div class="shoot-result">${summaryParts.join(' &nbsp;|&nbsp; ')}</div>
         <button class="btn btn-primary" onclick="confirmFightDamage('${playerSlot}')">Apply Damage</button>`
      : `<div class="shoot-result">${summaryParts.join(' &nbsp;|&nbsp; ')}</div>
         <span style="font-size:11px;color:var(--text-dim);">Waiting for attacker to confirm…</span>`)
      + renderBonusReadout(p, 'fight');
  }

  const atkWpn = escHtml(p.atkWeapon?.name || '?');
  const defWpn = escHtml(p.defWeapon?.name || '?');
  const label  = iAmAttacker ? 'Close Combat' : 'Incoming Fight!';
  const skipHint = animating ? '<div class="dice-skip-hint">(click to skip)</div>' : '';

  return `
    <span class="phase-bar-label">${label}</span>
    <div class="phase-bar-body">
      <div class="fight-panel"${animating ? ' onclick="skipDiceAnimation()" style="cursor:pointer;"' : ''}>
        <div class="fight-panel-header">
          <strong style="font-size:13px;">${attName} ⚔ ${defName}</strong>
          <span style="font-size:11px;color:var(--text-dim);">${atkWpn} vs ${defWpn}</span>
        </div>
        <div class="fight-status">Auto-resolved — attacker strikes, defender blocks crits first then normals, remainder retaliates.</div>
        <div class="fight-pools">
          <div class="fight-pool fight-pool-atk">
            <div class="fight-pool-label">${attName} — ${atkWpn} (ATK ${p.atkWeapon?.profiles?.ATK||'?'}, hit on ${p.atkHitStat}+)</div>
            <div class="fight-dice">${atkDice}</div>
            <div class="fight-pool-total" style="color:${dmgAtk>0?'var(--red)':'var(--text-dim)'}">${animating ? '&nbsp;' : `Deals: ${dmgAtk} wounds`}</div>
          </div>
          <div class="fight-pool fight-pool-def">
            <div class="fight-pool-label">${defName} — ${defWpn} (ATK ${p.defWeapon?.profiles?.ATK||'?'}, hit on ${p.defHitStat}+)</div>
            <div class="fight-dice">${defDice}</div>
            <div class="fight-pool-total" style="color:${dmgDef>0?'var(--red)':'var(--text-dim)'}">${animating ? '&nbsp;' : `Deals: ${dmgDef} wounds`}</div>
          </div>
        </div>
        ${skipHint}
        ${confirmHtml}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  KT-3 — GRIMDARK VISUAL EFFECTS
//  All effects are local-only — no Firebase writes.
//  Triggered by detectAndPlayEffects() after each render().
// ═══════════════════════════════════════════════════════════

// 'subtle' | 'dramatic' | 'cinematic' from weapon normal damage value
function getAnimTier(nDmg, cDmg) {
  let tier = nDmg <= 3 ? 'subtle' : nDmg <= 5 ? 'dramatic' : 'cinematic';
  if (cDmg >= 8 && tier !== 'cinematic') {
    tier = tier === 'subtle' ? 'dramatic' : 'cinematic';
  }
  return tier;
}

// Beam color keyed on weapon name substrings
function getBeamColor(name) {
  const n = (name || '').toLowerCase();
  if (/las|laser|lasgun|laspistol|hot.shot/.test(n))          return '#e84040';
  if (/pulse|tau|ion|rail|burst|pathfinder/.test(n))          return '#40c8e8';
  if (/bolt|bolter|slugga|dakka|shoota|stub|autogun/.test(n)) return '#e8c840';
  if (/plasma|melta|fusion|flamer|inferno/.test(n))           return '#e87040';
  if (/needler|shuriken|catapult|neuro|hallucinogen/.test(n)) return '#40e870';
  return '#e8e8e8';
}

// Dark red with slight per-splat hue variation
function randomSplatColor() {
  const r = Math.min(220, Math.max(80,  0x8b + ((Math.random() - 0.5) * 50 | 0)));
  const g = Math.min(60,  Math.max(0,   0x1a + ((Math.random() - 0.5) * 20 | 0)));
  const b = Math.min(60,  Math.max(0,   0x1a + ((Math.random() - 0.5) * 20 | 0)));
  return `rgb(${r},${g},${b})`;
}

// Append SMIL stroke-draw + opacity-fade animations to a line element
function appendBeamAnims(el, len, dur, initOpacity) {
  const drawDurS  = (dur * 0.40 / 1000).toFixed(3);
  const fadeDurS  = (dur * 0.60 / 1000).toFixed(3);
  const fadeBegin = (dur * 0.40 / 1000).toFixed(3);

  const draw = document.createElementNS(NS, 'animate');
  draw.setAttribute('attributeName', 'stroke-dashoffset');
  draw.setAttribute('from', len); draw.setAttribute('to', 0);
  draw.setAttribute('dur', drawDurS + 's'); draw.setAttribute('fill', 'freeze');
  el.appendChild(draw);

  const fade = document.createElementNS(NS, 'animate');
  fade.setAttribute('attributeName', 'opacity');
  fade.setAttribute('from', String(initOpacity ?? 1)); fade.setAttribute('to', '0');
  fade.setAttribute('begin', fadeBegin + 's');
  fade.setAttribute('dur', fadeDurS + 's'); fade.setAttribute('fill', 'freeze');
  el.appendChild(fade);
}

// Draw a weapon beam from attacker to target (or 80% for misses)
function drawBeam(parent, ax, ay, tx, ty, color, tier, hasDamage, durOverride) {
  const DURS = { subtle: 350, dramatic: 700, cinematic: 1200 };
  const LW   = { subtle: 0.07, dramatic: 0.11, cinematic: 0.16 };
  if (!hasDamage && tier === 'subtle') return;

  const dur  = durOverride !== undefined ? durOverride : DURS[tier];
  const lw   = LW[tier];
  const frac = hasDamage ? 1 : 0.8;
  const endX = ax + (tx - ax) * frac;
  const endY = ay + (ty - ay) * frac;
  const len  = Math.hypot(endX - ax, endY - ay);

  if (tier !== 'subtle') {
    const glow = svgEl('line', {
      x1: ax, y1: ay, x2: endX, y2: endY,
      stroke: color, 'stroke-width': lw * 5,
      'stroke-linecap': 'round',
      'stroke-dasharray': len, 'stroke-dashoffset': len,
      opacity: 0.22,
    });
    appendBeamAnims(glow, len, dur, 0.22);
    parent.appendChild(glow);
  }

  const line = svgEl('line', {
    x1: ax, y1: ay, x2: endX, y2: endY,
    stroke: color, 'stroke-width': lw,
    'stroke-linecap': 'round',
    'stroke-dasharray': len, 'stroke-dashoffset': len,
    opacity: 1,
  });
  appendBeamAnims(line, len, dur, 1);
  parent.appendChild(line);

  // Cinematic: brief afterimage that fades behind the main beam
  if (tier === 'cinematic') {
    const after = svgEl('line', {
      x1: ax, y1: ay, x2: endX, y2: endY,
      stroke: color, 'stroke-width': lw * 0.6,
      'stroke-linecap': 'round',
      'stroke-dasharray': len, 'stroke-dashoffset': 0,
      opacity: 0.35,
    });
    const af = document.createElementNS(NS, 'animate');
    af.setAttribute('attributeName', 'opacity');
    af.setAttribute('from', '0.35'); af.setAttribute('to', '0');
    af.setAttribute('begin', (dur * 0.25 / 1000).toFixed(3) + 's');
    af.setAttribute('dur',   (dur * 0.75 / 1000).toFixed(3) + 's');
    af.setAttribute('fill',  'freeze');
    after.appendChild(af);
    parent.appendChild(after);
    setTimeout(() => { if (parent.contains(after)) parent.removeChild(after); }, dur + 200);
  }

  setTimeout(() => { if (parent.contains(line)) parent.removeChild(line); }, dur + 200);
}

// Radial blood/impact burst centered on a board position
function drawImpactBurst(parent, x, y, tier) {
  const RS   = { subtle: 0.8, dramatic: 1.2, cinematic: 1.8 };
  const DURS = { subtle: 350, dramatic: 700, cinematic: 1200 };
  const r   = RS[tier];
  const dur = DURS[tier];

  const burst = svgEl('circle', { cx: x, cy: y, r: r * 0.5, fill: '#c0392b', opacity: 0.75 });
  const grow = document.createElementNS(NS, 'animate');
  grow.setAttribute('attributeName', 'r');
  grow.setAttribute('from', r * 0.35); grow.setAttribute('to', r * 1.1);
  grow.setAttribute('dur', (dur / 1000) + 's'); grow.setAttribute('fill', 'freeze');
  const fade = document.createElementNS(NS, 'animate');
  fade.setAttribute('attributeName', 'opacity');
  fade.setAttribute('from', '0.75'); fade.setAttribute('to', '0');
  fade.setAttribute('dur', (dur / 1000) + 's'); fade.setAttribute('fill', 'freeze');
  burst.appendChild(grow); burst.appendChild(fade);
  parent.appendChild(burst);

  if (tier === 'cinematic') {
    for (let i = 0; i < 3; i++) {
      const a  = (i / 3) * Math.PI * 2 + Math.random();
      const sx = x + Math.cos(a) * r * 0.55;
      const sy = y + Math.sin(a) * r * 0.55;
      const s  = svgEl('circle', { cx: sx, cy: sy, r: r * 0.32, fill: '#c0392b', opacity: 0.5 });
      const sf = document.createElementNS(NS, 'animate');
      sf.setAttribute('attributeName', 'opacity');
      sf.setAttribute('from', '0.5'); sf.setAttribute('to', '0');
      sf.setAttribute('dur', (dur * 0.65 / 1000) + 's'); sf.setAttribute('fill', 'freeze');
      s.appendChild(sf);
      parent.appendChild(s);
      setTimeout(() => { if (parent.contains(s)) parent.removeChild(s); }, dur * 0.65 + 100);
    }
  }

  setTimeout(() => { if (parent.contains(burst)) parent.removeChild(burst); }, dur + 200);
}

// Spark-burst clash indicator at midpoint between two combatants
function drawClash(parent, ax, ay, dx, dy, totalDmg) {
  const size = totalDmg === 0 ? 0 : totalDmg < 6 ? 0.4 : totalDmg < 15 ? 0.7 : 1.0;
  if (size === 0) return;
  const dur = totalDmg < 6 ? 350 : totalDmg < 15 ? 700 : 1200;
  const mx  = (ax + dx) / 2;
  const my  = (ay + dy) / 2;

  const g = svgEl('g');
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r1 = size * 0.25;
    const r2 = size * (0.6 + Math.random() * 0.4);
    const spoke = svgEl('line', {
      x1: mx + Math.cos(angle) * r1, y1: my + Math.sin(angle) * r1,
      x2: mx + Math.cos(angle) * r2, y2: my + Math.sin(angle) * r2,
      stroke: '#e8e840', 'stroke-width': 0.08, 'stroke-linecap': 'round', opacity: 0.9,
    });
    const sf = document.createElementNS(NS, 'animate');
    sf.setAttribute('attributeName', 'opacity');
    sf.setAttribute('from', '0.9'); sf.setAttribute('to', '0');
    sf.setAttribute('dur', (dur / 1000) + 's'); sf.setAttribute('fill', 'freeze');
    spoke.appendChild(sf);
    g.appendChild(spoke);
  }
  const center = svgEl('circle', { cx: mx, cy: my, r: size * 0.18, fill: '#fff', opacity: 0.95 });
  const cf = document.createElementNS(NS, 'animate');
  cf.setAttribute('attributeName', 'opacity');
  cf.setAttribute('from', '0.95'); cf.setAttribute('to', '0');
  cf.setAttribute('dur', (dur * 0.4 / 1000) + 's'); cf.setAttribute('fill', 'freeze');
  center.appendChild(cf);
  g.appendChild(center);
  parent.appendChild(g);
  setTimeout(() => { if (parent.contains(g)) parent.removeChild(g); }, dur + 200);
}

// Brief white flash at operative position on death
function drawDeathFlash(parent, x, y) {
  const flash = svgEl('circle', { cx: x, cy: y, r: TOKEN_R * 2.2, fill: '#ffffff', opacity: 1 });
  const fade  = document.createElementNS(NS, 'animate');
  fade.setAttribute('attributeName', 'opacity');
  fade.setAttribute('from', '1'); fade.setAttribute('to', '0');
  fade.setAttribute('dur', '0.25s'); fade.setAttribute('fill', 'freeze');
  flash.appendChild(fade);
  parent.appendChild(flash);
  setTimeout(() => { if (parent.contains(flash)) parent.removeChild(flash); }, 350);
}

// Draw a permanent blood splat from splatData entry
function drawSplat(parent, s) {
  const age     = Date.now() - (s.bornAt || 0);
  const isNew   = age < 500;

  // Outer: position + rotation
  const outer = svgEl('g', { transform: `translate(${s.x},${s.y}) rotate(${s.rotation})` });
  // Inner: scale (static if old, animated if new)
  const inner = svgEl('g');
  inner.appendChild(svgEl('path', { d: SPLAT_PATHS[s.pathIdx], fill: s.color, opacity: 0.72 }));
  outer.appendChild(inner);
  parent.appendChild(outer);

  if (isNew) {
    const remainS = (Math.max(50, 400 - age) / 1000).toFixed(3);
    const anim = document.createElementNS(NS, 'animateTransform');
    anim.setAttribute('attributeName', 'transform');
    anim.setAttribute('type',  'scale');
    anim.setAttribute('from',  '0');
    anim.setAttribute('to',    s.scale);
    anim.setAttribute('dur',   remainS + 's');
    anim.setAttribute('fill',  'freeze');
