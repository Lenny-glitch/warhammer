    inner.appendChild(anim);
  } else {
    inner.setAttribute('transform', `scale(${s.scale})`);
  }
}

// Push a new death stain into splatData (drawn on next render)
function addDeathSplat(x, y) {
  if (x < 0 || y < 0) return;
  splatData.push({
    x, y,
    pathIdx:  Math.floor(Math.random() * SPLAT_PATHS.length),
    rotation: Math.floor(Math.random() * 360),
    scale:    0.8 + Math.random() * 0.4,
    color:    randomSplatColor(),
    bornAt:   Date.now(),
  });
}

// Red screen-edge vignette flash (defender's screen)
function triggerScreenFlash() {
  const v = document.getElementById('kt3-vignette');
  if (!v) return;
  v.classList.remove('flash');
  void v.offsetWidth; // force reflow to restart animation
  v.classList.add('flash');
}

// Play shoot beam + impact burst + screen flash on all visible boards
function playShootEffects(pending, attacker, target) {
  const w = pending.weapon || {};
  const [nDmg, cDmg] = parseDmgPair(w.profiles?.DMG || '1/1');
  const tier   = getAnimTier(nDmg, cDmg);
  const color  = getBeamColor(w.name || '');
  const hasDmg = (pending.totalDamage || 0) > 0;

  const slots = devMode ? ['player1', 'player2'] : [myPlayer];
  for (const slot of slots) {
    const beamG  = document.getElementById(`beam-g-${slot}`);
    const burstG = document.getElementById(`burst-g-${slot}`);
    if (!beamG) continue;

    drawBeam(beamG, attacker.x, attacker.y, target.x, target.y, color, tier, hasDmg);
    if (hasDmg && burstG) drawImpactBurst(burstG, target.x, target.y, tier);

    const isDefender = devMode ? (slot === target.player) : (target.player === myPlayer);
    if (hasDmg && isDefender) triggerScreenFlash();
  }
}

// Beam fires on Roll Dice — one beam per ATK die, chained sequentially
// Each beam's duration = totalDur / atkCount so the full volley takes the same time as one beam
function playBeamOnly(pending, attacker, target) {
  const w = pending.weapon || {};
  const [nDmg, cDmg] = parseDmgPair(w.profiles?.DMG || '1/1');
  const tier     = getAnimTier(nDmg, cDmg);
  const color    = getBeamColor(w.name || '');
  const atkCount = Math.min(parseInt(w.profiles?.ATK || 1), 6);
  const DURS     = { subtle: 350, dramatic: 700, cinematic: 1200 };
  const beamDur  = Math.max(60, Math.floor(DURS[tier] / atkCount));
  const slots    = devMode ? ['player1', 'player2'] : [myPlayer];
  for (let i = 0; i < atkCount; i++) {
    setTimeout(() => {
      for (const slot of slots) {
        const beamG = document.getElementById(`beam-g-${slot}`);
        if (!beamG) continue;
        drawBeam(beamG, attacker.x, attacker.y, target.x, target.y, color, tier, true, beamDur);
      }
    }, i * beamDur);
  }
}

// Impact burst + screen flash fires at damage confirm
// KT-2 Part 2: floating "-N" text at the point of damage, so a hit reads
// as an event you SEE, not just a wounds number that quietly decremented.
// Same lifecycle pattern as the other transient effects here (SMIL
// animate + timeout cleanup) — best-effort like the rest of this layer; a
// re-render mid-animation can cut it short (accepted, same tradeoff as
// the beam-timing issue noted elsewhere in this file).
function spawnDamageFloater(parent, x, y, amount) {
  if (!amount) return;
  const DUR = 900, RISE = 1.4;
  const text = svgEl('text', {
    x, y, 'text-anchor': 'middle', fill: '#ff5050',
    'font-size': 0.55, 'font-family': 'sans-serif', 'font-weight': 900,
    'paint-order': 'stroke', stroke: '#1a0808', 'stroke-width': 0.08,
    'pointer-events': 'none',
  });
  text.textContent = `-${amount}`;

  const rise = document.createElementNS(NS, 'animate');
  rise.setAttribute('attributeName', 'y');
  rise.setAttribute('from', y); rise.setAttribute('to', y - RISE);
  rise.setAttribute('dur', (DUR / 1000) + 's'); rise.setAttribute('fill', 'freeze');
  const fade = document.createElementNS(NS, 'animate');
  fade.setAttribute('attributeName', 'opacity');
  fade.setAttribute('from', '1'); fade.setAttribute('to', '0');
  fade.setAttribute('begin', '0.3s'); fade.setAttribute('dur', ((DUR - 300) / 1000) + 's'); fade.setAttribute('fill', 'freeze');
  text.appendChild(rise); text.appendChild(fade);

  parent.appendChild(text);
  setTimeout(() => { if (parent.contains(text)) parent.removeChild(text); }, DUR + 100);
}

function playBurstAndFlash(pending, attacker, target) {
  const w = pending.weapon || {};
  const [nDmg, cDmg] = parseDmgPair(w.profiles?.DMG || '1/1');
  const tier   = getAnimTier(nDmg, cDmg);
  const hasDmg = (pending.totalDamage || 0) > 0;
  const slots  = devMode ? ['player1', 'player2'] : [myPlayer];
  for (const slot of slots) {
    const burstG = document.getElementById(`burst-g-${slot}`);
    if (!burstG) continue;
    if (hasDmg) {
      drawImpactBurst(burstG, target.x, target.y, tier);
      spawnDamageFloater(burstG, target.x, target.y, pending.totalDamage);
      const isDefender = devMode ? (slot === target.player) : (target.player === myPlayer);
      if (isDefender) triggerScreenFlash();
    }
  }
}

// Dice tumble animation: cycles through random faces, staggered reveals per tier
function startDiceAnimation(pending) {
  if (diceAnimState?._timer) clearTimeout(diceAnimState._timer);

  const w = pending.weapon || {};
  const [nDmg, cDmg] = parseDmgPair(w.profiles?.DMG || '1/1');
  const tier = getAnimTier(nDmg, cDmg);

  const TUMBLE   = { subtle: 300, dramatic: 500, cinematic: 700 }[tier];
  const STAGGER  = { subtle: 30,  dramatic: 60,  cinematic: 80  }[tier];
  const INTERVAL = 60;

  const atkRolls = pending.atkRolls || [];
  const defRolls = pending.defRolls || [];

  let dieIdx = 0;
  const atkStopAt = atkRolls.map(() => TUMBLE + dieIdx++ * STAGGER);
  const defStopAt = defRolls.map(d => d === 'auto' ? 0 : TUMBLE + dieIdx++ * STAGGER);
  const totalDur  = dieIdx > 0 ? TUMBLE + (dieIdx - 1) * STAGGER : TUMBLE;

  diceAnimState = { atkRolls, defRolls, atkStopAt, defStopAt, t0: Date.now(), totalDur,
                    displayAtk: null, displayDef: null, _timer: null };

  const tick = () => {
    if (!diceAnimState) return;
    const elapsed = Date.now() - diceAnimState.t0;

    diceAnimState.displayAtk = diceAnimState.atkRolls.map((real, i) =>
      elapsed >= diceAnimState.atkStopAt[i] ? real : Math.ceil(Math.random() * 6)
    );
    diceAnimState.displayDef = diceAnimState.defRolls.map((real, i) => {
      if (real === 'auto') return 'auto';
      return elapsed >= diceAnimState.defStopAt[i] ? real : Math.ceil(Math.random() * 6);
    });

    reRenderPhaseBar();

    if (elapsed >= diceAnimState.totalDur) {
      diceAnimState = null;
      reRenderPhaseBar();
    } else {
      diceAnimState._timer = setTimeout(tick, INTERVAL);
    }
  };

  diceAnimState._timer = setTimeout(tick, INTERVAL);
}

// KT-2 Part 2: Fight's own tumble — same mechanics as startDiceAnimation,
// separate state because Shoot and Fight can't be mid-resolution at the
// same time but each needs its own timer/display-value lifecycle. Unlike
// Shoot's pendingShot (two Firebase phases: coverChoice -> rolled, a
// natural animation trigger), confirmFightTarget() computes and writes
// the FULL resolved pendingFight in one shot — so the trigger here is
// "pendingFight just appeared" (see detectAndPlayEffects), not a phase
// transition. The reveal itself doesn't need to be synced across
// clients — both clients already have the same real roll values the
// moment Firebase delivers pendingFight, so each just runs the same
// tumble-to-reveal locally.
function startFightDiceAnimation(pending) {
  if (fightDiceAnimState?._timer) clearTimeout(fightDiceAnimState._timer);

  const w = pending.atkWeapon || {};
  const [nDmg, cDmg] = parseDmgPair(w.profiles?.DMG || '1/1');
  const tier = getAnimTier(nDmg, cDmg);

  const TUMBLE   = { subtle: 300, dramatic: 500, cinematic: 700 }[tier];
  const STAGGER  = { subtle: 30,  dramatic: 60,  cinematic: 80  }[tier];
  const INTERVAL = 60;

  const atkRolls = pending.atkRolls || [];
  const defRolls = pending.defRolls || [];

  let dieIdx = 0;
  const atkStopAt = atkRolls.map(() => TUMBLE + dieIdx++ * STAGGER);
  const defStopAt = defRolls.map(() => TUMBLE + dieIdx++ * STAGGER);
  const totalDur  = dieIdx > 0 ? TUMBLE + (dieIdx - 1) * STAGGER : TUMBLE;

  fightDiceAnimState = { atkRolls, defRolls, atkStopAt, defStopAt, t0: Date.now(), totalDur,
                         displayAtk: null, displayDef: null, _timer: null };

  const tick = () => {
    if (!fightDiceAnimState) return;
    const elapsed = Date.now() - fightDiceAnimState.t0;

    fightDiceAnimState.displayAtk = fightDiceAnimState.atkRolls.map((real, i) =>
      elapsed >= fightDiceAnimState.atkStopAt[i] ? real : Math.ceil(Math.random() * 6)
    );
    fightDiceAnimState.displayDef = fightDiceAnimState.defRolls.map((real, i) =>
      elapsed >= fightDiceAnimState.defStopAt[i] ? real : Math.ceil(Math.random() * 6)
    );

    reRenderPhaseBar();

    if (elapsed >= fightDiceAnimState.totalDur) {
      fightDiceAnimState = null;
      reRenderPhaseBar();
    } else {
      fightDiceAnimState._timer = setTimeout(tick, INTERVAL);
    }
  };

  fightDiceAnimState._timer = setTimeout(tick, INTERVAL);
}

// KT-2 Part 2: click-to-skip for either tumble — jumps straight to the
// real values and clears whichever animation is running. Only one of
// Shoot/Fight can be resolving at a time, but check both rather than
// assume which.
function skipDiceAnimation() {
  if (diceAnimState?._timer) {
    clearTimeout(diceAnimState._timer);
    diceAnimState = null;
    reRenderPhaseBar();
  }
  if (fightDiceAnimState?._timer) {
    clearTimeout(fightDiceAnimState._timer);
    fightDiceAnimState = null;
    reRenderPhaseBar();
  }
}

// Play fight clash + per-operative splats + screen flash on all visible boards
function playFightEffects(pending, attacker, defender) {
  const atkW = pending.atkWeapon || {};
  const [nDmg, cDmg] = parseDmgPair(atkW.profiles?.DMG || '1/1');
  const tier     = getAnimTier(nDmg, cDmg);
  const totalDmg = (pending.dmgToDefender || 0) + (pending.dmgToAttacker || 0);

  const slots = devMode ? ['player1', 'player2'] : [myPlayer];
  for (const slot of slots) {
    const beamG  = document.getElementById(`beam-g-${slot}`);
    const burstG = document.getElementById(`burst-g-${slot}`);
    if (!beamG) continue;

    drawClash(beamG, attacker.x, attacker.y, defender.x, defender.y, totalDmg);
    if (burstG) {
      if ((pending.dmgToDefender || 0) > 0) {
        drawImpactBurst(burstG, defender.x, defender.y, tier);
        spawnDamageFloater(burstG, defender.x, defender.y, pending.dmgToDefender);
      }
      if ((pending.dmgToAttacker || 0) > 0) {
        drawImpactBurst(burstG, attacker.x, attacker.y, tier);
        spawnDamageFloater(burstG, attacker.x, attacker.y, pending.dmgToAttacker);
      }
    }

    // Each player flashes if their operative took damage
    const slotPlayer  = devMode ? slot : myPlayer;
    const tookDamage  = (slotPlayer === defender.player && pending.dmgToDefender > 0)
                     || (slotPlayer === attacker.player && pending.dmgToAttacker > 0);
    if (tookDamage) triggerScreenFlash();
  }
}

// Inspect Firebase state transition; fire effects for shots, fights, and deaths
function detectAndPlayEffects(prev, curr) {
  if (!prev || !curr) return;

  // Dice tumble animation when dice are rolled
  if (prev.pendingShot && curr.pendingShot &&
      prev.pendingShot.phase !== 'rolled' && curr.pendingShot.phase === 'rolled') {
    startDiceAnimation(curr.pendingShot);
  }

  // Burst + flash when damage is confirmed (pendingShot cleared after 'rolled' phase)
  if (prev.pendingShot && !curr.pendingShot && prev.pendingShot.phase === 'rolled') {
    const p  = prev.pendingShot;
    const at = (curr.operatives || {})[p.attackerOpId] || (prev.operatives || {})[p.attackerOpId];
    const tg = (curr.operatives || {})[p.targetOpId]   || (prev.operatives || {})[p.targetOpId];
    if (at && tg && at.x >= 0 && tg.x >= 0) playBurstAndFlash(p, at, tg);
  }

  // KT-2 Part 2: Fight's dice tumble, fires the moment pendingFight
  // appears (no phase transition to key off, unlike Shoot — see
  // startFightDiceAnimation's own comment).
  if (!prev.pendingFight && curr.pendingFight) {
    startFightDiceAnimation(curr.pendingFight);
  }

  // Fight resolved (pendingFight cleared)
  if (prev.pendingFight && !curr.pendingFight) {
    const p  = prev.pendingFight;
    const at = (curr.operatives || {})[p.attackerOpId] || (prev.operatives || {})[p.attackerOpId];
    const df = (curr.operatives || {})[p.defenderOpId] || (prev.operatives || {})[p.defenderOpId];
    if (at && df && at.x >= 0 && df.x >= 0) playFightEffects(p, at, df);
  }

  // Operative deaths
  const prevOps = prev.operatives || {};
  const currOps = curr.operatives || {};
  for (const [id, op] of Object.entries(currOps)) {
    const prevOp = prevOps[id];
    if (prevOp && prevOp.wounds > 0 && op.wounds <= 0 && prevOp.x >= 0) {
      addDeathSplat(prevOp.x, prevOp.y);
      const slots = devMode ? ['player1', 'player2'] : [myPlayer];
      for (const slot of slots) {
        const beamG = document.getElementById(`beam-g-${slot}`);
        if (beamG) drawDeathFlash(beamG, prevOp.x, prevOp.y);
      }
    }
  }
}

// Global Escape key: cancel activation if no AP spent.
// Registered once; safe to call multiple times (idempotent via flag).
if (!window._ktEscBound) {
  window._ktEscBound = true;
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') cancelActivation();
  });
}

// ═══════════════════════════════════════════════════════════
//  RE-RENDER HELPERS
// ═══════════════════════════════════════════════════════════

function reRender() {
  if (devMode) renderDev();
  else { showScreen('game'); renderGame(myPlayer); }
  refreshRadialIfActive();
}

function reRenderPhaseBar() {
  // Re-render just the phase bar without rebuilding the full game
  const slots = devMode ? ['player1', 'player2'] : [myPlayer];
  slots.forEach(slot => {
    const bar = document.getElementById(`phase-bar-${slot}`);
    if (!bar || !gameData) return;
    const status = gameData.meta?.status;
    const phase  = status === 'active' ? (gameData.turn?.phase || 'strategy') : status;
    bar.innerHTML = renderPhaseBar(status, phase, slot, gameData.turn || {});
  });
}

//  DEV UTILS
// ═══════════════════════════════════════════════════════════

async function devNewGame() {
  if (!confirm('Reset dev game? Current game will be deleted.')) return;
  // Delete the old game doc so Firebase doesn't hold stale data
  if (gameId) {
    try { await db.ref(`games-kt/${gameId}`).remove(); } catch(e) {}
  }
  // Reset all local state
  gameId        = null;
  gameData      = null;
  activation    = null;
  dragState     = null;
  deploySelId   = null;
  shootWeapon   = null;
  shootState    = null;
  fightWeapon   = null;
  fightState    = null;
  terrainActive = false;
  expandedOps   = new Set();
  splatData     = [];
  if (diceAnimState?._timer) clearTimeout(diceAnimState._timer);
  diceAnimState = null;
  const url = new URL(window.location.href);
  url.searchParams.delete('game');
  window.history.replaceState({}, '', url.toString());
  bootDev();
}

async function autoPlaceDev() {
  const status = gameData?.meta?.status;
  if (status !== 'terrain' && status !== 'deployment') return;

  const ops    = Object.entries(gameData.operatives || {});
  const updates = {};

  for (const slot of ['player1', 'player2']) {
    const isP1  = slot === 'player1';
    const myOps = ops.filter(([, o]) => o.player === slot && o.x < 0);
    if (!myOps.length) continue;

    const count = myOps.length;
    const cols  = Math.min(count, 10);
    const xStep = BOARD_W / (cols + 1);
    // P1: bottom zone — start near y=29, step upward
    // P2: top zone    — start near y=1,  step downward
    const yStart = isP1 ? BOARD_H - 1 : 1;
    const yDir   = isP1 ? -1 : 1;

    let col = 0, row = 0;
    for (const [opId] of myOps) {
      updates[`operatives/${opId}/x`] = Math.round(xStep * (col + 1));
      updates[`operatives/${opId}/y`] = yStart + yDir * row * 2;
      col++;
      if (col >= cols) { col = 0; row++; }
    }
  }

  updates['meta/status'] = 'initiative';
  await db.ref(`games-kt/${gameId}`).update(updates);
}

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

function showScreen(name) {
  document.querySelectorAll('#app .screen').forEach(s => s.classList.remove('active'));
  const t = document.getElementById(`screen-${name}`);
  if (t) t.classList.add('active');
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  showScreen('error');
}

function buildGameUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set('game', gameId);
  url.searchParams.delete('dev');
  return url.toString();
}

function el(tag, props = {}) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'className')       node.className   = v;
    else if (k === 'textContent') node.textContent = v;
    else                          node[k]          = v;
  }
  return node;
}
